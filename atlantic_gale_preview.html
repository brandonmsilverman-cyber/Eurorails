    "North Sea":       [{ x: 32, y: 18 }],
    "English Channel": [{ x: 27, y: 32 }],
    "Irish Sea":       [{ x: 23, y: 22 }],
    "Bay of Biscay":   [{ x: 19, y: 48 }],
    "Baltic Sea":      [{ x: 52, y: 17 }],
    "Mediterranean":   [{ x: 34, y: 58 }, { x: 28, y: 72 }, { x: 45, y: 68 }],
    "Norwegian Sea":   [{ x: 22, y: 6 }],
    "Atlantic":        [
        { x: 13, y: 17 },  // NW of Ireland
        { x: 13, y: 21 },  // W of Ireland (north)
        { x: 13, y: 25 },  // W of Ireland (middle)
        { x: 13, y: 29 },  // SW of Ireland
        { x: 22, y: 34 },  // Off southwest Britain
        { x: 23, y: 37 },  // Off Brittany/Brest
        { x: 25, y: 41 },  // Off western France
        { x: 26, y: 45 },  // Off southwestern France
        { x: 16, y: 50 },  // Off NW Iberia/Galicia
        { x: 16, y: 54 },  // Off northern Portugal
        { x: 15, y: 57 },  // Off central Portugal
        { x: 14, y: 61 },  // Off Lisbon/southern Portugal
        { x: 15, y: 65 },  // Off SW Spain/Algarve
    ]
};

const CONNECTED_LANDMASSES = new Set([
    "continental|italy", "italy|continental",
    "continental|iberia", "iberia|continental",
    "continental|denmark", "denmark|continental",
    "zealand|denmark", "denmark|zealand",
    "denmark|scandinavia", "scandinavia|denmark",
    "zealand|scandinavia", "scandinavia|zealand"
]);

// === Core functions ===

function pointInPolygon(point, polygon) {
    const [x, y] = point;
    let inside = false;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const [xi, yi] = polygon[i];
        const [xj, yj] = polygon[j];
        if ((yi > y) !== (yj > y) && x < ((xj - xi) * (y - yi)) / (yj - yi) + xi) {
            inside = !inside;
        }
    }
    return inside;
}

function isLand(x, y) {
    for (let landmass of Object.values(LANDMASSES)) {
        if (pointInPolygon([x, y], landmass)) return true;
    }
    return false;
}

function getLandmass(x, y) {
    for (let [name, polygon] of Object.entries(LANDMASSES)) {
        if (pointInPolygon([x, y], polygon)) return name;
    }
    return null;
}

function landmassesConnected(lm1, lm2) {
    if (lm1 === lm2) return true;
    return CONNECTED_LANDMASSES.has(lm1 + "|" + lm2);
}

function terrainHash(x, y) {
    let h = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
    return h - Math.floor(h);
}

function polygonDepth(point, polygon) {
    let cx = 0, cy = 0;
    const n = polygon.length - 1;
    for (let i = 0; i < n; i++) { cx += polygon[i][0]; cy += polygon[i][1]; }
    cx /= n; cy /= n;
    let avgR = 0;
    for (let i = 0; i < n; i++) avgR += Math.hypot(polygon[i][0] - cx, polygon[i][1] - cy);
    avgR /= n;
    const distFromCenter = Math.hypot(point[0] - cx, point[1] - cy);
    return Math.max(0, 1 - distFromCenter / avgR);
}

function getTerrainType(x, y) {
    const hash = terrainHash(x, y);
    for (let polygon of TERRAIN_REGIONS.alpine) {
        if (pointInPolygon([x, y], polygon)) {
            const depth = polygonDepth([x, y], polygon);
            if (depth > 0.6) { if (hash < 0.60) return "alpine"; if (hash < 0.90) return "mountain"; return "clear"; }
            else if (depth > 0.3) { if (hash < 0.30) return "alpine"; if (hash < 0.70) return "mountain"; return "clear"; }
            else { if (hash < 0.10) return "alpine"; if (hash < 0.50) return "mountain"; return "clear"; }
        }
    }
    for (let polygon of TERRAIN_REGIONS.mountain) {
        if (pointInPolygon([x, y], polygon)) {
            const depth = polygonDepth([x, y], polygon);
            if (depth > 0.5) { if (hash < 0.70) return "mountain"; if (hash < 0.85) return "alpine"; return "clear"; }
            else if (depth > 0.25) { if (hash < 0.50) return "mountain"; if (hash < 0.55) return "alpine"; return "clear"; }
            else { if (hash < 0.30) return "mountain"; return "clear"; }
        }
    }
    return "clear";
}

// === Hex grid generation ===

const mileposts = [];
const mileposts_by_id = {};
const cityToMilepost = {};

function generateHexGrid() {
    const cellSize = 1.0;
    const rowSpacing = Math.sqrt(3) / 2;
    let id = 0;
    let rowIndex = 0;

    for (let y = 6; y < 69; y += rowSpacing) {
        const isOddRow = rowIndex % 2 === 1;
        const offsetX = isOddRow ? 0.5 : 0;
        rowIndex++;
        for (let x = 15 + offsetX; x < 63; x += cellSize) {
            if (isLand(x, y)) {
                const terrain = getTerrainType(x, y);
                const landmass = getLandmass(x, y);
                const mp = {
                    id,
                    x: Math.round(x * 100) / 100,
                    y: Math.round(y * 100) / 100,
                    terrain, landmass,
                    neighbors: []
                };
                mileposts.push(mp);
                mileposts_by_id[id] = mp;
                id++;
            }
        }
    }

    // Build adjacency
    const spatialHash = {};
    const bucketSize = 1.5;
    for (let mp of mileposts) {
        const bx = Math.floor(mp.x / bucketSize);
        const by = Math.floor(mp.y / bucketSize);
        const key = `${bx},${by}`;
        if (!spatialHash[key]) spatialHash[key] = [];
        spatialHash[key].push(mp.id);
    }
    for (let mp of mileposts) {
        const bx = Math.floor(mp.x / bucketSize);
        const by = Math.floor(mp.y / bucketSize);
        const neighbors = new Set();
        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                const key = `${bx + dx},${by + dy}`;
                if (spatialHash[key]) {
                    for (let otherId of spatialHash[key]) {
                        if (otherId !== mp.id) {
                            const other = mileposts_by_id[otherId];
                            const dist = Math.hypot(mp.x - other.x, mp.y - other.y);
                            if (dist < 1.5 && mp.landmass && other.landmass && landmassesConnected(mp.landmass, other.landmass)) {
                                neighbors.add(otherId);
                            }
                        }
                    }
                }
            }
        }
        mp.neighbors = Array.from(neighbors);
    }

    // Assign cities
    for (let cityName in CITIES) {
        let closest = null, closestDist = Infinity;
        const city = CITIES[cityName];
        for (let mp of mileposts) {
            const dist = Math.hypot(mp.x - city.x, mp.y - city.y);
            if (dist < closestDist) { closestDist = dist; closest = mp; }
        }
        if (closest && closestDist < 2) {
            cityToMilepost[cityName] = closest.id;
        }
    }
}

function findNearestMilepost(wx, wy) {
    let bestId = null, bestDist = Infinity;
    for (const mp of mileposts) {
        const d = Math.hypot(mp.x - wx, mp.y - wy);
        if (d < bestDist) { bestDist = d; bestId = mp.id; }
    }
    return bestId;
}

function getMilepostsInHexRange(startId, radius) {
    const result = new Set([startId]);
    const queue = [startId];
    const dist = { [startId]: 0 };
    let head = 0;
    while (head < queue.length) {
        const id = queue[head++];
        if (dist[id] >= radius) continue;
        const mp = mileposts_by_id[id];
        for (const nId of mp.neighbors) {
            if (dist[nId] === undefined) {
                dist[nId] = dist[id] + 1;
                result.add(nId);
                queue.push(nId);
            }
        }
    }
    return result;
}

// Multi-source BFS from multiple starting mileposts simultaneously
function getMilepostsInHexRangeMultiSource(startIds, radius) {
    const result = new Set(startIds);
    const queue = [...startIds];
    const dist = {};
    for (const id of startIds) dist[id] = 0;
    let head = 0;
    while (head < queue.length) {
        const id = queue[head++];
        if (dist[id] >= radius) continue;
        const mp = mileposts_by_id[id];
        for (const nId of mp.neighbors) {
            if (dist[nId] === undefined) {
                dist[nId] = dist[id] + 1;
                result.add(nId);
                queue.push(nId);
            }
        }
    }
    return result;
}

// Get all coastal mileposts bordering the given sea areas
function getCoastalMilepostsForSeaAreas(areaNames) {
    const targetSet = new Set(areaNames);
    const result = [];
    for (const mp of mileposts) {
        if (mp.neighbors.length >= 6) continue; // not coastal
        let nearestArea = null;
        let nearestDist = Infinity;
        for (const [name, points] of Object.entries(SEA_AREAS)) {
            for (const pt of points) {
                const d = Math.hypot(mp.x - pt.x, mp.y - pt.y);
                if (d < nearestDist) {
                    nearestDist = d;
                    nearestArea = name;
                }
            }
        }
        if (nearestArea && targetSet.has(nearestArea)) {
            result.push(mp.id);
        }
    }
    return result;
}

function convexHull(points) {
    points = points.slice().sort((a, b) => a[0] - b[0] || a[1] - b[1]);
    if (points.length <= 1) return points;
    const cross = (O, A, B) => (A[0] - O[0]) * (B[1] - O[1]) - (A[1] - O[1]) * (B[0] - O[0]);
    const lower = [];
    for (const p of points) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
        lower.push(p);
    }
    const upper = [];
    for (let i = points.length - 1; i >= 0; i--) {
        const p = points[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
        upper.push(p);
    }
    upper.pop(); lower.pop();
    return lower.concat(upper);
}

function expandHull(hull, amount) {
    const expanded = [];
    const n = hull.length;
    for (let i = 0; i < n; i++) {
        const prev = hull[(i - 1 + n) % n];
        const curr = hull[i];
        const next = hull[(i + 1) % n];
        const dx1 = curr[0] - prev[0], dy1 = curr[1] - prev[1];
        const dx2 = next[0] - curr[0], dy2 = next[1] - curr[1];
        const len1 = Math.hypot(dx1, dy1) || 1;
        const len2 = Math.hypot(dx2, dy2) || 1;
        const nx1 = dy1 / len1, ny1 = -dx1 / len1;
        const nx2 = dy2 / len2, ny2 = -dx2 / len2;
        const nx = (nx1 + nx2) / 2, ny = (ny1 + ny2) / 2;
        const nlen = Math.hypot(nx, ny) || 1;
        expanded.push([curr[0] + (nx / nlen) * amount, curr[1] + (ny / nlen) * amount]);
    }
    return expanded;
}

// === Rendering ===

function render() {
    const canvas = document.getElementById("map");
    const dpr = window.devicePixelRatio || 1;
    const cssW = Math.min(window.innerWidth - 40, 1200);
    const cssH = Math.min(window.innerHeight - 120, 900);
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    const ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const worldW = WORLD_BOUNDS.maxX - WORLD_BOUNDS.minX;
    const worldH = WORLD_BOUNDS.maxY - WORLD_BOUNDS.minY;
    const scale = Math.min(cssW / worldW, cssH / worldH);
    const ox = (cssW - worldW * scale) / 2;
    const oy = (cssH - worldH * scale) / 2;

    function w2s(wx, wy) {
        return [(wx - WORLD_BOUNDS.minX) * scale + ox, (wy - WORLD_BOUNDS.minY) * scale + oy];
    }

    // Ocean background
    const grad = ctx.createRadialGradient(cssW/2, cssH/2, 0, cssW/2, cssH/2, cssW * 0.7);
    grad.addColorStop(0, "#3a7fc1");
    grad.addColorStop(0.6, "#2c6faa");
    grad.addColorStop(1, "#0e3560");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, cssW, cssH);

    // Draw landmasses
    for (const [name, polygon] of Object.entries(LANDMASSES)) {
        ctx.beginPath();
        for (let i = 0; i < polygon.length; i++) {
            const [sx, sy] = w2s(polygon[i][0], polygon[i][1]);
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
        }
        ctx.closePath();
        ctx.fillStyle = "#9cc09c";
        ctx.fill();
        ctx.strokeStyle = "#5a8a5a";
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    // Compute event zone mileposts using multi-source BFS from coastal mileposts
    const radius = 4;
    const seaAreas = ["Atlantic", "Bay of Biscay"];
    const coastalStarts = getCoastalMilepostsForSeaAreas(seaAreas);
    // Coastal milepost counts as #1 of 4, so BFS radius-1 more hops inland
    const allZoneMpIds = getMilepostsInHexRangeMultiSource(coastalStarts, radius - 1);

    // Draw all mileposts (dimmed)
    const uiScale = Math.max(0.5, Math.min(1.5, scale / 15));
    const mpRadius = Math.max(1, 1.5 * uiScale);

    for (const mp of mileposts) {
        const [sx, sy] = w2s(mp.x, mp.y);
        ctx.beginPath();
        ctx.arc(sx, sy, mpRadius, 0, Math.PI * 2);
        ctx.fillStyle = allZoneMpIds.has(mp.id) ? "rgba(80, 220, 220, 0.8)" : "rgba(60, 60, 60, 0.3)";
        ctx.fill();
    }

    // Per-milepost buffer with offscreen canvas outline
    const cr = 80, cg = 200, cb = 200;
    const hexScreenR = scale * 0.75;
    const borderWidth = Math.max(2, 2.5 * uiScale);

    const offscreen = document.createElement("canvas");
    offscreen.width = canvas.width;
    offscreen.height = canvas.height;
    const offCtx = offscreen.getContext("2d");
    offCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Draw solid zone shape
    offCtx.fillStyle = "#fff";
    for (const id of allZoneMpIds) {
        const mp = mileposts_by_id[id];
        const [sx, sy] = w2s(mp.x, mp.y);
        offCtx.beginPath();
        offCtx.arc(sx, sy, hexScreenR, 0, Math.PI * 2);
        offCtx.fill();
    }

    // Cut out interior
    offCtx.globalCompositeOperation = "destination-out";
    for (const id of allZoneMpIds) {
        const mp = mileposts_by_id[id];
        const [sx, sy] = w2s(mp.x, mp.y);
        offCtx.beginPath();
        offCtx.arc(sx, sy, hexScreenR - borderWidth, 0, Math.PI * 2);
        offCtx.fill();
    }

    // Translucent fill
    ctx.save();
    ctx.fillStyle = `rgba(${cr}, ${cg}, ${cb}, 0.18)`;
    for (const id of allZoneMpIds) {
        const mp = mileposts_by_id[id];
        const [sx, sy] = w2s(mp.x, mp.y);
        ctx.beginPath();
        ctx.arc(sx, sy, hexScreenR, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    // Composite border ring
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalAlpha = 0.7;
    ctx.shadowColor = `rgba(${cr}, ${cg+30}, ${cb+30}, 0.6)`;
    ctx.shadowBlur = 6;
    ctx.drawImage(offscreen, 0, 0);
    ctx.restore();


    // Draw cities
    for (const [name, city] of Object.entries(CITIES)) {
        const mpId = cityToMilepost[name];
        if (mpId === undefined) continue;
        const [sx, sy] = w2s(city.x, city.y);
        const inZone = allZoneMpIds.has(mpId);
        const r = city.type === "major" ? 5 * uiScale : city.type === "medium" ? 3.5 * uiScale : 2.5 * uiScale;

        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = inZone ? "#ff6666" : "#ffcc44";
        ctx.fill();
        ctx.strokeStyle = inZone ? "#cc0000" : "#886600";
        ctx.lineWidth = 1;
        ctx.stroke();

        // Label
        const fontSize = Math.max(7, 9 * uiScale);
        ctx.font = `${inZone ? "bold " : ""}${fontSize}px Arial`;
        ctx.fillStyle = inZone ? "#ff8888" : "#ddd";
        ctx.textAlign = "center";
        ctx.fillText(name, sx, sy - r - 3);
    }

    // Draw coastal start mileposts (the BFS sources)
    ctx.save();
    const coastalSet = new Set(coastalStarts);
    for (const mp of mileposts) {
        if (!coastalSet.has(mp.id)) continue;
        const [sx, sy] = w2s(mp.x, mp.y);
        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(2, 2.5 * uiScale), 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 140, 60, 0.9)";
        ctx.fill();
    }
    ctx.restore();

    // Ocean labels
    ctx.save();
    const fontSize = Math.max(10, 14 * uiScale);
    ctx.font = `italic ${fontSize}px Georgia, serif`;
    ctx.fillStyle = "rgba(140, 190, 230, 0.4)";
    ctx.textAlign = "center";
    const labels = [
        { name: "Atlantic\nOcean", x: 6, y: 38 },
        { name: "Bay of\nBiscay", x: 19, y: 48 },
        { name: "North\nSea", x: 32, y: 18 },
        { name: "English Channel", x: 27, y: 32 },
        { name: "Mediterranean Sea", x: 34, y: 58 },
    ];
    for (const ol of labels) {
        const [sx, sy] = w2s(ol.x, ol.y);
        const lines = ol.name.split("\n");
        for (let i = 0; i < lines.length; i++) {
            ctx.fillText(lines[i], sx, sy + i * (fontSize + 2) - (lines.length - 1) * (fontSize + 2) / 2);
        }
    }
    ctx.restore();

    // Legend
    ctx.save();
    const lx = 12, ly = cssH - 80;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(lx, ly, 220, 70);
    ctx.strokeStyle = "#555";
    ctx.strokeRect(lx, ly, 220, 70);
    ctx.font = "bold 12px Arial";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "left";
    ctx.fillText("Legend", lx + 8, ly + 16);
    ctx.font = "11px Arial";

    ctx.beginPath();
    ctx.arc(lx + 16, ly + 32, 4, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(80, 220, 220, 0.8)";
    ctx.fill();
    ctx.fillStyle = "#aee";
    ctx.fillText("Affected milepost (within 4 hexes)", lx + 26, ly + 36);

    ctx.beginPath();
    ctx.arc(lx + 16, ly + 50, 4, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255, 140, 60, 0.9)";
    ctx.fill();
    ctx.fillStyle = "#fa6";
    ctx.fillText("Coastal BFS source milepost", lx + 26, ly + 54);

    ctx.restore();

    // Stats
    const affectedCities = [];
    for (const [name] of Object.entries(CITIES)) {
        const mpId = cityToMilepost[name];
        if (mpId !== undefined && allZoneMpIds.has(mpId)) affectedCities.push(name);
    }
    document.getElementById("info").textContent =
        `${coastalStarts.length} coastal sources | ${allZoneMpIds.size} mileposts affected | ${affectedCities.length} cities: ${affectedCities.join(", ")}`;
}

// === Init ===
generateHexGrid();
render();
window.addEventListener("resize", render);
</script>
</body>
</html>
