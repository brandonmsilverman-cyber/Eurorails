<style>
  body {
    background: #2a2a2a;

    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
    gap: 32px;
  }
  .train-card {
    background: #3a3a3a;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 20px 30px;
    text-align: center;
  }
  .train-card h2 {
    margin: 0 0 4px 0;
    font-size: 18px;
    color: #fff;
  }
  .train-card .stats {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 12px;
  }
  svg {
    display: block;
    margin: 0 auto;
  }
</style>
</head>
