    // HiDPI/Retina support for sharp rendering
    const dpr = window.devicePixelRatio || 1;
    const container = canvas.parentElement;
    const containerW = container.clientWidth;
    const containerH = container.clientHeight;
    const zoom = gameState.zoom || 1;

    // Canvas size scales with zoom; at zoom=1 it fits the container exactly
    const cssWidth = Math.round(containerW * zoom);
    const cssHeight = Math.round(containerH * zoom);
    canvas.width = cssWidth * dpr;
    canvas.height = cssHeight * dpr;
    canvas.style.width = cssWidth + 'px';
    canvas.style.height = cssHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const width = cssWidth;
    const height = cssHeight;

    // Scale factor (maps world coords to CSS pixels)
    const worldW = WORLD_BOUNDS.maxX - WORLD_BOUNDS.minX;
    const worldH = WORLD_BOUNDS.maxY - WORLD_BOUNDS.minY;
    const scale = Math.min(width / worldW, height / worldH);
    // Position map so Ireland clears the left panel at zoom=1;
    // at higher zoom levels, center normally (user scrolls around)
    const panelRight = 560; // left panel right edge + ocean gap before Ireland
    const irelandInset = 5 * scale; // Ireland starts ~5 world units from WORLD_BOUNDS.minX
    const panelClearOffset = Math.max(0, Math.min(panelRight - irelandInset, width - worldW * scale));
    const centerOffset = (width - worldW * scale) / 2;
    const offsetX = (gameState.zoom || 1) === 1 ? panelClearOffset : centerOffset;
    const offsetY = (height - worldH * scale) / 2;

    function worldToScreen(x, y) {
        return [(x - WORLD_BOUNDS.minX) * scale + offsetX, (y - WORLD_BOUNDS.minY) * scale + offsetY];
    }

    // Compute a UI scale factor for element sizes (not coordinates)
    // scale maps world-units to pixels; uiScale is a gentler factor for dots/text
    const uiScale = Math.max(0.5, Math.min(1.5, scale / 15));

    // Draw ocean/water background with globe-like texture
    // 1. Radial gradient for globe curvature effect
    const centerX = width / 2;
    const centerY = height / 2;
    const maxR = Math.max(width, height) * 0.75;
    const oceanGrad = ctx.createRadialGradient(centerX * 0.9, centerY * 0.8, 0, centerX, centerY, maxR);
    oceanGrad.addColorStop(0, "#3a7fc1");   // bright center (globe highlight)
    oceanGrad.addColorStop(0.35, "#2c6faa");
    oceanGrad.addColorStop(0.65, "#1f5a8f");
    oceanGrad.addColorStop(1.0, "#0e3560");  // dark edges (atmosphere fade)
    ctx.fillStyle = oceanGrad;
    ctx.fillRect(0, 0, width, height);

    // 2. Subtle wave patterns
    ctx.save();
    ctx.globalAlpha = 0.07;
    ctx.strokeStyle = "#a0d4ff";
    ctx.lineWidth = Math.max(0.8, 1.2 * (scale / 15));
    // Use a seeded pattern so waves are stable across redraws
    for (let wy = -20; wy < height + 20; wy += Math.max(12, 18 * (scale / 15))) {
        ctx.beginPath();
        const waveOffset = (wy * 0.37) % 40;
        for (let wx = -20; wx < width + 20; wx += 3) {
            const yOff = Math.sin((wx + waveOffset) * 0.015) * 6 * (scale / 15)
                       + Math.sin((wx + waveOffset) * 0.035) * 3 * (scale / 15);
            if (wx === -20) ctx.moveTo(wx, wy + yOff);
            else ctx.lineTo(wx, wy + yOff);
        }
        ctx.stroke();
    }
    ctx.restore();

    // 3. Cloud/atmosphere wisps
    ctx.save();
    const cloudPositions = [
        { x: 0.08, y: 0.12, rx: 0.12, ry: 0.025, alpha: 0.06 },
        { x: 0.85, y: 0.08, rx: 0.10, ry: 0.02, alpha: 0.05 },
        { x: 0.15, y: 0.88, rx: 0.14, ry: 0.022, alpha: 0.07 },
        { x: 0.78, y: 0.92, rx: 0.11, ry: 0.02, alpha: 0.05 },
        { x: 0.50, y: 0.05, rx: 0.18, ry: 0.018, alpha: 0.04 },
        { x: 0.92, y: 0.50, rx: 0.06, ry: 0.04, alpha: 0.06 },
        { x: 0.03, y: 0.55, rx: 0.07, ry: 0.03, alpha: 0.05 },
        { x: 0.40, y: 0.95, rx: 0.15, ry: 0.02, alpha: 0.05 },
        { x: 0.65, y: 0.03, rx: 0.09, ry: 0.015, alpha: 0.04 },
        { x: 0.20, y: 0.30, rx: 0.08, ry: 0.015, alpha: 0.03 },
        { x: 0.70, y: 0.65, rx: 0.09, ry: 0.018, alpha: 0.04 },
        { x: 0.55, y: 0.80, rx: 0.07, ry: 0.02, alpha: 0.03 },
    ];
    for (const cloud of cloudPositions) {
        const cx = cloud.x * width;
        const cy = cloud.y * height;
        const rx = cloud.rx * width;
        const ry = cloud.ry * height;
        const cloudGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(rx, ry));
        cloudGrad.addColorStop(0, `rgba(255, 255, 255, ${cloud.alpha})`);
        cloudGrad.addColorStop(0.6, `rgba(220, 240, 255, ${cloud.alpha * 0.5})`);
        cloudGrad.addColorStop(1, "rgba(200, 230, 255, 0)");
        ctx.fillStyle = cloudGrad;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    // 4. Vignette edge darkening for globe atmosphere
    ctx.save();
    const vignetteGrad = ctx.createRadialGradient(centerX, centerY, maxR * 0.5, centerX, centerY, maxR * 1.1);
    vignetteGrad.addColorStop(0, "rgba(0, 0, 0, 0)");
    vignetteGrad.addColorStop(0.7, "rgba(0, 10, 30, 0.08)");
    vignetteGrad.addColorStop(1, "rgba(0, 5, 20, 0.25)");
    ctx.fillStyle = vignetteGrad;
    ctx.fillRect(0, 0, width, height);
    ctx.restore();

    // 5. Ocean body labels — moved to after landmass drawing (see below)

    // Draw landmasses: fill, stroke coastlines, then fill again
    // The second fill covers internal border strokes where polygons overlap
    // while the outward-facing stroke (on water) remains visible
    function drawLandmassShapes(mode) {
        for (let landmass of Object.values(LANDMASSES)) {
            ctx.beginPath();
            for (let i = 0; i < landmass.length; i++) {
                const [sx, sy] = worldToScreen(landmass[i][0], landmass[i][1]);
                if (i === 0) ctx.moveTo(sx, sy);
                else ctx.lineTo(sx, sy);
            }
            ctx.closePath();
            if (mode === "fill") {
                ctx.fillStyle = "#9cc09c";
                ctx.fill();
            } else {
                ctx.stroke();
            }
        }
    }
    drawLandmassShapes("fill");
    ctx.strokeStyle = "#5a8a5a";
    ctx.lineWidth = 2.4;
    drawLandmassShapes("stroke");
    drawLandmassShapes("fill");

    // Draw terrain regions as soft radial gradients, clipped to land
    ctx.save();
    // Build a clipping path from all landmasses so terrain doesn't bleed into ocean
    ctx.beginPath();
    for (let landmass of Object.values(LANDMASSES)) {
        for (let i = 0; i < landmass.length; i++) {
            const [sx, sy] = worldToScreen(landmass[i][0], landmass[i][1]);
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
        }
        ctx.closePath();
    }
    ctx.clip();

    // Helper: draw a soft radial gradient for a terrain polygon
    function drawTerrainGlow(polygon, r, g, b, maxAlpha) {
        // Find centroid and max radius in screen space
        let cx = 0, cy = 0;
        const n = polygon.length - 1; // last point may repeat first
        const pts = [];
        for (let i = 0; i < polygon.length; i++) {
            const [sx, sy] = worldToScreen(polygon[i][0], polygon[i][1]);
            pts.push([sx, sy]);
            if (i < n) { cx += sx; cy += sy; }
        }
        cx /= n;
        cy /= n;
        // Find max distance from centroid to any vertex
        let maxR = 0;
        for (let i = 0; i < n; i++) {
            const d = Math.hypot(pts[i][0] - cx, pts[i][1] - cy);
            if (d > maxR) maxR = d;
        }
        // Extend radius a bit for soft falloff
        const outerR = maxR * 1.15;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, outerR);
        grad.addColorStop(0, `rgba(${r},${g},${b},${maxAlpha})`);
        grad.addColorStop(0.5, `rgba(${r},${g},${b},${maxAlpha * 0.6})`);
        grad.addColorStop(0.85, `rgba(${r},${g},${b},${maxAlpha * 0.2})`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grad;
        // Fill a large rect covering the gradient area (clipped to land already)
        ctx.fillRect(cx - outerR, cy - outerR, outerR * 2, outerR * 2);
    }

    for (let polygon of TERRAIN_REGIONS.alpine) {
        drawTerrainGlow(polygon, 230, 230, 245, 0.35);
    }
    for (let polygon of TERRAIN_REGIONS.mountain) {
        drawTerrainGlow(polygon, 110, 85, 45, 0.30);
    }
    ctx.restore();

    // Draw ocean body labels (after landmasses so they aren't covered)
    ctx.save();
    const oceanLabels = [
        { name: "Atlantic\nOcean", x: 6, y: 38, size: 1.3, angle: -0.15 },
        { name: "North\nSea", x: 32, y: 18, size: 0.9, angle: 0 },
        { name: "Norwegian Sea", x: 22, y: 6, size: 0.8, angle: 0 },
        { name: "Bay of\nBiscay", x: 19, y: 48, size: 0.8, angle: 0 },
        { name: "Mediterranean Sea", x: 34, y: 58, size: 0.9, angle: 0.05 },
        { name: "Baltic\nSea", x: 53, y: 17, size: 0.8, angle: 0.2 },
        { name: "English Channel", x: 27, y: 32, size: 0.6, angle: -0.1 },
    ];
    for (const ol of oceanLabels) {
        const [sx, sy] = worldToScreen(ol.x, ol.y);
        const fontSize = Math.max(7, 10 * uiScale * ol.size);
        ctx.font = `italic ${fontSize}px Georgia, serif`;
        ctx.fillStyle = "rgba(140, 190, 230, 0.35)";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(ol.angle || 0);
        const lines = ol.name.split("\n");
        const lineH = fontSize * 1.2;
        const startY = -(lines.length - 1) * lineH / 2;
        for (let li = 0; li < lines.length; li++) {
            ctx.fillText(lines[li], 0, startY + li * lineH);
        }
        ctx.restore();
    }
    ctx.restore();

    // Draw rivers (smooth Catmull-Rom splines with snaky meandering)
    ctx.strokeStyle = "#4488cc";
    ctx.lineWidth = Math.max(1, 1.5 * uiScale);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    for (let rIdx = 0; rIdx < Object.values(RIVERS).length; rIdx++) {
        const river = Object.values(RIVERS)[rIdx];
        // Subdivide: insert meandering midpoints with deterministic pseudo-random variation
        // Simple seeded hash for deterministic but varied results
        function riverHash(a, b, c) {
            let h = (a * 2654435761 ^ b * 2246822519 ^ c * 3266489917) >>> 0;
            h = ((h >> 16) ^ h) * 0x45d9f3b >>> 0;
            return (h & 0xffff) / 0xffff; // 0..1
        }
        const subdivided = [river[0]];
        for (let i = 0; i < river.length - 1; i++) {
            const [x1, y1] = river[i];
            const [x2, y2] = river[i + 1];
            const dx = x2 - x1, dy = y2 - y1;
            const len = Math.sqrt(dx * dx + dy * dy);
            const nx = -dy / len, ny = dx / len;
            // 2 intermediate points with varied placement and amplitude
            for (let j = 1; j <= 2; j++) {
                const h1 = riverHash(rIdx, i, j);
                const h2 = riverHash(rIdx, i, j + 100);
                // Vary the t position slightly (jitter ±0.08 around evenly spaced)
                const t = j / 3 + (h1 - 0.5) * 0.16;
                const mx = x1 + dx * t;
                const my = y1 + dy * t;
                // Vary amplitude between 0.02 and 0.07 of segment length
                const amplitude = len * (0.02 + h2 * 0.05);
                // Alternating direction with hash-based sign
                const sign = (Math.round(h1 * 1000) % 2 === 0) ? 1 : -1;
                subdivided.push([mx + nx * sign * amplitude, my + ny * sign * amplitude]);
            }
            subdivided.push(river[i + 1]);
        }
        const pts = subdivided.map(p => worldToScreen(p[0], p[1]));
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        if (pts.length === 2) {
            ctx.lineTo(pts[1][0], pts[1][1]);
        } else {
            // Catmull-Rom to cubic Bézier conversion
            const tension = 0.6;
            for (let i = 0; i < pts.length - 1; i++) {
                const p0 = pts[Math.max(0, i - 1)];
                const p1 = pts[i];
                const p2 = pts[i + 1];
                const p3 = pts[Math.min(pts.length - 1, i + 2)];
                const cp1x = p1[0] + (p2[0] - p0[0]) / (6 / tension);
                const cp1y = p1[1] + (p2[1] - p0[1]) / (6 / tension);
                const cp2x = p2[0] - (p3[0] - p1[0]) / (6 / tension);
                const cp2y = p2[1] - (p3[1] - p1[1]) / (6 / tension);
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2[0], p2[1]);
            }
        }
        ctx.stroke();
    }

    // Draw river labels
    const riverLabels = {
        rhine: { x: 41.8, y: 31, name: "Rhine" },
        danube: { x: 56, y: 39.8, name: "Danube" },
        loire: { x: 30, y: 38.2, name: "Loire" },
        elbe: { x: 47.8, y: 24, name: "Elbe" },
        vistula: { x: 58.8, y: 23.2, name: "Vistula" },
        po: { x: 45, y: 43.8, name: "Po" },
        rhone: { x: 36.5, y: 47, name: "Rhône" },
        seine: { x: 32.5, y: 35.2, name: "Seine" },
        garonne: { x: 30.5, y: 49.5, name: "Garonne" },
        douro: { x: 19, y: 52.8, name: "Douro" }
    };
    ctx.font = `italic ${Math.max(7, 8 * uiScale)}px Arial`;
    ctx.fillStyle = "rgba(50, 100, 180, 0.8)";
    ctx.textAlign = "center";
    for (let key in riverLabels) {
        const rl = riverLabels[key];
        const [sx, sy] = worldToScreen(rl.x, rl.y);
        ctx.fillText(rl.name, sx, sy);
    }

    // Draw ferry routes (snapped to mileposts) with soft styling + ownership
    if (gameState.ferryConnections) {
        for (let fc of gameState.ferryConnections) {
            const mpFrom = gameState.mileposts_by_id[fc.fromId];
            const mpTo = gameState.mileposts_by_id[fc.toId];
            if (!mpFrom || !mpTo) continue;
            const [sx1, sy1] = worldToScreen(mpFrom.x, mpFrom.y);
            const [sx2, sy2] = worldToScreen(mpTo.x, mpTo.y);

            const ferryKey = getFerryKey(fc.fromId, fc.toId);
            const owners = gameState.ferryOwnership[ferryKey] || [];

            // Soft glow underneath
            ctx.save();
            ctx.strokeStyle = "rgba(100, 180, 240, 0.25)";
            ctx.lineWidth = Math.max(6, 8 * uiScale);
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(sx1, sy1);
            ctx.lineTo(sx2, sy2);
            ctx.stroke();
            ctx.restore();

            if (owners.length > 0) {
                // Draw ownership lines — one or two colored lines offset from center
                const dx = sx2 - sx1;
                const dy = sy2 - sy1;
                const len = Math.hypot(dx, dy);
                // Perpendicular offset direction
                const nx = -dy / len;
                const ny = dx / len;
                const offsetDist = owners.length === 2 ? Math.max(2, 2.5 * uiScale) : 0;

                for (let oi = 0; oi < owners.length; oi++) {
                    const sign = owners.length === 2 ? (oi === 0 ? -1 : 1) : 0;
                    const ox = nx * offsetDist * sign;
                    const oy = ny * offsetDist * sign;

                    ctx.strokeStyle = COLOR_MAP[owners[oi]] || "#ffffff";
                    ctx.lineWidth = Math.max(2, 2.5 * uiScale);
                    ctx.setLineDash([8, 4]);
                    ctx.beginPath();
                    ctx.moveTo(sx1 + ox, sy1 + oy);
                    ctx.lineTo(sx2 + ox, sy2 + oy);
                    ctx.stroke();
                }
            } else {
                // Unowned: default dashed line
                ctx.strokeStyle = "rgba(140, 200, 255, 0.8)";
                ctx.lineWidth = Math.max(1.5, 2 * uiScale);
                ctx.setLineDash([6, 4]);
                ctx.beginPath();
                ctx.moveTo(sx1, sy1);
                ctx.lineTo(sx2, sy2);
                ctx.stroke();
            }

            // Small port circles at endpoints (colored if owned)
            const portColor = owners.length > 0 ? (COLOR_MAP[owners[0]] || "#ffffff") : "rgba(140, 200, 255, 0.6)";
            const portStroke = owners.length > 0 ? portColor : "rgba(100, 170, 230, 0.9)";
            for (let [sx, sy] of [[sx1, sy1], [sx2, sy2]]) {
                ctx.beginPath();
                ctx.arc(sx, sy, Math.max(3, 4 * uiScale), 0, Math.PI * 2);
                ctx.fillStyle = portColor;
                ctx.globalAlpha = owners.length > 0 ? 0.8 : 0.6;
                ctx.fill();
                ctx.globalAlpha = 1.0;
                ctx.strokeStyle = portStroke;
                ctx.lineWidth = 1;
                ctx.setLineDash([]);
                ctx.stroke();
            }

            // Ferry label at midpoint with per-route offsets to avoid overlaps
            const ferryLabelOffsets = {
                "London-Amsterdam": { dx: 0, dy: -12 },
                "Dover-Calais": { dx: 0, dy: 6 },
                "Newcastle-Århus": { dx: 0, dy: -8 },
            };
            const flOff = ferryLabelOffsets[fc.name] || { dx: 0, dy: 0 };
            const midX = (sx1 + sx2) / 2 + flOff.dx * uiScale;
            const midY = (sy1 + sy2) / 2 + flOff.dy * uiScale;
            ctx.font = `${Math.max(7, 8 * uiScale)}px Arial`;
            ctx.fillStyle = "rgba(200, 230, 255, 0.85)";
            ctx.textAlign = "center";
            ctx.fillText(`⛴ ${fc.name}`, midX, midY - 4 * uiScale);
            const ownerLabel = owners.length > 0 ? ` (${owners.length}/2)` : "";
            ctx.fillText(`${fc.cost}M${ownerLabel}`, midX, midY + 8 * uiScale);
        }
        ctx.setLineDash([]);
    }

    // Country borders removed to simplify the map

    // Draw mileposts with terrain-specific icons
    const mpSize = Math.max(1.5, 2 * uiScale);
    for (let mp of gameState.mileposts) {
        const [sx, sy] = worldToScreen(mp.x, mp.y);

        if (!mp.city) {
            if (mp.terrain === "alpine") {
                // White/hollow triangle for alpine
                ctx.strokeStyle = "rgba(80, 80, 110, 0.8)";
                ctx.fillStyle = "rgba(210, 210, 235, 0.85)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(sx, sy - mpSize * 1.2);
                ctx.lineTo(sx - mpSize, sy + mpSize * 0.7);
                ctx.lineTo(sx + mpSize, sy + mpSize * 0.7);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            } else if (mp.terrain === "mountain") {
                // Dark/filled triangle for mountain
                ctx.fillStyle = "rgba(70, 50, 30, 0.8)";
                ctx.beginPath();
                ctx.moveTo(sx, sy - mpSize * 1.2);
                ctx.lineTo(sx - mpSize, sy + mpSize * 0.7);
                ctx.lineTo(sx + mpSize, sy + mpSize * 0.7);
                ctx.closePath();
                ctx.fill();
            } else {
                // Circle/dot for clear terrain
                ctx.fillStyle = "rgba(60, 60, 60, 0.45)";
                ctx.beginPath();
                ctx.arc(sx, sy, mpSize * 0.7, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // Build set of struck colors for Strike 123 track rendering
    const struckTrackColors = new Set();
    for (const ae of gameState.activeEvents) {
        if (ae.card.id === 123) {
            struckTrackColors.add(gameState.players[ae.drawingPlayerIndex].color);
        }
    }

    // Draw tracks
    ctx.lineWidth = Math.max(2, 3 * uiScale);
    const tracksByColor = {};
    for (let track of gameState.tracks) {
        if (!tracksByColor[track.color]) tracksByColor[track.color] = [];
        tracksByColor[track.color].push(track);
    }

    for (let color in tracksByColor) {
        const isStruck = struckTrackColors.has(color);
        if (isStruck) {
            ctx.globalAlpha = 0.35;
            ctx.setLineDash([6 * uiScale, 5 * uiScale]);
        }
        ctx.strokeStyle = COLOR_MAP[color] || "#ffffff";
        for (let track of tracksByColor[color]) {
            const from = gameState.mileposts_by_id[track.from];
            const to = gameState.mileposts_by_id[track.to];
            const [sx1, sy1] = worldToScreen(from.x, from.y);
            const [sx2, sy2] = worldToScreen(to.x, to.y);
            ctx.beginPath();
            ctx.moveTo(sx1, sy1);
            ctx.lineTo(sx2, sy2);
            ctx.stroke();
        }
        if (isStruck) {
            ctx.globalAlpha = 1.0;
            ctx.setLineDash([]);
        }
    }

    // Draw path preview with green/red split for partial builds/moves
    if (gameState.pathPreview) {
        const isValid = gameState.pathPreviewValid !== false;
        const cutoff = gameState.pathPreviewCutoff;
        const hasPartial = cutoff != null && cutoff > 0 && cutoff < gameState.pathPreview.length - 1;
        const foreignSegs = gameState.pathPreviewForeignSegments || [];
        ctx.lineWidth = Math.max(2, 3 * uiScale);
        ctx.setLineDash([6 * uiScale, 4 * uiScale]);

        for (let i = 0; i < gameState.pathPreview.length - 1; i++) {
            const from = gameState.mileposts_by_id[gameState.pathPreview[i]];
            const to = gameState.mileposts_by_id[gameState.pathPreview[i + 1]];
            const [sx1, sy1] = worldToScreen(from.x, from.y);
            const [sx2, sy2] = worldToScreen(to.x, to.y);

            const isForeignSeg = foreignSegs.includes(i);

            // Green for affordable portion, red for remainder, orange for foreign track
            if (hasPartial) {
                if (i >= cutoff) {
                    ctx.strokeStyle = "rgba(255, 80, 80, 0.7)";
                } else if (isForeignSeg) {
                    ctx.strokeStyle = "rgba(255, 180, 50, 0.9)";
                } else {
                    ctx.strokeStyle = "rgba(100, 255, 100, 0.8)";
                }
            } else {
                if (isForeignSeg && isValid) {
                    ctx.strokeStyle = "rgba(255, 180, 50, 0.9)";
                } else {
                    ctx.strokeStyle = isValid ? "rgba(100, 255, 100, 0.8)" : "rgba(255, 80, 80, 0.7)";
                }
            }

            // Foreign track segments get thicker dashed line
            if (isForeignSeg) {
                ctx.lineWidth = Math.max(3, 4 * uiScale);
                ctx.setLineDash([4 * uiScale, 4 * uiScale]);
            } else {
                ctx.lineWidth = Math.max(2, 3 * uiScale);
                ctx.setLineDash([6 * uiScale, 4 * uiScale]);
            }
            ctx.beginPath();
            ctx.moveTo(sx1, sy1);
            ctx.lineTo(sx2, sy2);
            ctx.stroke();
        }
        ctx.setLineDash([]);

        // Draw cost label at the end of the preview path
        if (gameState.pathPreviewCost != null && gameState.pathPreview.length > 1) {
            const lastMp = gameState.mileposts_by_id[gameState.pathPreview[gameState.pathPreview.length - 1]];
            const [lx, ly] = worldToScreen(lastMp.x, lastMp.y);
            const segments = gameState.pathPreview.length - 1;
            const hasForeign = foreignSegs.length > 0;
            let trackageFee = 0;
            if (hasForeign && gameState.phase === "operate") {
                const cp = gameState.players[gameState.currentPlayerIndex];
                const owners = getForeignTrackOwners(gameState.pathPreview, segments, cp.color, foreignSegs);
                for (const oc of owners) {
                    if (!gameState.trackageRightsPaidThisTurn[oc]) trackageFee += 4;
                }
            }
            let costText;
            const isOperate = gameState.phase === "operate";
            const costHasHalfSpeed = isOperate && gameState.pathPreviewCost > segments;
            if (hasPartial) {
                if (isOperate) {
                    costText = `${gameState.pathPreviewCost}mp · ${cutoff}/${segments} steps`;
                } else {
                    costText = `${gameState.pathPreviewCost}M total · ${cutoff}/${segments} seg`;
                }
                if (trackageFee > 0) costText += ` · 🚂${trackageFee}M rent`;
                else if (hasForeign) costText += ` · 🚂paid`;
            } else if (hasForeign) {
                costText = trackageFee > 0 ? `${segments} seg · 🚂${trackageFee}M rent` : `${segments} seg · 🚂paid`;
            } else if (isOperate) {
                costText = costHasHalfSpeed ? `${gameState.pathPreviewCost}mp (${segments} steps, half-speed)` : `${segments} steps`;
            } else {
                costText = `${gameState.pathPreviewCost}M (${segments} seg)`;
            }
            const labelValid = hasPartial ? true : isValid; // partial is "valid" (green label) since you can build part
            const fontSize = Math.max(11, 13 * uiScale);
            ctx.font = `bold ${fontSize}px Arial`;
            const textWidth = ctx.measureText(costText).width;
            const pad = 4 * uiScale;
            const bgX = lx + 10 * uiScale;
            const bgY = ly - 10 * uiScale - fontSize;
            ctx.fillStyle = hasPartial ? "rgba(50, 40, 10, 0.9)" : (labelValid ? "rgba(20, 60, 20, 0.9)" : "rgba(80, 20, 20, 0.9)");
            ctx.beginPath();
            ctx.roundRect(bgX - pad, bgY - pad, textWidth + pad * 2, fontSize + pad * 2, 4);
            ctx.fill();
            ctx.strokeStyle = hasPartial ? "rgba(255, 200, 50, 0.6)" : (labelValid ? "rgba(100, 255, 100, 0.6)" : "rgba(255, 80, 80, 0.6)");
            ctx.lineWidth = 1;
            ctx.setLineDash([]);
            ctx.stroke();
            ctx.fillStyle = hasPartial ? "#ffdd66" : (labelValid ? "#88ff88" : "#ff8888");
            ctx.fillText(costText, bgX, bgY + fontSize);
        }
    }

    // Draw city dots (on top of tracks)
    for (let mp of gameState.mileposts) {
        if (!mp.city) continue;
        const [sx, sy] = worldToScreen(mp.x, mp.y);

        if (MAJOR_CITIES.includes(mp.city.name)) {
            // Major city - large red dot with white border
            ctx.fillStyle = "#dd2222";
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = Math.max(1, 1.5 * uiScale);
            ctx.beginPath();
            ctx.arc(sx, sy, Math.max(4, 6 * uiScale), 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        } else if (mp.city.type === "medium") {
            // Medium city - blue dot
            ctx.fillStyle = "#3355cc";
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = Math.max(0.5, 1 * uiScale);
            ctx.beginPath();
            ctx.arc(sx, sy, Math.max(3, 4 * uiScale), 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        } else {
            // Small city - green dot
            ctx.fillStyle = "#339933";
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = Math.max(0.5, 0.8 * uiScale);
            ctx.beginPath();
            ctx.arc(sx, sy, Math.max(2, 3 * uiScale), 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        }
    }

    // Draw city labels
    const majorFontSize = Math.max(9, Math.round(10 * uiScale));
    const otherFontSize = Math.max(7, Math.round(8 * uiScale));

    // Label offsets to avoid overlaps: [dx, dy] in screen pixels relative to default position
    // Positive dy = lower, negative dy = above city. dx shifts left/right.
    const LABEL_OFFSETS = {
        "Glasgow": [0, -14],       // above (too close to Edinburgh)
        "Antwerpen": [0, -14],     // above (too close to Bruxelles)
        "Hamburg": [12, 0],        // right (too close to Bremen)
        "Szczecin": [0, -14],      // above (too close to Berlin)
        "Zürich": [12, 0],         // right (too close to Stuttgart & Bern)
        "Lodz": [0, -14],          // above (too close to Warszawa)
        "Torino": [-12, 0],        // left (too close to Lyon & Milano)
        "Bern": [-12, 0],          // left (too close to Zürich)
        "Cardiff": [-12, 0],       // left (near English Channel label)
    };

    ctx.textBaseline = "top";

    for (let cityName in gameState.cityToMilepost) {
        const mpId = gameState.cityToMilepost[cityName];
        const mp = gameState.mileposts_by_id[mpId];
        const [sx, sy] = worldToScreen(mp.x, mp.y);
        const isMajor = MAJOR_CITIES.includes(cityName);
        const fontSize = isMajor ? majorFontSize : otherFontSize;
        const dotRadius = isMajor ? Math.max(4, 6 * uiScale) : Math.max(2, 4 * uiScale);

        const offset = LABEL_OFFSETS[cityName] || [0, 0];
        const labelX = sx + offset[0] * uiScale;
        const labelAbove = offset[1] < 0;
        let labelY;
        if (labelAbove) {
            labelY = sy - dotRadius + (offset[1] * uiScale);
            ctx.textBaseline = "bottom";
        } else {
            labelY = sy + dotRadius + 2 + (offset[1] > 0 ? offset[1] * uiScale : 0);
            ctx.textBaseline = "top";
        }
        ctx.textAlign = "center";

        ctx.font = `${isMajor ? 'bold ' : ''}${fontSize}px Arial, sans-serif`;

        // Draw text shadow/outline for readability
        ctx.fillStyle = "#000000";
        ctx.fillText(cityName, labelX + 1, labelY);
        ctx.fillText(cityName, labelX - 1, labelY);
        ctx.fillText(cityName, labelX, labelY + 1);
        ctx.fillText(cityName, labelX, labelY - 1);

        // Draw city name
        ctx.fillStyle = "#ffffff";
        ctx.fillText(cityName, labelX, labelY);

        // Draw goods icons below city name
        const cityData = CITIES[cityName];
        if (cityData && cityData.goods && cityData.goods.length > 0) {
            const iconFontSize = Math.max(11, 14 * uiScale);
            ctx.font = `${iconFontSize}px Arial, sans-serif`;
            const icons = cityData.goods.map(g => GOODS_ICONS[g] || "?").join(" ");
            ctx.fillText(icons, sx, sy + dotRadius + 2 + fontSize + 4);
        }
    }

    // Draw highlighted cities (from demand card row hover)
    const hl = gameState.highlightedCities;
    if (hl.origins.length > 0 || hl.destination) {
        function drawCityHighlight(cityName, color, glowColor) {
            const mpId = gameState.cityToMilepost[cityName];
            if (mpId === undefined) return;
            const mp = gameState.mileposts_by_id[mpId];
            const [sx, sy] = worldToScreen(mp.x, mp.y);
            // Drop shadow for contrast
            ctx.save();
            ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 1;
            // Inner ring
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(sx, sy, Math.max(10, 16 * uiScale), 0, Math.PI * 2);
            ctx.stroke();
            // Outer glow (no shadow on this layer)
            ctx.shadowColor = "transparent";
            ctx.strokeStyle = glowColor;
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(sx, sy, Math.max(14, 20 * uiScale), 0, Math.PI * 2);
            ctx.stroke();
            // Label above (with shadow)
            ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
            ctx.shadowBlur = 3;
            ctx.shadowOffsetY = 1;
            ctx.fillStyle = color;
            ctx.font = `bold ${Math.max(10, 12 * uiScale)}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "bottom";
            ctx.fillText(cityName, sx, sy - Math.max(14, 20 * uiScale) - 2);
            ctx.restore();
        }
        for (const city of hl.origins) {
            drawCityHighlight(city, "#44bbff", "rgba(68, 187, 255, 0.5)");
        }
        if (hl.destination) {
            drawCityHighlight(hl.destination, "#ffdd44", "rgba(255, 221, 68, 0.4)");
        }
    }

    // Draw active event zones on map (hex-accurate borders)
    for (let aeIdx = 0; aeIdx < gameState.activeEvents.length; aeIdx++) {
        const ae = gameState.activeEvents[aeIdx];
        const evt = ae.card;
        if (!evt.radius) continue;
        if (evt.type !== "snow" && evt.type !== "fog" && evt.type !== "gale") continue;

        // Choose zone color by event type
        let zoneColor, borderColor, labelColor, shadowColor;
        if (evt.type === "snow") {
            zoneColor = [150, 200, 255];
            borderColor = "rgba(180, 220, 255, 0.85)";
            shadowColor = "rgba(150, 200, 255, 0.6)";
            labelColor = "#b8e0ff";
        } else if (evt.type === "fog") {
            zoneColor = [180, 180, 180];
            borderColor = "rgba(220, 220, 220, 0.8)";
            shadowColor = "rgba(200, 200, 200, 0.5)";
            labelColor = "#e0e0e0";
        } else {
            zoneColor = [80, 200, 200];
            borderColor = "rgba(100, 230, 230, 0.85)";
            shadowColor = "rgba(80, 220, 220, 0.5)";
            labelColor = "#90eeee";
        }

        const cr = zoneColor[0], cg = zoneColor[1], cb = zoneColor[2];

        // Collect all affected mileposts across all zone centers for this event
        const allZoneMpIds = new Set();
        const zoneCenterScreens = []; // for labels
        const centerMpIds = [];

        if (evt.city) {
            const cityMpId = gameState.cityToMilepost[evt.city];
            if (cityMpId !== undefined) {
                centerMpIds.push(cityMpId);
                const cityMp = gameState.mileposts_by_id[cityMpId];
                zoneCenterScreens.push({ label: evt.city, sx: worldToScreen(cityMp.x, cityMp.y) });
                for (const id of getMilepostsInHexRange(cityMpId, evt.radius)) allZoneMpIds.add(id);
            }
        }
        if (evt.seaAreas) {
            for (const areaName of evt.seaAreas) {
                const points = SEA_AREAS[areaName];
                if (!points) continue;
                zoneCenterScreens.push({ label: areaName, sx: worldToScreen(points[0].x, points[0].y) });
            }
            // Multi-source BFS from all coastal mileposts bordering these sea areas
            const coastalStarts = getCoastalMilepostsForSeaAreas(evt.seaAreas);
            centerMpIds.push(...coastalStarts);
            const seaZone = getMilepostsInHexRangeMultiSource(coastalStarts, evt.radius - 1);
            for (const id of seaZone) allZoneMpIds.add(id);
        }

        if (allZoneMpIds.size === 0) continue;

        // Convert zone mileposts to screen coordinates for hull
        const zoneScreenPoints = [];
        for (const id of allZoneMpIds) {
            const mp = gameState.mileposts_by_id[id];
            const [sx, sy] = worldToScreen(mp.x, mp.y);
            zoneScreenPoints.push([sx, sy]);
        }

        // Per-milepost buffer with offscreen canvas outline
        const hexScreenR = scale * 0.75;
        const borderWidth = Math.max(2, 2.5 * uiScale);

        const offscreen = document.createElement("canvas");
        offscreen.width = canvas.width;
        offscreen.height = canvas.height;
        const offCtx = offscreen.getContext("2d");
        offCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Draw solid zone shape on offscreen canvas
        offCtx.fillStyle = "#fff";
        for (const [sx, sy] of zoneScreenPoints) {
            offCtx.beginPath();
            offCtx.arc(sx, sy, hexScreenR, 0, Math.PI * 2);
            offCtx.fill();
        }

        // Cut out interior, leaving only the border ring
        offCtx.globalCompositeOperation = "destination-out";
        for (const [sx, sy] of zoneScreenPoints) {
            offCtx.beginPath();
            offCtx.arc(sx, sy, hexScreenR - borderWidth, 0, Math.PI * 2);
            offCtx.fill();
        }

        // Draw translucent fill on main canvas
        ctx.save();
        ctx.fillStyle = `rgba(${cr}, ${cg}, ${cb}, 0.18)`;
        for (const [sx, sy] of zoneScreenPoints) {
            ctx.beginPath();
            ctx.arc(sx, sy, hexScreenR, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();

        // Composite border ring onto main canvas
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.globalAlpha = 0.7;
        ctx.shadowColor = shadowColor;
        ctx.shadowBlur = 6;
        ctx.drawImage(offscreen, 0, 0);
        ctx.restore();

        // Labels
        for (const zc of zoneCenterScreens) {
            const [scx, scy] = zc.sx;
            const labelText = zoneCenterScreens.length > 1 ? zc.label : evt.title.replace(/^(Snow|Fog|Gale)!\s*/, "$1: ");
            ctx.font = `bold ${Math.max(9, 10 * uiScale)}px Arial`;
            ctx.textAlign = "center";
            const labelW = ctx.measureText(labelText).width + 12;
            // Place label above the top of the hull near this center
            const topY = Math.min(...zoneScreenPoints.map(p => p[1]));
            const labelY = topY - Math.max(8, 10 * uiScale);
            const bannerH = Math.max(14, 16 * uiScale);
            const bannerTop = labelY - Math.max(9, 10 * uiScale);
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.beginPath();
            ctx.roundRect(scx - labelW / 2, bannerTop, labelW, bannerH, 3);
            ctx.fill();
            ctx.fillStyle = labelColor;
            ctx.textBaseline = "middle";
            ctx.fillText(labelText, scx, bannerTop + bannerH / 2);
        }

        // Snow: mark blocked mountain/alpine mileposts in zone with red X
        if (evt.type === "snow") {
            for (const id of allZoneMpIds) {
                const mp = gameState.mileposts_by_id[id];
                if (!evt.blockedTerrain || !evt.blockedTerrain.includes(mp.terrain)) continue;
                const [sx, sy] = worldToScreen(mp.x, mp.y);
                const xSize = Math.max(3, 4 * uiScale);
                ctx.strokeStyle = "rgba(255, 80, 80, 0.7)";
                ctx.lineWidth = Math.max(1, 1.5 * uiScale);
                ctx.beginPath();
                ctx.moveTo(sx - xSize, sy - xSize);
                ctx.lineTo(sx + xSize, sy + xSize);
                ctx.moveTo(sx + xSize, sy - xSize);
                ctx.lineTo(sx - xSize, sy + xSize);
                ctx.stroke();
            }
        }
    }

    // Draw strike 121/122 blocked city markers
    for (const ae of gameState.activeEvents) {
        const evt = ae.card;
        if (evt.id !== 121 && evt.id !== 122) continue;
        for (const mp of gameState.mileposts) {
            if (!mp.city) continue;
            const d = gameState.coastDistance[mp.id];
            if (d === undefined) continue;
            const blocked = (evt.id === 121 && d > evt.radius) || (evt.id === 122 && d <= evt.radius);
            if (!blocked) continue;
            const [sx, sy] = worldToScreen(mp.x, mp.y);
            const ringRadius = Math.max(6, 9 * uiScale);
            const xSize = Math.max(4, 5 * uiScale);
            // Red ring
            ctx.beginPath();
            ctx.arc(sx, sy, ringRadius, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(255, 60, 60, 0.7)";
            ctx.lineWidth = Math.max(1.5, 2 * uiScale);
            ctx.stroke();
            // Red X
            ctx.strokeStyle = "rgba(255, 60, 60, 0.6)";
            ctx.lineWidth = Math.max(1, 1.5 * uiScale);
            ctx.beginPath();
            ctx.moveTo(sx - xSize, sy - xSize);
            ctx.lineTo(sx + xSize, sy + xSize);
            ctx.moveTo(sx + xSize, sy - xSize);
            ctx.lineTo(sx - xSize, sy + xSize);
            ctx.stroke();
        }
    }

    // Draw trains (player pawns)
    for (let player of gameState.players) {
        if (player.trainLocation !== null) {
            const mp = gameState.mileposts_by_id[player.trainLocation];
            if (mp) {
                const [sx, sy] = worldToScreen(mp.x, mp.y);
                const trainRadius = Math.max(5, 7 * uiScale);

                ctx.fillStyle = COLOR_MAP[player.color] || "#ffffff";
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = Math.max(1, 1.5 * uiScale);
                ctx.beginPath();
                ctx.arc(sx, sy, trainRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // Draw player initial inside
                ctx.fillStyle = "#ffffff";
                ctx.font = `bold ${Math.max(8, 9 * uiScale)}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(player.name[0], sx, sy);
            }
        }
    }

    // Highlight selected milepost
    if (gameState.selectedMilepost) {
        const [sx, sy] = worldToScreen(gameState.selectedMilepost.x, gameState.selectedMilepost.y);
        ctx.strokeStyle = "#ffff00";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(6, 10 * uiScale), 0, Math.PI * 2);
        ctx.stroke();
    }

    // Highlight hovered milepost with validity-based outline
    if (gameState.hoveredMilepost) {
        const [sx, sy] = worldToScreen(gameState.hoveredMilepost.x, gameState.hoveredMilepost.y);
        const isValid = gameState.hoverValid !== false; // null or true = valid
        const hoverColor = isValid ? "rgba(255, 255, 255, 0.85)" : "rgba(255, 80, 80, 0.85)";
        const glowColor = isValid ? "rgba(255, 255, 255, 0.3)" : "rgba(255, 80, 80, 0.3)";

        ctx.strokeStyle = hoverColor;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(7, 11 * uiScale), 0, Math.PI * 2);
        ctx.stroke();
        // Also add a soft glow
        ctx.strokeStyle = glowColor;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(9, 14 * uiScale), 0, Math.PI * 2);
        ctx.stroke();
    }

    // ---- LEGENDS as fixed HTML overlay ----
    const leftPanel = document.getElementById("leftPanelStack");
    if (leftPanel && gameState.gameStarted) {
        leftPanel.style.display = "flex";
    }
    const legendEl = document.getElementById("legendOverlay");
    if (legendEl && gameState.gameStarted) {
        // Build map legend once (static)
        if (!legendEl._mapBuilt) {
            const mlItems = [
                { symbol: "●", color: "#aaa", text: "Clear (1M)" },
                { symbol: "▲", color: "#8a7040", text: "Mountain (2M)" },
                { symbol: "△", color: "#888", text: "Alpine (5M)" },
                { symbol: "⬤", color: "#dd2222", text: "Major city (5M)" },
                { symbol: "⬤", color: "#3355cc", text: "Medium city (3M)" },
                { symbol: "⬤", color: "#339933", text: "Small city (3M)" },
                { symbol: "〰", color: "#4488cc", text: "River (+2M)" },
                { symbol: "---", color: "#88bbee", text: "Ferry route" },
            ];

            let mapHtml = '<div class="legend-box collapsed" id="mapLegendBox"><div class="legend-title" onclick="document.getElementById(\'mapLegendBox\').classList.toggle(\'collapsed\')">Map Legend <span class="collapse-icon">&#9660;</span></div><div class="legend-content">';
            for (const item of mlItems) {
                mapHtml += `<div class="legend-item"><span class="legend-symbol" style="color:${item.color}">${item.symbol}</span>${item.text}</div>`;
            }
            mapHtml += '</div></div>';
            mapHtml += '<div id="goodsLegendBox"></div>';

            legendEl.innerHTML = mapHtml;
            legendEl._mapBuilt = true;
        }

        // Rebuild goods legend every frame (supply counts change)
        const goodsBox = document.getElementById("goodsLegendBox");
        if (goodsBox) {
            const isCollapsed = goodsBox.querySelector('.legend-box.collapsed') !== null;
            const goodsKeys = Object.keys(GOODS_ICONS).sort();
            const collapseClass = isCollapsed || !goodsBox._initialized ? ' collapsed' : '';
            goodsBox._initialized = true;
            let goodsHtml = `<div class="legend-box${collapseClass}" id="goodsLegendInner"><div class="legend-title" onclick="document.getElementById('goodsLegendInner').classList.toggle('collapsed')">Goods Legend <span class="collapse-icon">&#9660;</span></div><div class="legend-content"><div class="goods-grid">`;
            for (const key of goodsKeys) {
                const goodData = GOODS[key];
                const inCirc = goodData ? getGoodsInCirculation(key) : 0;
                const maxChips = goodData ? goodData.chips : 0;
                const remaining = maxChips - inCirc;
                const exhausted = remaining <= 0;
                const itemStyle = exhausted ? 'opacity:0.35;' : '';
                const countColor = exhausted ? '#ff4444' : (remaining < maxChips ? '#ffaa44' : '#668877');
                const countText = `<span style="color:${countColor}; font-size:10px; margin-left:2px;">${remaining}/${maxChips}</span>`;
                const exhaustedTag = exhausted ? '<span style="color:#ff4444; font-size:10px; font-weight:bold;"> OUT</span>' : '';
                goodsHtml += `<div class="legend-item" style="${itemStyle}"><span class="legend-symbol">${GOODS_ICONS[key]}</span>${key}${exhaustedTag} ${countText}</div>`;
            }
            goodsHtml += '</div></div></div>';
            goodsBox.innerHTML = goodsHtml;
        }
    }

    // Render and position train status card below legends
    const trainCardEl = document.getElementById("trainCardOverlay");
    if (trainCardEl && gameState.gameStarted) {
        const currentPlayer = gameState.players[gameState.currentPlayerIndex];
        const tt = TRAIN_TYPES[currentPlayer.trainType];
        const pColor = COLOR_MAP[currentPlayer.color] || "#4a9eff";
        const locationName = getPlayerLocationName(currentPlayer);

        let loadsHtml = "";
        if (tt) {
            for (let i = 0; i < tt.capacity; i++) {
                if (i < currentPlayer.loads.length) {
                    const g = currentPlayer.loads[i];
                    loadsHtml += `<div class="load-item"><span>${GOODS_ICONS[g] || "?"}</span> ${g}</div>`;
                } else {
                    loadsHtml += `<div class="load-item empty-slot">— empty —</div>`;
                }
            }
        }

        // SVG train silhouettes — realistic side profiles, visual progression
        const trainSvgs = {
            "Freight": `<svg class="train-bg" width="340" height="70" viewBox="0 0 340 70" fill="${pColor}">
              <g transform="translate(340,0) scale(-1,1)">
                <!-- SMALL STEAM LOCOMOTIVE (centered: x=55 to x=285, sum=340) -->
                <!-- Cowcatcher -->
                <path d="M55,54 L60,54 L60,46 L57,46 Z" fill-opacity="0.5"/>
                <!-- Boiler -->
                <rect x="60" y="32" width="40" height="22" rx="1"/>
                <!-- Boiler top curvature -->
                <ellipse cx="80" cy="32" rx="20" ry="4"/>
                <!-- Smokebox front -->
                <rect x="58" y="30" width="7" height="24" rx="1" fill-opacity="0.8"/>
                <!-- Smokestack -->
                <rect x="63" y="18" width="5" height="14"/>
                <rect x="61" y="16" width="9" height="3" rx="1"/>
                <!-- Steam dome -->
                <ellipse cx="80" cy="28" rx="4" ry="3"/>
                <!-- Sand dome -->
                <ellipse cx="92" cy="29" rx="3" ry="2.5" fill-opacity="0.8"/>
                <!-- Cab -->
                <rect x="100" y="26" width="18" height="28" rx="1"/>
                <rect x="103" y="30" width="5" height="7" fill-opacity="0.3"/>
                <rect x="111" y="30" width="5" height="7" fill-opacity="0.3"/>
                <!-- Cab roof -->
                <rect x="98" y="24" width="22" height="3" rx="1" fill-opacity="0.7"/>
                <!-- Running board -->
                <rect x="60" y="52" width="40" height="1.5" fill-opacity="0.5"/>
                <!-- Leading truck wheel (small) -->
                <circle cx="65" cy="60" r="4"/><circle cx="65" cy="60" r="2.5" fill-opacity="0.3"/>
                <!-- Driving wheels (large) -->

function calculatePayout(distance, chips) {
    // Superlinear scaling: long routes are more efficient per hex than short ones.
    // Constant term ensures early-game short routes are still viable.
    // Rarer goods (chips=3) pay ~12% more than common goods (chips=4).
    const rarityBonus = chips === 3 ? 1.12 : 1.0;
    return Math.round((5 + Math.pow(distance, 1.3) * 0.25) * rarityBonus);
}

const DEMAND_MIN_DISTANCE = 5; // Filter out trivially short routes

function generateDeck() {
    const deck = [];
    const goodsKeys = Object.keys(GOODS);
    const cities = Object.keys(CITIES);

    const MIN_SPREAD = 15; // Shortest and longest demand must differ by at least this

    // Generate a single demand (good + destination + payout + minDist)
    function generateDemand() {
        const good = goodsKeys[Math.floor(Math.random() * goodsKeys.length)];
        const sources = GOODS[good].sources;
        const from = sources[Math.floor(Math.random() * sources.length)];
        let to, minDist, attempts = 0;
        do {
            to = cities[Math.floor(Math.random() * cities.length)];
            if (to === from || sources.includes(to)) { attempts++; continue; }
            const toCoords = CITIES[to];
            minDist = sources.reduce((min, src) => {
                if (src === to) return min;
                const sc = CITIES[src];
                return Math.min(min, Math.hypot(sc.x - toCoords.x, sc.y - toCoords.y));
            }, Infinity);
            attempts++;
        } while ((to === from || sources.includes(to) || minDist < DEMAND_MIN_DISTANCE) && attempts < 50);
        const payout = calculatePayout(minDist, GOODS[good].chips);
        return { good, from, to, payout, minDist };
    }

    // Generate 120 demand cards, each with 3 demands that have sufficient distance spread
    for (let i = 0; i < 120; i++) {
        let demands, cardAttempts = 0;
        do {
            demands = [generateDemand(), generateDemand(), generateDemand()];
            const dists = demands.map(d => d.minDist);
            const spread = Math.max(...dists) - Math.min(...dists);
            cardAttempts++;
        } while (demands.some(d => d.minDist === Infinity) ||
                 (Math.max(...demands.map(d => d.minDist)) - Math.min(...demands.map(d => d.minDist))) < MIN_SPREAD &&
                 cardAttempts < 30);
        // Sort demands by distance (short → long) for readable card layout
        demands.sort((a, b) => a.minDist - b.minDist);
        // Strip minDist from stored demand data
        deck.push({ type: "demand", demands: demands.map(({ minDist, ...rest }) => rest), fulfilled: [false, false, false] });
    }

    // Add 20 event cards
    for (let i = 0; i < EVENT_CARDS.length; i++) {
        deck.push({ type: "event", event: EVENT_CARDS[i] });
    }

    // Shuffle deck
    for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
    }

    return deck;
}

function startGame() {
    const count = parseInt(document.getElementById("playerCount").value);
    gameState.players = [];
    gameState.demandCardDeck = generateDeck();

    for (let i = 0; i < count; i++) {
        const name = document.getElementById(`player${i}Name`).value || `Player ${i + 1}`;
        const color = document.getElementById(`player${i}Color`).value;

        // Deal 3 demand cards to each player, discarding any event cards and re-drawing
        const demandCards = [];
        while (demandCards.length < 3 && gameState.demandCardDeck.length > 0) {
            const card = gameState.demandCardDeck.pop();
            if (card.type === "demand") {
                demandCards.push(card);
            }
            // If event card, just discard it (don't add to hand)
        }

        gameState.players.push({
            name,
            color,
            cash: 50,
            trainType: "Freight",
            trainLocation: null,
            demandCards: demandCards,
            loads: [],
            movement: 0,
            ferryState: null,  // { destPortId } when waiting at ferry port
            selectedDemands: [null, null, null]  // Track which demand row is selected per card
        });
    }

    gameState.gameStarted = true;
    gameState.phase = "initialBuilding";
    gameState.buildingPhaseCount = 0;

    document.getElementById("setupScreen").classList.add("hidden");
    document.getElementById("gameContainer").style.display = "flex";

    // Initialize game
    generateHexGrid();
    computeCoastDistances();
    gameState.canvas = document.getElementById("gameCanvas");
    gameState.ctx = gameState.canvas.getContext("2d");

    drawMap();
    updateUI();

    addLog("Game started! Initial building phase (2 rounds)");

    // Animate the first player's initial 3 demand cards being dealt
    const firstPlayer = gameState.players[0];
    if (firstPlayer && firstPlayer.demandCards.length > 0) {
        cardAnimationHoldQueue = true;
        for (const card of firstPlayer.demandCards) {
            card._animating = true;
            queueCardAnimation(card, false);
        }
        updateUI(); // Re-render with placeholders visible
        flushCardAnimationQueue();
    }
}

function deployTrain(milepostId) {

        gameState.operateHistory.push({ type: "deploy", milepostId });
        currentPlayer.trainLocation = milepostId;
        const mp = gameState.mileposts_by_id[milepostId];
        const cityName = mp.city ? mp.city.name : "milepost";
        addLog(`${currentPlayer.name} deployed train at ${cityName}`);
    }
}

function getPlayerLocationName(player) {
    if (player.trainLocation === null) return "Not deployed";
    const mp = gameState.mileposts_by_id[player.trainLocation];
    return mp?.city?.name || "En route";
}

function getPlayerCity(player) {
    if (player.trainLocation === null) return null;
    const mp = gameState.mileposts_by_id[player.trainLocation];
    return mp?.city?.name || null;
}

function getGoodsInCirculation(good) {
    let count = 0;
    for (const player of gameState.players) {
        for (const load of player.loads) {
            if (load === good) count++;
        }
    }
    return count;
}

function pickupGood(good) {
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    const trainMaxCapacity = TRAIN_TYPES[currentPlayer.trainType].capacity;

    if (currentPlayer.loads.length >= trainMaxCapacity) {
        addLog("Train is at full capacity!");
        return;
    }

    // Check if an active strike blocks loading at this location
    if (isEventBlocking("load", { milepostId: currentPlayer.trainLocation })) {
        addLog("Strike in effect — cannot pick up goods here!");
        return;
    }

    // Check supply limit (chips = max in circulation at once)
    const goodData = GOODS[good];
    if (goodData) {
        const inCirculation = getGoodsInCirculation(good);
        if (inCirculation >= goodData.chips) {
            addLog(`No ${good} available — all ${goodData.chips} chips are in use!`);
            return;
        }
    }

    gameState.operateHistory.push({ type: "pickup", good });
    currentPlayer.loads.push(good);
    addLog(`${currentPlayer.name} picked up ${good}`);
    updateUI();
    drawMap();
}

function deliverGood(cardIndex, demandIndex) {
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    const card = currentPlayer.demandCards[cardIndex];

    if (!card || !card.demands[demandIndex]) {
        addLog("Invalid demand card!");
        return;
    }

    if (card._discarding || card._animating) {
        return;
    }

    const demand = card.demands[demandIndex];
    const matchingLoadIndex = currentPlayer.loads.findIndex(good => good === demand.good);
    if (matchingLoadIndex === -1) {
        addLog(`No ${demand.good} to deliver!`);
        return;
    }

    const mp = gameState.mileposts_by_id[currentPlayer.trainLocation];
    const currentCity = mp?.city?.name;
    if (currentCity !== demand.to) {
        addLog(`Must deliver to ${demand.to}!`);
        return;
    }

    // Check if an active strike blocks delivery at this location
    if (isEventBlocking("deliver", { milepostId: currentPlayer.trainLocation })) {
        addLog("Strike in effect — cannot deliver goods here!");
        return;
    }

    // Deliver good — fulfilling one demand replaces the entire card
    currentPlayer.loads.splice(matchingLoadIndex, 1);
    currentPlayer.cash += demand.payout;
    addLog(`${currentPlayer.name} delivered ${demand.good} to ${demand.to} for ECU ${demand.payout}M`);

    // Delivery is irreversible (draws a new card), so clear undo history
    gameState.operateHistory = [];

    // Mark card as discarding so updateUI preserves it visually during animation
    card._discarding = true;

    // Update UI to reflect load/cash changes; card will show as discarding placeholder
    updateUI();
    drawMap();

    // Show celebration, then animate discard and draw replacement
    showDeliveryCelebration(demand.good, demand.to, demand.payout, () => {
        animateCardDiscard(cardIndex, () => {
            // Remove the fulfilled card, add to discard pile, then draw a replacement
            const [removedCard] = currentPlayer.demandCards.splice(cardIndex, 1);
            gameState.demandCardDiscardPile.push(removedCard);
            if (currentPlayer.selectedDemands) {
                currentPlayer.selectedDemands.splice(cardIndex, 1);
                currentPlayer.selectedDemands.push(null); // new card has no selection
            }

            // Hold queue so placeholder renders before animation starts (same pattern as discardHand)
            cardAnimationHoldQueue = true;
            drawCardForPlayer(currentPlayer);
            updateUI();
            drawMap();
            flushCardAnimationQueue();
        });
    });
}

function toggleDemandSelection(cardIdx, demandIdx) {
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    if (!currentPlayer.selectedDemands) currentPlayer.selectedDemands = [null, null, null];
    // Toggle: if already selected, deselect; otherwise select (swapping any previous selection on this card)
    if (currentPlayer.selectedDemands[cardIdx] === demandIdx) {
        currentPlayer.selectedDemands[cardIdx] = null;

function dropGood(loadIndex) {

    if (loadIndex >= 0 && loadIndex < currentPlayer.loads.length) {

        gameState.operateHistory.push({ type: "drop", good, loadIndex });
        currentPlayer.loads.splice(loadIndex, 1);

function upgradeTo(trainType) {
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    const upgradeCost = 20;

    if (currentPlayer.cash < upgradeCost) {
        addLog("Not enough cash to upgrade train!");
        return;
    }

    // Upgrade costs 20M which is the entire turn build budget
    if (gameState.buildingThisTurn > 0) {
        addLog("Cannot upgrade — you've already built track this turn!");
        return;
    }

    currentPlayer.cash -= upgradeCost;
    currentPlayer.trainType = trainType;
    gameState.buildingThisTurn = 20; // consumes entire build budget
    addLog(`${currentPlayer.name} upgraded train to ${trainType} (ECU 20M)`);
    updateUI();
    drawMap();
}

// Determine which opponents own foreign track segments being traversed.
// Returns a Set of owner colors.
function getForeignTrackOwners(path, endIdx, playerColor, foreignSegments) {
    const owners = new Set();
    for (let i = 0; i < endIdx; i++) {
        if (!foreignSegments.includes(i)) continue;
        const fromId = path[i];
        const toId = path[i + 1];
        for (let track of gameState.tracks) {
            if (track.color === playerColor) continue;
            if ((track.from === fromId && track.to === toId) ||
                (track.to === fromId && track.from === toId)) {
                owners.add(track.color);
                break;
            }
        }
    }
    return owners;
}

// Check if trackage rights fees need to be paid this move, and charge if so.
// 4M per opponent whose track is used (paid to that opponent), once per turn per opponent.
// Returns { ok: true/false, newlyPaidOwners: [] }
function chargeTrackageRightsIfNeeded(currentPlayer, path, foreignSegments, actualEndIdx) {
    const owners = getForeignTrackOwners(path, actualEndIdx, currentPlayer.color, foreignSegments);
    if (owners.size === 0) return { ok: true, newlyPaidOwners: [] };

    // Filter out owners already paid this turn
    const unpaid = [];
    for (const ownerColor of owners) {
        if (!gameState.trackageRightsPaidThisTurn[ownerColor]) {
            unpaid.push(ownerColor);
        }
    }
    if (unpaid.length === 0) return { ok: true, newlyPaidOwners: [] };

    const totalFee = unpaid.length * 4;
    if (totalFee > currentPlayer.cash) {
        addLog(`Not enough cash for trackage rights! Need ECU ${totalFee}M, have ECU ${currentPlayer.cash}M`);
        return { ok: false, newlyPaidOwners: [] };
    }

    // Pay each unpaid owner
    for (const ownerColor of unpaid) {
        currentPlayer.cash -= 4;
        const owner = gameState.players.find(p => p.color === ownerColor);
        if (owner) {
            owner.cash += 4;
            gameState.trackageRightsLog.push({ from: currentPlayer.name, to: owner.name, amount: 4 });
            addLog(`${currentPlayer.name} paid ECU 4M to ${owner.name} for trackage rights`);
        }
        gameState.trackageRightsPaidThisTurn[ownerColor] = true;
    }
    return { ok: true, newlyPaidOwners: unpaid };
}

function showTrackageModal() {
    if (gameState.trackageRightsLog.length === 0) return;
    const transfersEl = document.getElementById("trackageTransfers");
    transfersEl.innerHTML = gameState.trackageRightsLog.map(t => `
        <div class="trackage-transfer">

    `).join("");

}

function dismissTrackageModal() {
    document.getElementById("trackageModal").classList.remove("show");
    if (gameState._trackageModalTimer) {
        clearTimeout(gameState._trackageModalTimer);
        gameState._trackageModalTimer = null;
    }
}

// Check if a move would strand the player on foreign track without enough cash for next turn.
// movePath: the full path of mileposts the player will traverse this move.
// playerColor: current player's color.
// cashAfterFees: the player's cash after paying any trackage fees this move.
// Returns true if the move is safe, false if it would strand them.
function checkTrackageStrandRisk(movePath, playerColor, cashAfterFees) {
    if (!movePath || movePath.length === 0) return true;
    const destId = movePath[movePath.length - 1];

    // If destination is on the player's own network, they're fine
    const owned = getPlayerOwnedMileposts(playerColor);
    if (owned.has(destId)) return true;

    // Player will end up on foreign track — need at least 4M for next turn's fee
    // BUT: check if there's a viable delivery at any city along the path
    // that would bring cash above 4M
    const currentPlayer = gameState.players.find(p => p.color === playerColor);
    if (!currentPlayer) return cashAfterFees >= 4;

    // Check all cities along the path for delivery opportunities
    let potentialCash = cashAfterFees;
    for (let i = 0; i < movePath.length; i++) {
        const mp = gameState.mileposts_by_id[movePath[i]];
        if (!mp || !mp.city) continue;
        const cityName = mp.city.name;
        // Check if any demand card can be delivered here with carried goods
        for (const card of currentPlayer.demandCards) {
            for (const demand of card.demands) {
                if (demand.to === cityName && currentPlayer.loads.includes(demand.good)) {
                    potentialCash += demand.payout;
                }
            }
        }
    }

    if (potentialCash >= 4) return true;

    return false;
}

function toggleTrackageRights() {
    gameState.useTrackageRights = !gameState.useTrackageRights;
    // Clear preview so it recalculates with new setting
    gameState.pathPreview = null;
    gameState.pathPreviewCost = null;
    gameState.pathPreviewCutoff = null;
    updateUI();
    drawMap();
}

function setBuildPathMode(mode) {
    gameState.buildPathMode = mode;
    // Clear current preview so it recalculates with new mode
    gameState.pathPreview = null;
    gameState.pathPreviewCost = null;
    gameState.pathPreviewCutoff = null;
    updateUI();
    drawMap();
}

function undoLastBuild() {
    if (gameState.buildHistory.length === 0) {
        addLog("Nothing to undo!");
        return;
    }
    const last = gameState.buildHistory.pop();
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];

    // Remove the last N track segments (excluding ferry segments)
    const trackSegments = last.segments - (last.ferries ? last.ferries.length : 0);
    for (let i = 0; i < trackSegments; i++) {
        gameState.tracks.pop();
    }

    // Remove ferry ownership claimed in this build
    if (last.ferries) {
        for (const ferryKey of last.ferries) {
            const owners = gameState.ferryOwnership[ferryKey];
            if (owners) {
                const idx = owners.lastIndexOf(currentPlayer.color);
                if (idx !== -1) owners.splice(idx, 1);
                if (owners.length === 0) delete gameState.ferryOwnership[ferryKey];
            }
        }
    }

    // Refund cost
    currentPlayer.cash += last.cost;
    gameState.buildingThisTurn -= last.cost;
    gameState.majorCitiesThisTurn -= last.majorCities;

    addLog(`Undid last build (refunded ECU ${last.cost}M)`);
    updateUI();
    drawMap();
}

function undoLastOperate() {
    if (gameState.operateHistory.length === 0) {
        addLog("Nothing to undo!");
        return;
    }
    const last = gameState.operateHistory.pop();
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];

    if (last.type === "move") {
        currentPlayer.trainLocation = last.prevLocation;
        currentPlayer.movement = last.prevMovement;
        currentPlayer.ferryState = last.prevFerryState;
        // Reverse trackage rights payments if any
        if (last.prevCash != null) {
            currentPlayer.cash = last.prevCash;
        }
        if (last.newlyPaidOwners && last.newlyPaidOwners.length > 0) {
            for (const ownerColor of last.newlyPaidOwners) {
                const owner = gameState.players.find(p => p.color === ownerColor);
                if (owner) owner.cash -= 4;
                delete gameState.trackageRightsPaidThisTurn[ownerColor];
            }
            // Remove corresponding log entries
            gameState.trackageRightsLog = gameState.trackageRightsLog.filter(
                entry => !last.newlyPaidOwners.some(oc => {
                    const owner = gameState.players.find(p => p.color === oc);
                    return owner && entry.to === owner.name;
                })
            );
        }
        addLog(`Undid move`);
    } else if (last.type === "deploy") {
        currentPlayer.trainLocation = null;
        addLog(`Undid train deployment`);
    } else if (last.type === "pickup") {
        currentPlayer.loads.splice(currentPlayer.loads.lastIndexOf(last.good), 1);
        addLog(`Undid pickup of ${last.good}`);
    } else if (last.type === "drop") {
        currentPlayer.loads.splice(last.loadIndex, 0, last.good);
        addLog(`Undid drop of ${last.good}`);
    }

    updateUI();
    drawMap();
}

function endOperatePhase() {
    // Show trackage rights transfer modal if any payments were made
    showTrackageModal();
    gameState.phase = "build";
    gameState.selectedMilepost = null;
    gameState.pathPreview = null;
    gameState.pathPreviewCost = null;
    gameState.pathPreviewCutoff = null;
    gameState.pathPreviewForeignSegments = [];
    gameState.buildingThisTurn = 0;
    gameState.majorCitiesThisTurn = 0;
    gameState.buildHistory = [];
    gameState.operateHistory = [];
    gameState.buildPathMode = "cheapest";
    gameState.useTrackageRights = false;
    gameState.trackageRightsPaidThisTurn = {};
    gameState.trackageRightsLog = [];
    addLog("Moved to Build Phase");
    updateUI();
    drawMap();
}

function endTurn() {
    // Check win condition first
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    if (checkWinCondition(currentPlayer)) {
        endGame(currentPlayer);
        return;
    }

    // Expire persistent events: remove those where the drawing player's next turn has ended
    gameState.activeEvents = gameState.activeEvents.filter(ae => {
        if (gameState.currentPlayerIndex === ae.drawingPlayerIndex) {
            if (ae.drawingPlayerTurnEnded) return false; // Already played next turn, expire now
            ae.drawingPlayerTurnEnded = true; // Mark: next endTurn for this player will expire it
        }
        return true;
    });

    // Clear any in-progress build selection
    gameState.selectedMilepost = null;
    gameState.pathPreview = null;
    gameState.pathPreviewCost = null;
    gameState.pathPreviewCutoff = null;
    gameState.pathPreviewForeignSegments = [];

    // Reset building limits for new player
    gameState.buildingThisTurn = 0;
    gameState.majorCitiesThisTurn = 0;
    gameState.buildHistory = [];
    gameState.operateHistory = [];
    gameState.buildPathMode = "cheapest";
    gameState.useTrackageRights = false;
    gameState.trackageRightsPaidThisTurn = {};
    gameState.trackageRightsLog = [];

    // Move to next player
    gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % gameState.players.length;

    // Check if current player is derailed - if so, skip turn
    const nextPlayer = gameState.players[gameState.currentPlayerIndex];
    if (gameState.derailedPlayers[gameState.currentPlayerIndex]) {
        gameState.derailedPlayers[gameState.currentPlayerIndex]--;
        if (gameState.derailedPlayers[gameState.currentPlayerIndex] === 0) {
            delete gameState.derailedPlayers[gameState.currentPlayerIndex];
        }
        addLog(`${nextPlayer.name} is derailed and loses this turn!`);
        // Skip this player's turn by recursing
        endTurn();
        return;
    }

    // Determine next phase
    if (gameState.phase === "initialBuilding") {
        // In initial building, stay in initialBuilding phase, just move to next player
        if (gameState.currentPlayerIndex === 0) {
            gameState.buildingPhaseCount++;
            if (gameState.buildingPhaseCount >= gameState.initialBuildingRounds) {
                gameState.phase = "operate";
                // Set movement for first time
                for (let player of gameState.players) {
                    player.movement = TRAIN_TYPES[player.trainType].movement;
                }
            }
        }
        if (gameState.phase === "initialBuilding") {
            addLog(`Initial building round ${gameState.buildingPhaseCount + 1}: ${gameState.players[gameState.currentPlayerIndex].name}`);
        }
    } else if (gameState.phase === "build" || gameState.phase === "operate") {
        // After build or operate phase (e.g. discard hand skips build), start next player's operate
        gameState.phase = "operate";
        const player = gameState.players[gameState.currentPlayerIndex];
        const baseMovement = TRAIN_TYPES[player.trainType].movement;

        // Check if player is crossing a ferry from last turn
        if (player.ferryState) {
            const destPortId = player.ferryState.destPortId;
            // Gale 138: if ferry is blocked, cancel crossing and strand at port
            if (isGaleBlockingFerry(player.trainLocation, destPortId)) {
                player.ferryState = null;
                player.movement = baseMovement;
                addLog(`${player.name} ferry crossing cancelled due to gale! Stranded at port.`);
            } else {
                // Teleport to destination port
                player.trainLocation = destPortId;
                player.ferryState = null;
                // Half speed (rounded down) after ferry crossing
                player.movement = Math.floor(baseMovement / 2);
                const destMp = gameState.mileposts_by_id[destPortId];
                const portName = destMp.city ? destMp.city.name : "ferry port";
                addLog(`${player.name} crosses ferry to ${portName}. Half speed: ${player.movement}mp`);
            }
        } else {
            player.movement = baseMovement;
            addLog(`${player.name} starts Operate Phase (${player.movement}mp)`);
        }
    }

    gameState.turn++;

    // Show turn change overlay
    let phaseLabel = "";
    if (gameState.phase === "initialBuilding") phaseLabel = "Initial Building Phase";
    else if (gameState.phase === "operate") phaseLabel = "Operate Phase";
    else phaseLabel = "Build Phase";
    showTurnOverlay(nextPlayer.name, nextPlayer.color, phaseLabel);

    updateUI();
    drawMap();
}

                    <span style="font-size:11px;">ECU ${p.cash}M</span>
                </div>
            </div>`;
        }

    // Update active events display (positioned on map, below demand cards)
    // Positioning is handled in drawMap() alongside legends/demand cards

    // Update demand cards display (rendered as overlay cards on the map)
    const demandOverlay = document.getElementById("demandCardsOverlay");
    const currentCity = getPlayerCity(currentPlayer);
    if (currentPlayer.demandCards.length > 0) {
        const pColor = COLOR_MAP[currentPlayer.color] || "#6a9ad0";
        const cardsHtml = currentPlayer.demandCards.map((card, cardIdx) => {
            // Show empty placeholder for cards still being animated
            if (card._animating) {
                return `<div class="demand-card-overlay placeholder" data-card-idx="${cardIdx}"></div>`;
            }

            // Card being discarded: render normally but non-interactive (for discard animation)
            if (card._discarding) {
                const discardDemandsHtml = buildDemandCardDemandsHtml(card);
                return `<div class="demand-card-overlay" data-discarding="true" style="pointer-events:none;">
                    <div class="card-demands-list">${discardDemandsHtml}</div>
                </div>`;
            }

            const hasDeliverable = card.demands.some(d =>
                gameState.phase === "operate" && currentCity === d.to && currentPlayer.loads.includes(d.good));

            const selectedIdx = (currentPlayer.selectedDemands && currentPlayer.selectedDemands[cardIdx] != null)
                ? currentPlayer.selectedDemands[cardIdx] : -1;

            const demandsHtml = card.demands.map((demand, dIdx) => {
                const allSources = GOODS[demand.good] ? GOODS[demand.good].sources : [demand.from];
                const sourcesHtml = allSources.map(c =>
                    `<span>${c}</span>`
                ).join(", ");

                const canDeliver = gameState.phase === "operate" &&
                                   currentCity === demand.to &&
                                   currentPlayer.loads.includes(demand.good) &&
                                   !isEventBlocking("deliver", { milepostId: currentPlayer.trainLocation });
                const deliverBtn = canDeliver
                    ? ` <button class="deliver-btn" onclick="event.stopPropagation(); deliverGood(${cardIdx}, ${dIdx})">💰 ${demand.payout}M</button>`
                    : "";

                const isSelected = dIdx === selectedIdx;

            </div>

                if (entry.breakdown) {
                    for (const k in totals) totals[k] += (entry.breakdown[k] || 0);
                }

            const items = [];
            if (totals.clear > 0) items.push(`${totals.clear} clear (${totals.clear}M)`);

            if (totals.majorCity > 0) items.push(`${totals.majorCity} major city (${totals.majorCity * 5}M)`);
            if (totals.river > 0) items.push(`${totals.river} river crossing (+${totals.river * 2}M)`);
            if (totals.ferry > 0) items.push(`${totals.ferry} ferry route`);

            buildHtml += `<div style="font-size:10px; margin-bottom:8px; background:#1a2a1a; border:1px solid #3a5a3a; border-radius:4px; padding:6px;">

                <div style="color:#aaa; line-height:1.5;">${items.join('<br>')}</div>

            const lastBuild = gameState.buildHistory[gameState.buildHistory.length - 1];
            buildHtml += `<div style="background:#3d2200; border:2px solid #cc6600; border-radius:4px; padding:8px; margin-bottom:8px;">
