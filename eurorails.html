            operateHtml += `
                <div style="background:#3d2200; border:2px solid #cc6600; border-radius:4px; padding:8px; margin-bottom:8px;">
                    <button onclick="undoLastOperate()" style="width:100%; padding:10px; font-size:14px; background:#cc6600; color:#fff; font-weight:bold; border:none; border-radius:4px; cursor:pointer;">↩ Undo ${actionDesc}</button>
                </div>`;
        }
        operateHtml += `
            <button onclick="endOperatePhase()" style="width: 100%; margin-bottom: 5px;">Proceed to Build Phase</button>
            <div style="border-top: 1px solid #555; margin-top: 8px; padding-top: 8px;">
                <button onclick="confirmDiscardHand()" style="width: 100%; padding: 4px 8px; font-size: 11px; background: rgba(180, 60, 60, 0.15); color: #cc7777; border: 1px solid #994444; border-radius: 3px; cursor: pointer;">Discard Hand & End Turn</button>
            </div>
        `;
        actionButtons.innerHTML = operateHtml;
    } else { // build phase
        const remainingBudget = 20 - gameState.buildingThisTurn;
        const budgetPct = Math.round((remainingBudget / 20) * 100);
        const budgetColor = remainingBudget > 10 ? "#4a9e4a" : remainingBudget > 5 ? "#ffcc00" : "#ff4444";
        const cheapestActive = gameState.buildPathMode === "cheapest";
        const shortestActive = gameState.buildPathMode === "shortest";

        let buildHtml = `
            <div style="font-size: 12px; margin-bottom: 10px;">Click two mileposts to build track</div>
            <div style="display:flex; gap:4px; margin-bottom:8px;">
                <button onclick="setBuildPathMode('cheapest')" style="flex:1; padding:6px 4px; font-size:11px; font-weight:bold; border-radius:4px; border:1px solid ${cheapestActive ? '#4a9e4a' : '#555'}; background:${cheapestActive ? '#2a4a2a' : '#222'}; color:${cheapestActive ? '#88ff88' : '#888'}; cursor:pointer;">Cheapest</button>
                <button onclick="setBuildPathMode('shortest')" style="flex:1; padding:6px 4px; font-size:11px; font-weight:bold; border-radius:4px; border:1px solid ${shortestActive ? '#4a9eff' : '#555'}; background:${shortestActive ? '#1a2a4a' : '#222'}; color:${shortestActive ? '#88ccff' : '#888'}; cursor:pointer;">Shortest</button>
            </div>
            <div style="font-size:11px; margin-bottom:8px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                    <span>Turn Budget:</span>
                    <strong style="color:${budgetColor};">${remainingBudget}M / 20M</strong>
                </div>
                <div style="background:#333; border-radius:3px; height:8px; overflow:hidden;">
                    <div style="background:${budgetColor}; height:100%; width:${budgetPct}%; transition:width 0.3s;"></div>
                </div>
            </div>`;

        if (gameState.buildHistory.length > 0) {
            const totals = { clear: 0, mountain: 0, alpine: 0, river: 0, smallCity: 0, majorCity: 0, ferry: 0 };
            let totalSegments = 0;
            for (const entry of gameState.buildHistory) {
                if (entry.breakdown) {
                    for (const k in totals) totals[k] += (entry.breakdown[k] || 0);
                }
                totalSegments += entry.segments;
            }
            const items = [];
            if (totals.clear > 0) items.push(`${totals.clear} clear (${totals.clear}M)`);
            if (totals.mountain > 0) items.push(`${totals.mountain} mountain (${totals.mountain * 2}M)`);
            if (totals.alpine > 0) items.push(`${totals.alpine} alpine (${totals.alpine * 5}M)`);
            if (totals.smallCity > 0) items.push(`${totals.smallCity} small city (${totals.smallCity * 3}M)`);
            if (totals.majorCity > 0) items.push(`${totals.majorCity} major city (${totals.majorCity * 5}M)`);
            if (totals.river > 0) items.push(`${totals.river} river crossing (+${totals.river * 2}M)`);
            if (totals.ferry > 0) items.push(`${totals.ferry} ferry route`);

            buildHtml += `<div style="font-size:10px; margin-bottom:8px; background:#1a2a1a; border:1px solid #3a5a3a; border-radius:4px; padding:6px;">
                <div style="color:#88bb88; margin-bottom:4px; font-weight:bold;">Turn Summary — ${totalSegments} segment${totalSegments !== 1 ? 's' : ''}</div>
                <div style="color:#aaa; line-height:1.5;">${items.join('<br>')}</div>
            </div>`;

            const lastBuild = gameState.buildHistory[gameState.buildHistory.length - 1];
            buildHtml += `<div style="background:#3d2200; border:2px solid #cc6600; border-radius:4px; padding:8px; margin-bottom:8px;">
                <div style="font-size:10px; color:#ffaa44; margin-bottom:6px;">
                    Last build: <strong>ECU ${lastBuild.cost}M</strong> (${lastBuild.segments} segment${lastBuild.segments !== 1 ? 's' : ''})
                </div>
                <button onclick="undoLastBuild()" style="width:100%; padding:10px; font-size:14px; background:#cc6600; font-weight:bold; border-radius:4px;">↩ Undo Last Track</button>
            </div>`;
        }

        // Train upgrade
        const upgrades = getUpgradeOptions(currentPlayer);
        const budgetSpent = gameState.buildingThisTurn > 0;
        const canAffordUpgrade = currentPlayer.cash >= 20 && !budgetSpent;

        if (upgrades.length > 0) {
            const upgradeNote = budgetSpent ? `<div style="color:#ff6666; font-size:10px; margin-bottom:4px;">Cannot upgrade after building track</div>` : "";
            buildHtml += `<div style="font-size:11px; margin-bottom:8px;">
                <div style="color:#ff8800; margin-bottom:4px;"><strong>Upgrade (ECU 20M):</strong></div>
                ${upgradeNote}
                ${upgrades.map(u => `
                    <button onclick="upgradeTo('${u.type}')" style="width:100%; margin-bottom:4px; padding:4px 8px; font-size:11px; ${canAffordUpgrade ? '' : 'opacity:0.5;'}" ${canAffordUpgrade ? '' : 'disabled'}>
                        ⬆ ${u.type} (${u.desc})
                    </button>
                `).join("")}
            </div>`;
        }

        buildHtml += `<button onclick="endTurn()" style="width: 100%; margin-bottom: 5px;">End Turn</button>`;
        buildHtml += `
            <div style="border-top: 1px solid #555; margin-top: 8px; padding-top: 8px;">
                <button onclick="confirmDiscardHand()" style="width: 100%; padding: 4px 8px; font-size: 11px; background: rgba(180, 60, 60, 0.15); color: #cc7777; border: 1px solid #994444; border-radius: 3px; cursor: pointer;">Discard Hand & End Turn</button>
            </div>`;
        actionButtons.innerHTML = buildHtml;
    }
}


function endGame(player) {
    showWinCelebration(player);
}

function showWinCelebration(player) {
    const overlay = document.createElement("div");
    overlay.style.cssText = `
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 2000; pointer-events: auto; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
    `;

    const modal = document.createElement("div");
    modal.style.cssText = `
        background: #2d2d2d;
        padding: 40px 60px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        border: 2px solid #daa520;
        z-index: 2001;
        opacity: 0; transition: opacity 0.5s ease;
    `;
    modal.innerHTML = `
        <div style="font-size: 36px; font-weight: bold; margin-bottom: 8px; color: #ffd700;">
            Congratulations, you win!
        </div>
    `;
    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    requestAnimationFrame(() => { modal.style.opacity = "1"; });

    // Spawn 250 falling coins
    const coinCount = 250;
    const columns = 10;
    const screenW = window.innerWidth;
    const screenH = window.innerHeight;
    const spacing = screenW / (columns + 1);

    for (let i = 0; i < coinCount; i++) {
        const coin = document.createElement("div");
        const col = i % columns;
        const row = Math.floor(i / columns);
        const x = spacing * (col + 1) + (Math.random() - 0.5) * 30;
        const startDelay = row * 0.3 + Math.random() * 0.2;
        const fallDuration = 2.5 + Math.random() * 0.8;

        coin.style.cssText = `
            position: absolute;
            left: ${x}px;
            top: -80px;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffe066, #daa520, #b8860b);
            border: 3px solid #b8860b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 -2px 4px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: #5c3a00;
            text-align: center; line-height: 1.1;
            animation: winCoinFall${i} ${fallDuration}s ${startDelay}s ease-in forwards,
                       coinWobble ${1.5 + Math.random() * 0.5}s ${startDelay}s ease-in-out infinite;
        `;
        coin.textContent = "1M ECU";

        const style = document.createElement("style");
        style.textContent = `
            @keyframes winCoinFall${i} {
                0% { top: -80px; opacity: 1; }
                85% { opacity: 1; }
                100% { top: ${screenH + 80}px; opacity: 0; }
            }
        `;
        overlay.appendChild(style);
        overlay.appendChild(coin);
    }

    const wobbleStyle = document.createElement("style");
    wobbleStyle.textContent = `
        @keyframes coinWobble {
            0% { transform: rotate(-15deg) scale(1); }
            25% { transform: rotate(10deg) scale(1.05); }
            50% { transform: rotate(-8deg) scale(1); }
            75% { transform: rotate(12deg) scale(1.03); }
            100% { transform: rotate(-15deg) scale(1); }
        }
    `;
    overlay.appendChild(wobbleStyle);

    let dismissed = false;
    function dismiss() {
        if (dismissed) return;
        dismissed = true;
        clearTimeout(removeTimer);
        if (document.body.contains(overlay)) overlay.remove();
        document.getElementById("winnerText").innerHTML = `
            <strong>${player.name}</strong> wins!<br>
            Connected cities: ${getConnectedMajorCities(player.color).length}/8<br>
            Cash: ECU ${player.cash}M
        `;
        document.getElementById("endGameModal").classList.add("show");
    }
    overlay.addEventListener("click", dismiss);

    const removeTimer = setTimeout(dismiss, 20000);
}

document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("playerCount").addEventListener("input", setupPlayerInputs);
    setupPlayerInputs();

    document.getElementById("gameCanvas")?.addEventListener("click", function(e) {
        if (!gameState.gameStarted) return;
        if (gameState._suppressClick) return; // suppress click after drag-to-pan

        const canvas = gameState.canvas;
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        // Use CSS dimensions (not canvas.width which includes dpr scaling)
        const cssWidth = rect.width;
        const cssHeight = rect.height;
        const worldW = WORLD_BOUNDS.maxX - WORLD_BOUNDS.minX;
        const worldH = WORLD_BOUNDS.maxY - WORLD_BOUNDS.minY;
        const scale = Math.min(cssWidth / worldW, cssHeight / worldH);
        const panelRight = 560;
        const irelandInset = 5 * scale;
        const panelClearOffset = Math.max(0, Math.min(panelRight - irelandInset, cssWidth - worldW * scale));
        const centerOffset = (cssWidth - worldW * scale) / 2;
        const offsetX = (gameState.zoom || 1) === 1 ? panelClearOffset : centerOffset;
        const offsetY = (cssHeight - worldH * scale) / 2;

        const worldX = (mouseX - offsetX) / scale + WORLD_BOUNDS.minX;
        const worldY = (mouseY - offsetY) / scale + WORLD_BOUNDS.minY;

        // Find nearest milepost
        let nearest = null;
        let nearestDist = Infinity;
        for (let mp of gameState.mileposts) {
            const dist = Math.hypot(mp.x - worldX, mp.y - worldY);
            if (dist < nearestDist) {
                nearestDist = dist;
                nearest = mp;
            }
        }

        if (!nearest || nearestDist >= 1) return;

        const currentPlayer = gameState.players[gameState.currentPlayerIndex];

        // OPERATE PHASE: Click on mileposts to move train
        if (gameState.phase === "operate") {
            // Deploy train if not deployed yet
            if (currentPlayer.trainLocation === null) {
                // Must click a city milepost where player has track
                if (!nearest.city) {
                    addLog("Deploy your train at a city on your track!");
                    return;
                }
                const owned = getPlayerOwnedMileposts(currentPlayer.color);
                if (!owned.has(nearest.id)) {
                    addLog("You need track at this city to deploy your train here!");
                    return;
                }
                deployTrain(nearest.id);
                updateUI();
                drawMap();
                return;
            }

            // Move train to clicked milepost (milepost-to-milepost)
            if (nearest.id === currentPlayer.trainLocation) {
                addLog("Already here!");
                return;
            }

            // If waiting at ferry port, can't move until next turn
            if (currentPlayer.ferryState) {
                addLog("Waiting for ferry! End your turn to cross next turn.");
                return;
            }

            const trackResult = findPathOnTrack(currentPlayer.trainLocation, nearest.id, currentPlayer.color, gameState.useTrackageRights);
            if (!trackResult) {
                // Try with foreign track to give a helpful message
                if (!gameState.useTrackageRights) {
                    const foreignResult = findPathOnTrack(currentPlayer.trainLocation, nearest.id, currentPlayer.color, true);
                    if (foreignResult) {
                        addLog("No track connection! Enable Foreign Track (4M/milepost) to use other players' rails.");
                        return;
                    }
                }
                addLog("No track connection!");
                return;
            }

            // Save state before moving (including cash for trackage rights refund on undo)
            const prevLocation = currentPlayer.trainLocation;
            const prevMovement = currentPlayer.movement;
            const prevFerryState = currentPlayer.ferryState ? JSON.parse(JSON.stringify(currentPlayer.ferryState)) : null;
            const prevCash = currentPlayer.cash;
            let newlyPaidOwners = [];

            // Check if path crosses a ferry
            if (trackResult.ferryCrossings.length > 0) {
                // Only move to the first ferry port (before the crossing)
                const ferryIdx = trackResult.ferryCrossings[0];
                const portMilepostId = trackResult.path[ferryIdx];
                const destPortId = trackResult.path[ferryIdx + 1];

                // Move to the port first (if not already there)
                if (portMilepostId !== currentPlayer.trainLocation) {
                    const stepsToPort = ferryIdx; // steps from start of path to port
                    const costToPort = getPathMovementCost(trackResult.path.slice(0, stepsToPort + 1));
                    if (costToPort > currentPlayer.movement) {
                        // Partial move toward ferry port
                        if (currentPlayer.movement <= 0) {
                            addLog("No movement remaining!");
                            return;
                        }
                        // Calculate how far we can actually move
                        const maxSteps = getMaxStepsForMovement(trackResult.path, currentPlayer.movement);
                        const partialDestId = trackResult.path[maxSteps];
                        if (trackResult.foreignSegments && trackResult.foreignSegments.length > 0) {
                            const owners = getForeignTrackOwners(trackResult.path, maxSteps, currentPlayer.color, trackResult.foreignSegments);
                            let pendingFee = 0;
                            for (const oc of owners) {
                                if (!gameState.trackageRightsPaidThisTurn[oc]) pendingFee += 4;
                            }
                            const partialPath = trackResult.path.slice(0, maxSteps + 1);
                            if (!checkTrackageStrandRisk(partialPath, currentPlayer.color, currentPlayer.cash - pendingFee)) {
                                addLog("Cannot move here — you'd be stranded on foreign track without enough cash (need 4M reserve) and no viable delivery en route!");
                                return;
                            }
                            const trResult = chargeTrackageRightsIfNeeded(currentPlayer, trackResult.path, trackResult.foreignSegments, maxSteps);
                            if (!trResult.ok) return;
                            newlyPaidOwners = trResult.newlyPaidOwners;
                        }
                        const partialMp = gameState.mileposts_by_id[partialDestId];
                        const partialName = partialMp.city ? partialMp.city.name : "milepost";
                        currentPlayer.trainLocation = partialDestId;
                        const partialCost = getPathMovementCost(trackResult.path.slice(0, maxSteps + 1));
                        addLog(`Partial move toward ferry: moved ${maxSteps} steps (${partialCost}mp) of ${stepsToPort} steps to ${partialName}`);
                        currentPlayer.movement = 0;

                        gameState.operateHistory.push({
                            type: "move", prevLocation, prevMovement, prevFerryState, prevCash, newlyPaidOwners
                        });
                        updateUI();
                        drawMap();
                        return;
                    }
                    // Check trackage rights fees for move to port
                    if (trackResult.foreignSegments && trackResult.foreignSegments.length > 0) {
                        const trResult = chargeTrackageRightsIfNeeded(currentPlayer, trackResult.path, trackResult.foreignSegments, stepsToPort);
                        if (!trResult.ok) return;
                        newlyPaidOwners = trResult.newlyPaidOwners;
                    }
                    currentPlayer.trainLocation = portMilepostId;
                    currentPlayer.movement -= costToPort;
                }

                // Set ferry state — turn ends, will teleport next turn
                currentPlayer.ferryState = { destPortId };
                currentPlayer.movement = 0; // turn ends at port
                const portMp = gameState.mileposts_by_id[portMilepostId];
                const ferryName = getFerryName(portMilepostId, destPortId);
                const portName = portMp.city ? portMp.city.name : "ferry port";
                addLog(`Arrived at ${portName}. Waiting for ${ferryName || "ferry"}. Turn ends.`);
            } else {
                // Normal movement (no ferry crossing) — allow partial moves
                // Per-step half-speed: steps into half-speed zones cost 2 movement
                const movementCost = getPathMovementCost(trackResult.path);
                let movePath = trackResult.path;
                let actualCost = movementCost;

                if (movementCost > currentPlayer.movement) {
                    if (currentPlayer.movement <= 0) {
                        addLog("No movement remaining!");
                        return;
                    }
                    // Truncate to what we can move, accounting for half-speed zones
                    const maxSteps = getMaxStepsForMovement(trackResult.path, currentPlayer.movement);
                    movePath = trackResult.path.slice(0, maxSteps + 1);
                    actualCost = getPathMovementCost(movePath);
                    const stepsStr = maxSteps !== actualCost ? `${maxSteps} steps, ${actualCost}mp` : `${actualCost}mp`;
                    addLog(`Partial move: ${stepsStr} of ${trackResult.path.length - 1} steps`);
                }

                // Charge trackage rights if using foreign track
                const destId = movePath[movePath.length - 1];
                const actualSteps = movePath.length - 1;
                if (trackResult.foreignSegments && trackResult.foreignSegments.length > 0) {
                    // Pre-compute fee to check for stranding risk
                    const owners = getForeignTrackOwners(trackResult.path, actualSteps, currentPlayer.color, trackResult.foreignSegments);
                    let pendingFee = 0;
                    for (const oc of owners) {
                        if (!gameState.trackageRightsPaidThisTurn[oc]) pendingFee += 4;
                    }
                    const cashAfterFees = currentPlayer.cash - pendingFee;
                    if (!checkTrackageStrandRisk(movePath, currentPlayer.color, cashAfterFees)) {
                        addLog("Cannot move here — you'd be stranded on foreign track without enough cash (need 4M reserve) and no viable delivery en route!");
                        return;
                    }
                    const trResult = chargeTrackageRightsIfNeeded(currentPlayer, trackResult.path, trackResult.foreignSegments, actualSteps);
                    if (!trResult.ok) return;
                    newlyPaidOwners = newlyPaidOwners.concat(trResult.newlyPaidOwners);
                }
                const destMp = gameState.mileposts_by_id[destId];
                currentPlayer.trainLocation = destId;
                currentPlayer.movement -= actualCost;
                const locationName = destMp.city ? destMp.city.name : "milepost";
                addLog(`Moved to ${locationName} (${actualCost}mp used, ${currentPlayer.movement}mp left)`);
            }

            gameState.operateHistory.push({
                type: "move", prevLocation, prevMovement, prevFerryState, prevCash, newlyPaidOwners
            });
            updateUI();
            drawMap();
        }

        // BUILD PHASE (initialBuilding or build): Click on mileposts to build
        if (gameState.phase === "initialBuilding" || gameState.phase === "build") {
            // Strike 123: drawing player cannot build
            if (isEventBlocking("build", {})) {
                addLog("Strike in effect — you cannot build track!");
                return;
            }
            if (!gameState.selectedMilepost) {
                if (canBuildFromMilepost(nearest, currentPlayer.color)) {
                    gameState.selectedMilepost = nearest;
                    addLog(`Selected ${nearest.city?.name || "milepost"}`);
                } else {
                    addLog("Cannot build from here!");
                }
            } else {
                // Try to build
                const start = gameState.selectedMilepost;
                const end = nearest;

                let pathResult = findPath(start.id, end.id, currentPlayer.color, gameState.buildPathMode);

                // If start and end are direct neighbors and the player doesn't already
                // own the direct edge, force the direct path. This prevents the pathfinder
                // from routing through existing circuitous track (cost 0) instead of
                // building the obvious direct connection.
                if (pathResult && start.neighbors.includes(end.id)) {
                    const directEdge = start.id + "|" + end.id;
                    const directOwned = gameState.tracks.some(t =>
                        t.color === currentPlayer.color &&
                        ((t.from === start.id && t.to === end.id) || (t.to === start.id && t.from === end.id))
                    );
                    const directBlocked = gameState.tracks.some(t =>
                        t.color !== currentPlayer.color &&
                        ((t.from === start.id && t.to === end.id) || (t.to === start.id && t.from === end.id))
                    );
                    if (!directOwned && !directBlocked) {
                        const directCost = getMileppostCost(start, end);
                        pathResult = { path: [start.id, end.id], cost: directCost };
                    }
                }

                if (pathResult) {
                    // Check budget and truncate path if needed for partial build
                    const remainingBudget = 20 - gameState.buildingThisTurn;
                    const maxAffordable = Math.min(remainingBudget, currentPlayer.cash);
                    let buildPath = pathResult.path;
                    let buildCost = pathResult.cost;

                    if (buildCost > maxAffordable) {
                        // Truncate path to what we can afford
                        const ownedCheck = new Set();
                        for (let t of gameState.tracks) {
                            if (t.color === currentPlayer.color) {
                                ownedCheck.add(t.from + "|" + t.to);
                                ownedCheck.add(t.to + "|" + t.from);
                            }
                        }
                        let accCost = 0;
                        let cutoffIdx = 0;
                        for (let i = 0; i < pathResult.path.length - 1; i++) {
                            const fromId = pathResult.path[i];
                            const toId = pathResult.path[i + 1];
                            const edgeKey = fromId + "|" + toId;
                            if (ownedCheck.has(edgeKey)) {
                                cutoffIdx = i + 1;
                                continue;
                            }
                            const ferryKey = getFerryKey(fromId, toId);
                            let segCost = 0;
                            let isFerry = false;
                            for (let fc of gameState.ferryConnections) {
                                if (getFerryKey(fc.fromId, fc.toId) === ferryKey) {
                                    isFerry = true;
                                    segCost = playerOwnsFerry(ferryKey, currentPlayer.color) ? 0 : fc.cost;
                                    break;
                                }
                            }
                            if (!isFerry) {
                                const mp1 = gameState.mileposts_by_id[fromId];
                                const mp2 = gameState.mileposts_by_id[toId];
                                segCost = getMileppostCost(mp1, mp2);
                            }
                            if (accCost + segCost > maxAffordable) break;
                            accCost += segCost;
                            cutoffIdx = i + 1;
                        }
                        if (cutoffIdx === 0) {
                            addLog(`Cannot afford any track! Budget: ${remainingBudget}M, Cash: ${currentPlayer.cash}M`);
                            gameState.selectedMilepost = null;
                            gameState.pathPreview = null;
                            gameState.pathPreviewCost = null;
                            gameState.pathPreviewCutoff = null;
                            updateUI();
                            drawMap();
                            return;
                        }
                        buildPath = pathResult.path.slice(0, cutoffIdx + 1);
                        buildCost = accCost;
                        addLog(`Partial build: can only afford ${cutoffIdx} of ${pathResult.path.length - 1} segments`);
                    }

                    // Check major city limit (2 per turn max)
                    // Skip buildPath[0] — it's the starting milepost already on the player's network
                    let majorCityCount = 0;
                    for (let pi = 1; pi < buildPath.length; pi++) {
                        const mp = gameState.mileposts_by_id[buildPath[pi]];
                        if (mp.city && MAJOR_CITIES.includes(mp.city.name)) {
                            majorCityCount++;
                        }
                    }

                    if (gameState.majorCitiesThisTurn + majorCityCount > 2) {
                        addLog("Cannot build more than 2 sections from major cities this turn!");
                    } else {
                        // Build track — skip own existing segments, block other players' segments
                        const ownedEdges = new Set();
                        const otherEdges = new Set();
                        for (let t of gameState.tracks) {
                            const fwd = t.from + "|" + t.to;
                            const rev = t.to + "|" + t.from;
                            if (t.color === currentPlayer.color) {
                                ownedEdges.add(fwd);
                                ownedEdges.add(rev);
                            } else {
                                otherEdges.add(fwd);
                                otherEdges.add(rev);
                            }
                        }

                        let newSegments = 0;
                        const newFerries = []; // ferry keys claimed this build
                        // Track cost breakdown for this build
                        const breakdown = { clear: 0, mountain: 0, alpine: 0, river: 0, smallCity: 0, majorCity: 0, ferry: 0 };
                        for (let i = 0; i < buildPath.length - 1; i++) {
                            const edgeKey = buildPath[i] + "|" + buildPath[i + 1];

                            // Check if this edge is a ferry crossing
                            const ferryKey = getFerryKey(buildPath[i], buildPath[i + 1]);
                            let isFerryEdge = false;
                            for (let fc of gameState.ferryConnections) {
                                if (getFerryKey(fc.fromId, fc.toId) === ferryKey) {
                                    isFerryEdge = true;
                                    if (!playerOwnsFerry(ferryKey, currentPlayer.color)) {
                                        // Claim this ferry
                                        if (!gameState.ferryOwnership[ferryKey]) {
                                            gameState.ferryOwnership[ferryKey] = [];
                                        }
                                        gameState.ferryOwnership[ferryKey].push(currentPlayer.color);
                                        newFerries.push(ferryKey);
                                        newSegments++;
                                        breakdown.ferry++;
                                        addLog(`${currentPlayer.name} claimed ${fc.name} ferry!`);
                                    }
                                    break;
                                }
                            }
                            if (isFerryEdge) continue;

                            if (otherEdges.has(edgeKey)) continue; // never build on other players' track
                            if (!ownedEdges.has(edgeKey)) {
                                gameState.tracks.push({
                                    from: buildPath[i],
                                    to: buildPath[i + 1],
                                    color: currentPlayer.color
                                });
                                newSegments++;
                                // Categorize this segment
                                const destMp = gameState.mileposts_by_id[buildPath[i + 1]];
                                const srcMp = gameState.mileposts_by_id[buildPath[i]];
                                if (destMp.city) {
                                    if (MAJOR_CITIES.includes(destMp.city.name)) breakdown.majorCity++;
                                    else breakdown.smallCity++;
                                } else if (destMp.terrain === "alpine") {
                                    breakdown.alpine++;
                                } else if (destMp.terrain === "mountain") {
                                    breakdown.mountain++;
                                } else {
                                    breakdown.clear++;
                                }
                                if (edgeCrossesRiver(srcMp.x, srcMp.y, destMp.x, destMp.y)) {
                                    breakdown.river++;
                                }
                            }
                        }

                        currentPlayer.cash -= buildCost;
                        gameState.buildingThisTurn += buildCost;
                        gameState.majorCitiesThisTurn += majorCityCount;

                        gameState.buildHistory.push({
                            segments: newSegments,
                            cost: buildCost,
                            majorCities: majorCityCount,
                            breakdown,
                            ferries: newFerries  // ferry keys claimed this build (for undo)
                        });

                        addLog(`${currentPlayer.name} built track for ECU ${buildCost}M (${20 - gameState.buildingThisTurn}M remaining this turn)`);
                    }
                } else {
                    // Check if an active event is likely blocking the path
                    let blockingEvent = null;
                    for (const ae of gameState.activeEvents) {
                        const evt = ae.card;
                        if (evt.type === "snow" || evt.type === "fog" || evt.type === "gale") {
                            if (isMilepostInEventZone(evt, end.id) || isMilepostInEventZone(evt, start.id)) {
                                blockingEvent = evt;
                                break;
                            }
                        }
                    }
                    if (blockingEvent) {
                        addLog(`Cannot build — blocked by active event: ${blockingEvent.title}`);
                    } else {
                        addLog("No path found!");
                    }
                }

                gameState.selectedMilepost = null;
                gameState.pathPreview = null;
                gameState.pathPreviewCost = null;
                gameState.pathPreviewCutoff = null;
                updateUI();
                drawMap();
            }
        }
    });

    // Mousemove for hover highlight on interactive mileposts
    document.getElementById("gameCanvas")?.addEventListener("mousemove", function(e) {
        if (!gameState.gameStarted) return;

        const canvas = gameState.canvas;
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const cssWidth = rect.width;
        const cssHeight = rect.height;
        const worldW = WORLD_BOUNDS.maxX - WORLD_BOUNDS.minX;
        const worldH = WORLD_BOUNDS.maxY - WORLD_BOUNDS.minY;
        const scale = Math.min(cssWidth / worldW, cssHeight / worldH);
        const panelRight = 560;
        const irelandInset = 5 * scale;
        const panelClearOffset = Math.max(0, Math.min(panelRight - irelandInset, cssWidth - worldW * scale));
        const centerOffset = (cssWidth - worldW * scale) / 2;
        const offsetX = (gameState.zoom || 1) === 1 ? panelClearOffset : centerOffset;
        const offsetY = (cssHeight - worldH * scale) / 2;

        const worldX = (mouseX - offsetX) / scale + WORLD_BOUNDS.minX;
        const worldY = (mouseY - offsetY) / scale + WORLD_BOUNDS.minY;

        // Find nearest milepost
        let nearest = null;
        let nearestDist = Infinity;
        for (let mp of gameState.mileposts) {
            const dist = Math.hypot(mp.x - worldX, mp.y - worldY);
            if (dist < nearestDist) {
                nearestDist = dist;
                nearest = mp;
            }
        }

        const prev = gameState.hoveredMilepost;
        const prevValid = gameState.hoverValid;
        if (nearest && nearestDist < 1) {
            gameState.hoveredMilepost = nearest;
            canvas.style.cursor = "pointer";

            // Compute hover validity
            const currentPlayer = gameState.players[gameState.currentPlayerIndex];
            if (gameState.phase === "initialBuilding" || gameState.phase === "build") {
                if (gameState.selectedMilepost) {
                    // Building second click: check if path is affordable (fully or partially)
                    let pathResult = findPath(gameState.selectedMilepost.id, nearest.id, currentPlayer.color, gameState.buildPathMode);

                    // Force direct path for neighboring mileposts when direct edge isn't owned/blocked
                    if (pathResult && gameState.selectedMilepost.neighbors.includes(nearest.id)) {
                        const selMp = gameState.selectedMilepost;
                        const directOwned = gameState.tracks.some(t =>
                            t.color === currentPlayer.color &&
                            ((t.from === selMp.id && t.to === nearest.id) || (t.to === selMp.id && t.from === nearest.id))
                        );
                        const directBlocked = gameState.tracks.some(t =>
                            t.color !== currentPlayer.color &&
                            ((t.from === selMp.id && t.to === nearest.id) || (t.to === selMp.id && t.from === nearest.id))
                        );
                        if (!directOwned && !directBlocked) {
                            const directCost = getMileppostCost(selMp, nearest);
                            pathResult = { path: [selMp.id, nearest.id], cost: directCost };
                        }
                    }

                    if (!pathResult) {
                        gameState.hoverValid = false;
                        gameState.pathPreview = null;
                        gameState.pathPreviewCost = null;
                        gameState.pathPreviewCutoff = null;
                    } else {
                        const remainingBudget = 20 - gameState.buildingThisTurn;
                        const maxAffordable = Math.min(remainingBudget, currentPlayer.cash);
                        const isFullyValid = pathResult.cost <= maxAffordable;
                        gameState.pathPreview = pathResult.path;
                        gameState.pathPreviewCost = pathResult.cost;

                        if (isFullyValid) {
                            gameState.hoverValid = true;
                            gameState.pathPreviewValid = true;
                            gameState.pathPreviewCutoff = null;
                        } else {
                            // Compute cutoff: walk segments accumulating cost
                            const ownedEdges = new Set();
                            for (let t of gameState.tracks) {
                                if (t.color === currentPlayer.color) {
                                    ownedEdges.add(t.from + "|" + t.to);
                                    ownedEdges.add(t.to + "|" + t.from);
                                }
                            }
                            let accCost = 0;
                            let cutoffIdx = 0;
                            for (let i = 0; i < pathResult.path.length - 1; i++) {
                                const fromId = pathResult.path[i];
                                const toId = pathResult.path[i + 1];
                                const edgeKey = fromId + "|" + toId;
                                // Check if this segment is already owned (free)
                                if (ownedEdges.has(edgeKey)) {
                                    cutoffIdx = i + 1;
                                    continue;
                                }
                                // Check if it's a ferry edge
                                const ferryKey = getFerryKey(fromId, toId);
                                let segCost = 0;
                                let isFerry = false;
                                for (let fc of gameState.ferryConnections) {
                                    if (getFerryKey(fc.fromId, fc.toId) === ferryKey) {
                                        isFerry = true;
                                        if (playerOwnsFerry(ferryKey, currentPlayer.color)) {
                                            segCost = 0;
                                        } else {
                                            segCost = fc.cost;
                                        }
                                        break;
                                    }
                                }
                                if (!isFerry) {
                                    const mp1 = gameState.mileposts_by_id[fromId];
                                    const mp2 = gameState.mileposts_by_id[toId];
                                    segCost = getMileppostCost(mp1, mp2);
                                }
                                if (accCost + segCost > maxAffordable) break;
                                accCost += segCost;
                                cutoffIdx = i + 1;
                            }
                            gameState.pathPreviewCutoff = cutoffIdx;
                            gameState.hoverValid = cutoffIdx > 0; // valid if at least 1 segment is affordable
                            gameState.pathPreviewValid = cutoffIdx > 0;
                        }
                    }
                } else {
                    // Building first click: check if can build from here
                    gameState.hoverValid = canBuildFromMilepost(nearest, currentPlayer.color);
                    gameState.pathPreview = null;
                    gameState.pathPreviewCost = null;
                    gameState.pathPreviewCutoff = null;
                }
            } else if (gameState.phase === "operate") {
                if (currentPlayer.trainLocation === null) {
                    // Deploying: must be a city with player track
                    const owned = getPlayerOwnedMileposts(currentPlayer.color);
                    gameState.hoverValid = nearest.city && owned.has(nearest.id);
                    gameState.pathPreview = null;
                    gameState.pathPreviewCost = null;
                    gameState.pathPreviewCutoff = null;
                } else if (nearest.id !== currentPlayer.trainLocation) {
                    // Moving: check path and movement (ferry crossings are always valid if reachable)
                    if (currentPlayer.ferryState) {
                        gameState.hoverValid = false; // waiting at ferry, can't move
                        gameState.pathPreview = null;
                        gameState.pathPreviewCost = null;
                        gameState.pathPreviewCutoff = null;
                    } else {
                        const hoverTrackResult = findPathOnTrack(currentPlayer.trainLocation, nearest.id, currentPlayer.color, gameState.useTrackageRights);
                        if (!hoverTrackResult) {
                            gameState.hoverValid = false;
                            gameState.pathPreview = null;
                            gameState.pathPreviewCost = null;
                            gameState.pathPreviewCutoff = null;
                            gameState.pathPreviewForeignSegments = [];
                        } else {
                            // Per-step half-speed: calculate effective cost considering zones
                            const movementCost = getPathMovementCost(hoverTrackResult.path);
                            gameState.pathPreview = hoverTrackResult.path;
                            gameState.pathPreviewCost = movementCost;
                            gameState.pathPreviewForeignSegments = hoverTrackResult.foreignSegments || [];

                            // Compute trackage rights fee for display (4M per unpaid opponent)
                            const hasForeignSegs = hoverTrackResult.foreignSegments && hoverTrackResult.foreignSegments.length > 0;
                            let trackageFee = 0;
                            if (hasForeignSegs) {
                                const owners = getForeignTrackOwners(hoverTrackResult.path, hoverTrackResult.path.length - 1, currentPlayer.color, hoverTrackResult.foreignSegments);
                                for (const oc of owners) {
                                    if (!gameState.trackageRightsPaidThisTurn[oc]) trackageFee += 4;
                                }
                            }

                            if (hoverTrackResult.ferryCrossings.length > 0) {
                                // Ferry in path: valid if we can reach the port
                                const stepsToPort = hoverTrackResult.ferryCrossings[0];
                                const costToPort = getPathMovementCost(hoverTrackResult.path.slice(0, stepsToPort + 1));
                                const isFullyValid = costToPort <= currentPlayer.movement;
                                gameState.hoverValid = isFullyValid;
                                gameState.pathPreviewValid = isFullyValid;
                                // For ferry paths, cutoff is at the port or at movement limit
                                // Movement ends at the ferry port (player crosses next turn),
                                // so segments beyond the port should show as red (unreachable this turn)
                                if (!isFullyValid && currentPlayer.movement > 0) {
                                    gameState.pathPreviewCutoff = getMaxStepsForMovement(hoverTrackResult.path, currentPlayer.movement);
                                    gameState.hoverValid = true;
                                    gameState.pathPreviewValid = true;
                                } else if (isFullyValid && stepsToPort < hoverTrackResult.path.length - 1) {
                                    // Can reach the port, but movement ends there — show beyond port as red
                                    gameState.pathPreviewCutoff = stepsToPort;
                                } else {
                                    gameState.pathPreviewCutoff = null;
                                }
                                // Check cash for trackage rights
                                if (trackageFee > currentPlayer.cash) {
                                    gameState.hoverValid = false;
                                    gameState.pathPreviewValid = false;
                                }
                            } else {
                                const isFullyValid = movementCost <= currentPlayer.movement;
                                if (isFullyValid) {
                                    gameState.hoverValid = true;
                                    gameState.pathPreviewValid = true;
                                    gameState.pathPreviewCutoff = null;
                                } else if (currentPlayer.movement > 0) {
                                    // Partial move: cutoff at max reachable step
                                    gameState.pathPreviewCutoff = getMaxStepsForMovement(hoverTrackResult.path, currentPlayer.movement);
                                    gameState.hoverValid = true;
                                    gameState.pathPreviewValid = true;
                                } else {
                                    gameState.hoverValid = false;
                                    gameState.pathPreviewValid = false;
                                    gameState.pathPreviewCutoff = null;
                                }
                                // Check cash for trackage rights
                                if (trackageFee > currentPlayer.cash) {
                                    gameState.hoverValid = false;
                                    gameState.pathPreviewValid = false;
                                }
                                // Check stranding risk on foreign track
                                if (hasForeignSegs && gameState.hoverValid) {
                                    const actualEndIdx = gameState.pathPreviewCutoff != null
                                        ? gameState.pathPreviewCutoff + 1
                                        : hoverTrackResult.path.length;
                                    const hoverMovePath = hoverTrackResult.path.slice(0, actualEndIdx);
                                    if (!checkTrackageStrandRisk(hoverMovePath, currentPlayer.color, currentPlayer.cash - trackageFee)) {
                                        gameState.hoverValid = false;
                                        gameState.pathPreviewValid = false;
                                    }
                                }
                            }
                        }
                    }
                } else {
                    gameState.hoverValid = true; // already here
                    gameState.pathPreview = null;
                    gameState.pathPreviewCost = null;
                    gameState.pathPreviewCutoff = null;
                }
            } else {
                gameState.hoverValid = true;
            }
        } else {
            gameState.hoveredMilepost = null;
            gameState.hoverValid = null;
            gameState.pathPreview = null;
            gameState.pathPreviewCost = null;
            gameState.pathPreviewCutoff = null;
            canvas.style.cursor = "default";
        }

        // Only redraw if hovered milepost or validity changed
        if (prev !== gameState.hoveredMilepost || prevValid !== gameState.hoverValid) {
            drawMap();
        }
    });

    document.getElementById("gameCanvas")?.addEventListener("mouseleave", function() {
        if (gameState.hoveredMilepost || gameState.pathPreview) {
            gameState.hoveredMilepost = null;
            gameState.pathPreview = null;
            gameState.pathPreviewCost = null;
            gameState.pathPreviewCutoff = null;
            gameState.pathPreviewForeignSegments = [];
            gameState.canvas.style.cursor = "default";
            drawMap();
        }
    });
});

window.addEventListener("resize", function() {
    if (gameState.gameStarted) {
        drawMap();
    }
});

// Zoom controls
function zoomMap(factor) {
    const mapArea = document.querySelector(".map-area");
    if (!mapArea) return;
    const oldZoom = gameState.zoom;

    if (factor === "fit") {
        gameState.zoom = 1;
        drawMap();
        mapArea.scrollLeft = 0;
        mapArea.scrollTop = 0;
        return;
    }

    gameState.zoom = Math.max(1, Math.min(4, oldZoom * factor));
    if (gameState.zoom === oldZoom) return;

    // Zoom toward center of visible area
    const centerX = mapArea.scrollLeft + mapArea.clientWidth / 2;
    const centerY = mapArea.scrollTop + mapArea.clientHeight / 2;
    const ratio = gameState.zoom / oldZoom;

    drawMap();
    mapArea.scrollLeft = centerX * ratio - mapArea.clientWidth / 2;
    mapArea.scrollTop = centerY * ratio - mapArea.clientHeight / 2;
}

// Click-and-drag to pan the map
(function() {
    const mapArea = document.querySelector(".map-area");
    if (!mapArea) return;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let scrollStartX = 0, scrollStartY = 0;
    let dragMoved = false;

    mapArea.addEventListener("mousedown", function(e) {
        // Only left button, and only when game is running
        if (e.button !== 0 || !gameState.gameStarted) return;
        isDragging = true;
        dragMoved = false;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        scrollStartX = mapArea.scrollLeft;
        scrollStartY = mapArea.scrollTop;
        mapArea.style.cursor = "grab";
    });

    window.addEventListener("mousemove", function(e) {
        if (!isDragging) return;
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            dragMoved = true;
            mapArea.style.cursor = "grabbing";
        }
        if (dragMoved) {
            mapArea.scrollLeft = scrollStartX - dx;
            mapArea.scrollTop = scrollStartY - dy;
        }
    });

    window.addEventListener("mouseup", function(e) {
        if (!isDragging) return;
        isDragging = false;
        mapArea.style.cursor = "";
        if (dragMoved) {
            // Suppress the click that follows this mouseup
            gameState._suppressClick = true;
            setTimeout(() => { gameState._suppressClick = false; }, 0);
        }
    });
})();

// Mouse wheel zoom (on map area)
document.querySelector(".map-area")?.addEventListener("wheel", function(e) {
    if (!gameState.gameStarted) return;
    e.preventDefault();
    const mapArea = this;
    const oldZoom = gameState.zoom;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    gameState.zoom = Math.max(1, Math.min(4, oldZoom * delta));
    if (gameState.zoom === oldZoom) return;

    // Zoom toward cursor position
    const mouseX = e.clientX - mapArea.getBoundingClientRect().left + mapArea.scrollLeft;
    const mouseY = e.clientY - mapArea.getBoundingClientRect().top + mapArea.scrollTop;
    const ratio = gameState.zoom / oldZoom;

    drawMap();
    mapArea.scrollLeft = mouseX * ratio - (e.clientX - mapArea.getBoundingClientRect().left);
    mapArea.scrollTop = mouseY * ratio - (e.clientY - mapArea.getBoundingClientRect().top);
}, { passive: false });
</script>

<div class="trackage-modal" id="trackageModal" onclick="dismissTrackageModal()">
    <div class="trackage-modal-content" id="trackageModalContent">
        <h3>🚂 Trackage Rights</h3>
        <div id="trackageTransfers"></div>
        <div style="color:#888; font-size:11px; margin-top:12px;">Click anywhere to dismiss</div>
    </div>
</div>

<div class="turn-overlay" id="confirmDiscardOverlay">
    <div class="turn-overlay-content" style="border-color: #cc6600;">
        <h2>Discard Hand</h2>
        <div style="color: #ccc; font-size: 15px; margin-bottom: 24px; max-width: 300px;">Are you sure you want to discard your entire hand and end your turn?</div>
        <div style="display: flex; gap: 12px; justify-content: center;">
            <button onclick="cancelDiscardHand()" style="padding: 10px 32px; font-size: 16px; background: #555; color: #fff; border: none; border-radius: 4px; cursor: pointer;">No</button>
            <button onclick="confirmDiscardYes()" style="padding: 10px 32px; font-size: 16px; background: #cc6600; color: #fff; border: none; border-radius: 4px; cursor: pointer;">Yes, Discard</button>
        </div>
    </div>
</div>

<div class="turn-overlay" id="turnOverlay">
    <div class="turn-overlay-content">
        <h2>Next Turn</h2>
        <div class="player-name" id="turnOverlayPlayer"></div>
        <div class="phase-label" id="turnOverlayPhase"></div>
        <button onclick="dismissTurnOverlay()" style="padding: 10px 40px; font-size: 16px;">Ready</button>
    </div>
</div>

</body>
