<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurorails - European Railroad Board Game (Milepost Edition)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .setup-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .setup-screen.hidden {
            display: none;
        }

        .setup-dialog {
            background: #2d2d2d;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 600px;
        }

        .setup-dialog h1 {
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }

        .setup-section {
            margin-bottom: 25px;
        }

        .setup-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .setup-section input[type="text"],
        .setup-section input[type="number"],
        .setup-section select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
        }

        .player-setup {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .player-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .player-input-row input {
            flex: 1;
        }

        .player-input-row select {
            flex: 0 0 120px;
        }

        .setup-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #4a9eff;
            color: #fff;
            transition: background 0.3s;
        }

        button:hover {
            background: #2e7fd9;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .map-area {
            flex: 1;
            position: relative;
            background: #1a1a1a;
            overflow: auto;
        }

        #gameCanvas {
            display: block;
        }

        #leftPanelStack {
            position: fixed;
            top: 6px;
            left: 6px;
            z-index: 10;
            width: 480px;
            display: none;
            flex-direction: column;
            gap: 4px;
            pointer-events: auto;
            max-height: calc(100vh - 12px);
            overflow-y: auto;
            scrollbar-width: none;
        }

        #leftPanelStack::-webkit-scrollbar {
            display: none;
        }

        #legendOverlay {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }

        .legend-box {
            background: rgba(10, 25, 50, 0.82);
            border: 1px solid rgba(100, 150, 200, 0.3);
            border-radius: 6px;
            padding: 8px 10px;
            color: rgba(200, 220, 240, 0.7);
            font-size: 12px;
            line-height: 1.55;
            backdrop-filter: blur(4px);
            transition: all 0.25s ease;
            width: 100%;
        }

        .legend-box .legend-title {
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(180, 210, 240, 0.8);
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .legend-box .legend-title .collapse-icon {
            font-size: 10px;
            opacity: 0.5;
            transition: transform 0.25s ease;
        }

        .legend-box.collapsed .legend-title .collapse-icon {
            transform: rotate(-90deg);
        }

        .legend-box .legend-content {
            overflow: hidden;
            max-height: 500px;
            transition: max-height 0.3s ease, opacity 0.25s ease, margin-top 0.25s ease;
            opacity: 1;
            margin-top: 3px;
        }

        .legend-box.collapsed .legend-content {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }

        .legend-box .legend-item {
            white-space: nowrap;
        }

        .legend-box .legend-item .legend-symbol {
            display: inline-block;
            width: 20px;
            text-align: center;
        }

        .legend-box .goods-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0 10px;
        }

        #trainCardOverlay {
            display: none;
        }

        .train-status-card {
            width: 480px;
            background: linear-gradient(145deg, #2a1e0e, #1e1508);
            border: 1.5px solid #8a6a3a;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 12px;
            color: #d0c8b0;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(180,150,80,0.1);
            position: relative;
            overflow: hidden;
        }

        .train-status-card .train-bg {
            position: absolute;
            left: 50%;
            bottom: 2px;
            transform: translateX(-50%);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }

        .train-status-card .train-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .train-status-card .train-info-col {
            flex: 1;
            min-width: 0;
        }

        .train-status-card .train-header {
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(138, 106, 58, 0.4);
            position: relative;
            z-index: 1;
        }

        .train-status-card .train-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .train-status-card .train-loads-col {
            flex: 1;
            min-width: 0;
        }

        .train-status-card .train-loads-header {
            font-size: 11px;
            color: #998866;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .train-status-card .load-item {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 2px;
        }

        .train-status-card .empty-slot {
            color: #555;
            font-style: italic;
        }

        #demandCardsOverlay {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        .demand-card-overlay {
            flex: 1;
            min-width: 0;
            aspect-ratio: 59 / 92;
            background: linear-gradient(145deg, #1c2a3e, #162030);
            border: 1.5px solid #3a5a7a;
            border-radius: 8px;
            padding: 10px 8px;
            font-size: 12px;
            color: #d0dae8;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(100,160,220,0.1);
            transition: border-color 0.2s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .demand-card-overlay.placeholder {
            background: linear-gradient(145deg, #0e1520, #0a1018);
            border: 1.5px dashed #2a3a50;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        }

        .demand-card-overlay.discard-floater {
            flex: none;
            aspect-ratio: auto;
            box-sizing: border-box;
            pointer-events: none;
        }

        .demand-card-overlay.card-fly-floater {
            flex: none;
            aspect-ratio: auto;
            box-sizing: border-box;
        }

        .demand-card-overlay.deliverable {
            border-color: #4a9e4a;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 8px rgba(74,158,74,0.3);
        }

        .demand-card-overlay .card-header {
            text-align: center;
            font-weight: bold;
            font-size: 12px;
            color: #6a9ad0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            padding-bottom: 3px;
            border-bottom: 1px solid #2a4a6a;
            flex-shrink: 0;
        }

        .demand-card-overlay .card-demands-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            min-height: 0;
        }

        .demand-card-overlay .card-demand {
            padding: 3px 0;
        }

        .demand-card-overlay .card-demand + .card-demand {
            border-top: 1px solid #2a3a50;
        }

        .demand-card-overlay .good-name {
            font-weight: bold;
            color: #e0e8f0;
            font-size: 12px;
        }

        .demand-card-overlay .payout {
            color: #ffdd44;
            font-weight: bold;
            float: right;
            font-size: 12px;
        }

        .demand-card-overlay .source-cities {
            font-size: 11px;
            color: #8899aa;
            margin-top: 1px;
        }

        .demand-card-overlay .source-cities span {
            cursor: pointer;
            text-decoration: underline;
            color: #7baadd;
        }

        .demand-card-overlay .source-cities span:hover {
            color: #aaccff;
        }

        .demand-card-overlay .dest-city {
            font-size: 11px;
            margin-top: 1px;
        }

        .demand-card-overlay .dest-city span {
            cursor: pointer;
            text-decoration: underline;
            color: #eebb44;
            font-weight: bold;
        }

        .demand-card-overlay .dest-city span:hover {
            color: #ffdd88;
        }

        .demand-card-overlay .deliver-btn {
            display: inline-block;
            padding: 1px 4px;
            margin-left: 4px;
            font-size: 9px;
            font-weight: bold;
            background: #3a8a3a;
            color: #fff;
            border: 1px solid #4a9e4a;
            border-radius: 3px;
            cursor: pointer;
            vertical-align: middle;
        }

        .demand-card-overlay .deliver-btn:hover {
            background: #4aaa4a;
        }

        .sidebar {
            width: 300px;
            background: #2d2d2d;
            border-left: 1px solid #444;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 15px;
            border-bottom: 1px solid #444;
        }

        .sidebar-section h3 {
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            color: #4a9eff;
        }

        .player-info {
            margin-bottom: 8px;
            font-size: 13px;
        }

        .player-info.active {
            background: #444;
            padding: 8px;
            border-radius: 3px;
            border-left: 3px solid #4a9eff;
        }

        .demand-card {
            background: #1a1a1a;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 3px;
            font-size: 12px;
            border: 1px solid #444;
        }

        .log-entry {
            font-size: 12px;
            margin-bottom: 5px;
            color: #bbb;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
        }

        .modal-content h2 {
            margin-bottom: 15px;
        }

        .modal-content p {
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .win-condition {
            background: #1a5c1a;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 13px;
            border: 1px solid #4a9e4a;
        }

        .turn-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 998;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .turn-overlay.show {
            display: flex;
        }

        .turn-overlay-content {
            background: #2d2d2d;
            padding: 40px 60px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 2px solid #4a9eff;
        }

        .turn-overlay-content h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .turn-overlay-content .player-name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .turn-overlay-content .phase-label {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .trackage-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .trackage-modal.show {
            display: flex;
        }
        .trackage-modal-content {
            background: linear-gradient(135deg, #2d1a00, #3d2a00);
            padding: 24px 36px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 6px 24px rgba(0,0,0,0.6);
            border: 2px solid #cc8800;
            min-width: 280px;
        }
        .trackage-modal-content h3 {
            color: #ffcc44;
            margin: 0 0 16px 0;
            font-size: 18px;
        }
        .trackage-transfer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            font-size: 14px;
        }
        .trackage-transfer .arrow {
            color: #ffaa44;
            margin: 0 10px;
            font-size: 18px;
        }
        .trackage-transfer .amount {
            color: #ffcc44;
            font-weight: bold;
            font-size: 16px;
        }

        .event-overlay {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .event-card-popup {
            background: linear-gradient(135deg, #8b0000, #cc0000);
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border: 3px solid #ffaa00;
            animation: eventPulse 0.5s ease-out;
        }

        @keyframes eventPulse {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .event-card-header {
            font-size: 28px;
            font-weight: bold;
            color: #ffff00;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .event-card-number {
            font-size: 14px;
            color: #ffcc00;
            margin-bottom: 15px;
        }

        .event-card-description {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .event-card-button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            background: #ffaa00;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .event-card-button:hover {
            background: #ffbb22;
        }

        #activeEventsOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 300px;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 8px 12px;
            z-index: 15;
            pointer-events: none;
        }

        #activeEventsOverlay > * {
            pointer-events: auto;
        }

        .active-event-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #4a1a1a, #3a1010);
            border: 1.5px solid #aa4444;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 12px;
            color: #e0c0c0;
            box-shadow: 0 4px 20px rgba(140,40,40,0.35), inset 0 1px 0 rgba(255,100,100,0.1);
            animation: eventPulse 2.5s ease-in-out infinite;
        }

        @keyframes eventPulse {
            0%, 100% { border-color: #aa4444; box-shadow: 0 4px 20px rgba(140,40,40,0.35), inset 0 1px 0 rgba(255,100,100,0.1); }
            50% { border-color: #cc5555; box-shadow: 0 4px 24px rgba(180,50,50,0.5), inset 0 1px 0 rgba(255,100,100,0.15); }
        }

        .active-event-card .event-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .active-event-card .event-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .active-event-card .event-card-title {
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #ff9999;
        }

        .active-event-card .event-card-desc {
            font-size: 11px;
            color: #cc9999;
        }

        .active-event-card .event-card-expiry {
            font-size: 10px;
            color: #886666;
            font-style: italic;
        }

        /* Card draw animation overlay */
        .card-draw-overlay {
            display: flex;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .card-draw-overlay.show {
            opacity: 1;
        }

        .card-draw-preview {
            width: 260px;
            border-radius: 12px;
            padding: 18px;
            font-size: 12px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            transform: scale(0.3) rotate(-10deg);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }
        .card-draw-preview.reveal {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }
        .card-draw-preview.fly-to-position {
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), width 0.5s ease, padding 0.5s ease;
        }

        /* Multi-card row container for equal height cards */
        .multi-card-row {
            display: flex;
            gap: 16px;
            align-items: stretch;
        }

        /* Draw animation uses demand-card-overlay styling with animation overrides */
        .card-draw-preview.demand-card-overlay {
            width: 180px;
            aspect-ratio: 59 / 92;
            text-align: left;
            display: flex;
            flex-direction: column;
            padding: 10px 8px;
            border-radius: 8px;
        }

        /* Event card draw style */
        .card-draw-preview.event {
            background: linear-gradient(135deg, #8b0000, #cc0000);
            border: 3px solid #ffaa00;
            color: #fff;
        }
        .card-draw-preview.event .draw-title {
            color: #ffff00;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        .card-draw-preview .draw-event-desc {
            font-size: 13px;
            line-height: 1.5;
            color: #ffe0e0;
        }
    </style>
</head>
<body>

<div class="setup-screen" id="setupScreen">
    <div class="setup-dialog">
        <h1>Eurorails: Railroad Game</h1>

        <div class="setup-section">
            <label>Number of Players:</label>
            <input type="number" id="playerCount" min="1" max="6" value="2">
        </div>

        <div id="playerInputs"></div>

        <div class="setup-buttons">
            <button onclick="startGame()">Start Game</button>
        </div>
    </div>
</div>

<div class="container" style="display: none;" id="gameContainer">
    <div class="map-area">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div id="leftPanelStack">
        <div id="legendOverlay"></div>
        <div id="trainCardOverlay"></div>
        <div id="demandCardsOverlay"></div>
    </div>
    <div id="activeEventsOverlay"></div>
    <div class="sidebar">
        <div class="sidebar-section">
            <h3>Win Condition</h3>
            <div class="win-condition">
                Connect 7 of 8 major cities + 250M ECU cash
            </div>
        </div>

        <div class="sidebar-section">
            <h3>Players</h3>
            <div id="playersList"></div>
        </div>

        <div class="sidebar-section">
            <h3>Actions</h3>
            <div id="actionButtons"></div>
        </div>



        <div class="sidebar-section">
            <h3>Log</h3>
            <div id="gameLog" style="height: 150px; overflow-y: auto; font-size: 12px;"></div>
        </div>
    </div>
</div>

<div class="modal" id="endGameModal">
    <div class="modal-content">
        <h2>Game Over!</h2>
        <p id="winnerText"></p>
        <div class="modal-buttons">
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>
</div>

<script>
// ============================================================================
// CONSTANTS
// ============================================================================

// World coordinate bounds — derived from hex grid (x:15-63, y:6-69),
// landmass extents, and city positions, with padding for visual margin.
const WORLD_BOUNDS = { minX: 12, minY: 1, maxX: 66, maxY: 73 };

const MAJOR_CITIES = ["Amsterdam", "Berlin", "Essen", "London", "Madrid", "Milano", "Paris", "Vienna"];

const CITIES = {
    "Aberdeen": { x: 29.5, y: 13, type: "small", goods: ["Fish", "Oil"], country: "UK" },
    "Glasgow": { x: 27, y: 17, type: "small", goods: ["Sheep"], country: "UK" },
    "Belfast": { x: 22, y: 19, type: "small", goods: ["Potatoes"], country: "UK" },

function pointInPolygon(point, polygon) {
    const [x, y] = point;
    let inside = false;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const [xi, yi] = polygon[i];
        const [xj, yj] = polygon[j];
        if ((yi > y) !== (yj > y) && x < ((xj - xi) * (y - yi)) / (yj - yi) + xi) {
            inside = !inside;
        }
    }
    return inside;
}

function isLand(x, y) {
    for (let landmass of Object.values(LANDMASSES)) {
        if (pointInPolygon([x, y], landmass)) {
            return true;
        }
    }
    return false;
}

function getLandmass(x, y) {
    for (let [name, polygon] of Object.entries(LANDMASSES)) {
        if (pointInPolygon([x, y], polygon)) return name;
    }
    return null;
}

// Landmasses that share a land border (can build track between them without a ferry)
const CONNECTED_LANDMASSES = new Set([
    "continental|italy", "italy|continental",
    "continental|iberia", "iberia|continental",
    "continental|denmark", "denmark|continental",
    "zealand|denmark", "denmark|zealand",
    "denmark|scandinavia", "scandinavia|denmark",
    "zealand|scandinavia", "scandinavia|zealand"
]);

function landmassesConnected(lm1, lm2) {
    if (lm1 === lm2) return true;
    return CONNECTED_LANDMASSES.has(lm1 + "|" + lm2);
}

// Deterministic hash for terrain randomness (consistent across redraws)
function terrainHash(x, y) {
    // Simple hash: combine x,y into a pseudo-random 0-1 value
    let h = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
    return h - Math.floor(h);
}

// Compute how deep a point is inside a polygon (0 = edge, 1 = center)
function polygonDepth(point, polygon) {
    // Minimum distance from point to any polygon edge
    const n = polygon.length - 1; // last point repeats first
    let minEdgeDist = Infinity;
    for (let i = 0; i < n; i++) {
        const j = i + 1;
        const d = segmentDistance(point[0], point[1],
            polygon[i][0], polygon[i][1], polygon[j][0], polygon[j][1]);
        if (d < minEdgeDist) minEdgeDist = d;
    }

    // Normalize by half the avg centroid-to-vertex distance (approximate inradius)
    let cx = 0, cy = 0;
    for (let i = 0; i < n; i++) { cx += polygon[i][0]; cy += polygon[i][1]; }
    cx /= n; cy /= n;
    let avgR = 0;
    for (let i = 0; i < n; i++) avgR += Math.hypot(polygon[i][0] - cx, polygon[i][1] - cy);
    avgR /= n;

    return Math.min(1, minEdgeDist / (avgR * 0.5));
}

function getTerrainType(x, y) {
    const hash = terrainHash(x, y);
    const hash2 = terrainHash(x + 0.5, y + 0.3); // second hash for variety

    // Check mountain pass corridors — override alpine terrain with clear/mountain
    for (const pass of MOUNTAIN_PASSES) {
        const dist = segmentDistance(x, y, pass.from[0], pass.from[1], pass.to[0], pass.to[1]);
        if (dist <= pass.radius) {
            // 70% clear, 30% mountain — no alpine in passes
            if (hash < 0.70) return "clear";
            return "mountain";
        }
    }

    // Check alpine regions first
    for (let polygon of TERRAIN_REGIONS.alpine) {
        if (pointInPolygon([x, y], polygon)) {
            const depth = polygonDepth([x, y], polygon);
            // Core (depth > 0.6): 60% alpine, 30% mountain, 10% clear
            // Mid (0.3-0.6): 30% alpine, 40% mountain, 30% clear
            // Edge (< 0.3): 10% alpine, 40% mountain, 50% clear
            if (depth > 0.6) {
                if (hash < 0.60) return "alpine";
                if (hash < 0.90) return "mountain";
                return "clear";
            } else if (depth > 0.3) {
                if (hash < 0.30) return "alpine";
                if (hash < 0.70) return "mountain";
                return "clear";
            } else {
                if (hash < 0.10) return "alpine";
                if (hash < 0.50) return "mountain";
                return "clear";
            }
        }
    }

    // Check mountain regions
    for (let polygon of TERRAIN_REGIONS.mountain) {
        if (pointInPolygon([x, y], polygon)) {
            const depth = polygonDepth([x, y], polygon);
            // Core (depth > 0.5): 70% mountain, 15% alpine, 15% clear
            // Mid (0.25-0.5): 50% mountain, 5% alpine, 45% clear
            // Edge (< 0.25): 30% mountain, 0% alpine, 70% clear
            if (depth > 0.5) {
                if (hash < 0.70) return "mountain";
                if (hash < 0.85) return "alpine";
                return "clear";
            } else if (depth > 0.25) {
                if (hash < 0.50) return "mountain";
                if (hash < 0.55) return "alpine";
                return "clear";
            } else {
                if (hash < 0.30) return "mountain";
                return "clear";
            }
        }
    }

    return "clear";
}

function segmentDistance(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    let t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);
    t = Math.max(0, Math.min(1, t));
    const closestX = x1 + t * dx;
    const closestY = y1 + t * dy;
    const distX = px - closestX;
    const distY = py - closestY;
    return Math.sqrt(distX * distX + distY * distY);
}

function segmentsIntersect(ax1, ay1, ax2, ay2, bx1, by1, bx2, by2) {
    // Returns true if line segment (ax1,ay1)-(ax2,ay2) intersects (bx1,by1)-(bx2,by2)
    const dx1 = ax2 - ax1, dy1 = ay2 - ay1;
    const dx2 = bx2 - bx1, dy2 = by2 - by1;
    const denom = dx1 * dy2 - dy1 * dx2;
    if (Math.abs(denom) < 1e-10) return false; // parallel
    const t = ((bx1 - ax1) * dy2 - (by1 - ay1) * dx2) / denom;
    const u = ((bx1 - ax1) * dy1 - (by1 - ay1) * dx1) / denom;
    return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

function crossesRiver(x1, y1, x2, y2, river) {
    for (let i = 0; i < river.length - 1; i++) {
        const [rx1, ry1] = river[i];
        const [rx2, ry2] = river[i + 1];
        if (segmentsIntersect(x1, y1, x2, y2, rx1, ry1, rx2, ry2)) {
            return true;
        }
    }
    return false;
}

function edgeCrossesRiver(x1, y1, x2, y2) {
    for (let river of Object.values(RIVERS)) {
        if (crossesRiver(x1, y1, x2, y2, river)) {
            return true;
        }
    }
    return false;
}

function generateHexGrid() {
    const mileposts = [];
    const mileposts_by_id = {};
    const cellSize = 1.0;
    const rowSpacing = Math.sqrt(3) / 2;

    let id = 0;
    let rowIndex = 0;
    for (let y = 6; y < 69; y += rowSpacing) {
        const isOddRow = rowIndex % 2 === 1;
        const offsetX = isOddRow ? 0.5 : 0;
        rowIndex++;

        for (let x = 15 + offsetX; x < 63; x += cellSize) {
            if (isLand(x, y)) {
                const terrain = getTerrainType(x, y);
                const landmass = getLandmass(x, y);
                const milepost = {
                    id,
                    x: Math.round(x * 100) / 100,
                    y: Math.round(y * 100) / 100,
                    terrain,
                    landmass,
                    city: null,
                    track: {},
                    neighbors: []
                };
                mileposts.push(milepost);
                mileposts_by_id[id] = milepost;
                id++;
            }
        }
    }

    // Build adjacency using spatial hash for O(n) performance
    const spatialHash = {};
    const bucketSize = 1.5;
    for (let mp of mileposts) {
        const bx = Math.floor(mp.x / bucketSize);
        const by = Math.floor(mp.y / bucketSize);
        const key = `${bx},${by}`;
        if (!spatialHash[key]) spatialHash[key] = [];
        spatialHash[key].push(mp.id);
    }

    for (let mp of mileposts) {
        const bx = Math.floor(mp.x / bucketSize);
        const by = Math.floor(mp.y / bucketSize);
        const neighbors = new Set();

        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                const key = `${bx + dx},${by + dy}`;
                if (spatialHash[key]) {
                    for (let otherId of spatialHash[key]) {
                        if (otherId !== mp.id) {
                            const other = mileposts_by_id[otherId];
                            const dist = Math.hypot(mp.x - other.x, mp.y - other.y);
                            if (dist < 1.5 && mp.landmass && other.landmass && landmassesConnected(mp.landmass, other.landmass)) {
                                neighbors.add(otherId);
                            }
                        }
                    }
                }
            }
        }

        mp.neighbors = Array.from(neighbors);
    }

    // Assign cities to mileposts
    const cityToMilepost = {};
    for (let cityName in CITIES) {
        let closest = null;
        let closestDist = Infinity;
        const city = CITIES[cityName];

        for (let mp of mileposts) {
            const dist = Math.hypot(mp.x - city.x, mp.y - city.y);
            if (dist < closestDist) {
                closestDist = dist;
                closest = mp;
            }
        }

        if (closest && closestDist < 2) {
            closest.city = { name: cityName, ...CITIES[cityName] };
            cityToMilepost[cityName] = closest.id;
        }
    }

    gameState.mileposts = mileposts;
    gameState.mileposts_by_id = mileposts_by_id;
    gameState.cityToMilepost = cityToMilepost;

    // Snap ferry endpoints to nearest mileposts
    gameState.ferryConnections = [];
    for (let ferry of FERRY_ROUTES) {
        let fromMp = null, toMp = null;
        let fromDist = Infinity, toDist = Infinity;
        for (let mp of mileposts) {
            const dFrom = Math.hypot(mp.x - ferry.from[0], mp.y - ferry.from[1]);
            const dTo = Math.hypot(mp.x - ferry.to[0], mp.y - ferry.to[1]);
            if (dFrom < fromDist) { fromDist = dFrom; fromMp = mp; }
            if (dTo < toDist) { toDist = dTo; toMp = mp; }
        }
        if (fromMp && toMp) {
            gameState.ferryConnections.push({
                fromId: fromMp.id,
                toId: toMp.id,
                name: ferry.name,
                cost: ferry.cost
            });
        }
    }
}

function computeCoastDistances() {
    // Multi-source BFS from all coastal mileposts (those with <6 neighbors)
    const dist = {};
    const queue = [];

    for (const mp of gameState.mileposts) {
        if (mp.neighbors.length < 6) {
            dist[mp.id] = 0;
            queue.push(mp.id);
        }
    }

    let head = 0;
    while (head < queue.length) {
        const id = queue[head++];
        const mp = gameState.mileposts_by_id[id];
        for (const nId of mp.neighbors) {
            if (dist[nId] === undefined) {
                dist[nId] = dist[id] + 1;
                queue.push(nId);
            }
        }
    }

    gameState.coastDistance = dist;
}

// ============================================================================
// DIJKSTRA'S ALGORITHM WITH PRIORITY QUEUE
// ============================================================================

class MinHeap {
    constructor() {
        this.heap = [];
    }

    push(item) {
        this.heap.push(item);
        this._bubbleUp(this.heap.length - 1);
    }

    pop() {
        if (this.heap.length === 0) return null;
        if (this.heap.length === 1) return this.heap.pop();
        const min = this.heap[0];
        this.heap[0] = this.heap.pop();
        this._bubbleDown(0);
        return min;
    }

    _bubbleUp(i) {
        while (i > 0) {
            const parent = Math.floor((i - 1) / 2);
            if (this.heap[parent].cost <= this.heap[i].cost) break;
            [this.heap[parent], this.heap[i]] = [this.heap[i], this.heap[parent]];
            i = parent;
        }
    }

    _bubbleDown(i) {
        while (true) {
            let smallest = i;
            const left = 2 * i + 1;
            const right = 2 * i + 2;
            if (left < this.heap.length && this.heap[left].cost < this.heap[smallest].cost) {
                smallest = left;
            }
            if (right < this.heap.length && this.heap[right].cost < this.heap[smallest].cost) {
                smallest = right;
            }
            if (smallest === i) break;
            [this.heap[i], this.heap[smallest]] = [this.heap[smallest], this.heap[i]];
            i = smallest;
        }
    }
}

function getFerryPortCost(milepostId) {
    // Returns the ferry build cost if this milepost is a ferry port, 0 otherwise
    for (let ferry of gameState.ferryConnections) {
        if (ferry.fromId === milepostId || ferry.toId === milepostId) {
            return ferry.cost;
        }
    }
    return 0;
}

function getFerryName(fromId, toId) {
    // Returns the ferry name for a connection between two port mileposts
    for (let ferry of gameState.ferryConnections) {
        if ((ferry.fromId === fromId && ferry.toId === toId) ||
            (ferry.toId === fromId && ferry.fromId === toId)) {
            return ferry.name;
        }
    }
    return null;
}

function getMileppostCost(mp1, mp2) {
    // Determine base cost
    let cost = 0;

    // If destination is a city, use city cost (replaces terrain cost)
    if (mp2.city) {
        if (MAJOR_CITIES.includes(mp2.city.name)) {
            cost = 5;
        } else {
            cost = 3;
        }
    } else {
        // Use terrain cost
        if (mp2.terrain === "alpine") {
            cost = 5;
        } else if (mp2.terrain === "mountain") {
            cost = 2;
        } else {
            cost = 1;
        }
    }

    // Add river crossing cost if applicable
    if (edgeCrossesRiver(mp1.x, mp1.y, mp2.x, mp2.y)) {
        cost += 2;
    }

    // Ferry port cost is no longer added here — ferries are handled as separate
    // edges in findPath with their own cost from FERRY_ROUTES

    return cost;
}

// Returns canonical key for a ferry connection (always smaller id first)
function getFerryKey(id1, id2) {
    return id1 < id2 ? id1 + "|" + id2 : id2 + "|" + id1;
}

// Check if player can build (claim) a ferry: must not be full (2 owners) unless player already owns it
function canPlayerBuildFerry(ferryKey, playerColor) {
    const owners = gameState.ferryOwnership[ferryKey] || [];
    if (owners.includes(playerColor)) return true; // already owns it
    return owners.length < 2; // room for another owner
}

// Check if player already owns a ferry
function playerOwnsFerry(ferryKey, playerColor) {
    const owners = gameState.ferryOwnership[ferryKey] || [];
    return owners.includes(playerColor);
}

function findPath(startId, endId, playerColor, mode) {
    mode = mode || "cheapest";
    const dist = {};
    const prev = {};
    const costTie = {}; // secondary tiebreaker: real cost for "shortest", segment count for "cheapest"
    const heap = new MinHeap();

    // Build sets of edges owned by this player (free) and by other players (blocked)
    const ownedEdges = new Set();
    const blockedEdges = new Set();
    if (playerColor) {
        for (let track of gameState.tracks) {
            const fwd = track.from + "|" + track.to;
            const rev = track.to + "|" + track.from;
            if (track.color === playerColor) {
                ownedEdges.add(fwd);
                ownedEdges.add(rev);
            } else {
                blockedEdges.add(fwd);
                blockedEdges.add(rev);
            }
        }
    }

    // Build a lookup for ferry connections from each milepost
    const ferryFromMilepost = {};
    for (let fc of gameState.ferryConnections) {
        if (!ferryFromMilepost[fc.fromId]) ferryFromMilepost[fc.fromId] = [];
        if (!ferryFromMilepost[fc.toId]) ferryFromMilepost[fc.toId] = [];
        ferryFromMilepost[fc.fromId].push(fc);
        ferryFromMilepost[fc.toId].push(fc);
    }

    const start = gameState.mileposts_by_id[startId];
    const end = gameState.mileposts_by_id[endId];

    // Build set of mileposts blocked by active events for building
    const buildBlockedMileposts = new Set();
    for (const ae of gameState.activeEvents) {
        const evt = ae.card;
        // Strike 123: drawing player cannot build at all (handled by caller check)
        if (evt.type === "snow" || evt.type === "fog" || evt.type === "gale") {
            // Collect all zone center mileposts and BFS from each
            const centers = [];
            if (evt.city) {
                const cId = gameState.cityToMilepost[evt.city];
                if (cId !== undefined) centers.push(cId);
            }
            if (evt.seaAreas) {
                const coastalStarts = getCoastalMilepostsForSeaAreas(evt.seaAreas);
                for (const cId of coastalStarts) centers.push(cId);
            }
            // Multi-source BFS from all centers; coastal mileposts count as #1
            const seaRadius = evt.seaAreas ? evt.radius - 1 : evt.radius;
            const zoneIds = centers.length > 0 ? getMilepostsInHexRangeMultiSource(centers, seaRadius) : new Set();
            for (const id of zoneIds) {
                // Snow only blocks building in mountain/alpine mileposts;
                // Fog and Gale block all mileposts in the zone
                if (evt.type === "snow") {
                    const mp = gameState.mileposts_by_id[id];
                    if (evt.blockedTerrain && evt.blockedTerrain.includes(mp.terrain)) {
                        buildBlockedMileposts.add(id);
                    }
                } else {
                    buildBlockedMileposts.add(id);
                }
            }
        }
    }

    for (let mp of gameState.mileposts) {
        dist[mp.id] = Infinity;
        costTie[mp.id] = Infinity;
        prev[mp.id] = null;
    }
    dist[startId] = 0;
    costTie[startId] = 0;
    heap.push({ id: startId, cost: 0 });

    while (true) {
        const item = heap.pop();
        if (!item) break;
        const current = gameState.mileposts_by_id[item.id];

        if (item.cost > dist[current.id]) continue;
        if (current.id === endId) break;

        // Traverse land neighbors
        for (let neighborId of current.neighbors) {
            const neighbor = gameState.mileposts_by_id[neighborId];
            const edgeKey = current.id + "|" + neighborId;
            // Cannot build on edges owned by other players
            if (blockedEdges.has(edgeKey)) continue;
            // Cannot build into event-blocked mileposts (snow/fog/gale zones)
            if (buildBlockedMileposts.has(neighborId)) continue;
            // If player already owns this edge, weight is 0 in cheapest mode
            const isOwned = ownedEdges.has(edgeKey);
            const realEdgeCost = isOwned ? 0 : getMileppostCost(current, neighbor);
            // In "shortest" mode, every edge costs 1 (even owned ones) to find the
            // path with fewest total segments rather than detouring through existing track.
            // In "cheapest" mode, owned edges are free.
            const edgeWeight = mode === "shortest" ? 1 : realEdgeCost;
            const newDist = dist[current.id] + edgeWeight;
            // Tiebreaker: in "shortest" mode, prefer lower real cost; in "cheapest" mode, prefer fewer segments
            const newCostTie = costTie[current.id] + (mode === "shortest" ? realEdgeCost : 1);

            if (newDist < dist[neighbor.id] || (newDist === dist[neighbor.id] && newCostTie < costTie[neighbor.id])) {
                dist[neighbor.id] = newDist;
                costTie[neighbor.id] = newCostTie;
                prev[neighbor.id] = current.id;
                heap.push({ id: neighbor.id, cost: newDist });
            }
        }

        // Traverse ferry connections from this milepost
        const ferries = ferryFromMilepost[current.id] || [];
        for (let fc of ferries) {
            const neighborId = fc.fromId === current.id ? fc.toId : fc.fromId;
            const ferryKey = getFerryKey(fc.fromId, fc.toId);

            // Block ferry building if either port is in a gale/snow/fog build-blocked zone
            if (buildBlockedMileposts.has(current.id) || buildBlockedMileposts.has(neighborId)) continue;

            // Check if ferry is available to this player
            if (!canPlayerBuildFerry(ferryKey, playerColor)) continue;

            const alreadyOwned = playerOwnsFerry(ferryKey, playerColor);
            let realFerryCost = alreadyOwned ? 0 : fc.cost;
            // Add city entry cost if ferry destination is a city
            if (!alreadyOwned) {
                const destMp = gameState.mileposts_by_id[neighborId];
                if (destMp.city) {
                    realFerryCost += MAJOR_CITIES.includes(destMp.city.name) ? 5 : 3;
                }
            }
            const edgeWeight = mode === "shortest" ? 1 : realFerryCost;
            const newDist = dist[current.id] + edgeWeight;
            const newCostTie = costTie[current.id] + (mode === "shortest" ? realFerryCost : 1);

            if (newDist < dist[neighborId] || (newDist === dist[neighborId] && newCostTie < costTie[neighborId])) {
                dist[neighborId] = newDist;
                costTie[neighborId] = newCostTie;
                prev[neighborId] = current.id;
                heap.push({ id: neighborId, cost: newDist });
            }
        }
    }

    if (dist[endId] === Infinity) {
        return null;
    }

    const path = [];
    let current = endId;
    while (current !== null) {
        path.unshift(current);
        current = prev[current];
    }

    // Always compute real build cost by walking the path
    let realCost = 0;
    for (let i = 0; i < path.length - 1; i++) {
        const edgeKey = path[i] + "|" + path[i + 1];
        if (ownedEdges.has(edgeKey)) continue; // already own this track segment

        // Check if this is a ferry edge
        const ferryKey = getFerryKey(path[i], path[i + 1]);
        let isFerryEdge = false;
        for (let fc of gameState.ferryConnections) {
            if (getFerryKey(fc.fromId, fc.toId) === ferryKey) {
                isFerryEdge = true;
                if (!playerOwnsFerry(ferryKey, playerColor)) {
                    realCost += fc.cost;
                    // Add city entry cost if ferry destination is a city
                    const destMp = gameState.mileposts_by_id[path[i + 1]];
                    if (destMp.city) {
                        realCost += MAJOR_CITIES.includes(destMp.city.name) ? 5 : 3;
                    }
                }
                break;
            }
        }

        if (!isFerryEdge) {
            const mp1 = gameState.mileposts_by_id[path[i]];
            const mp2 = gameState.mileposts_by_id[path[i + 1]];
            realCost += getMileppostCost(mp1, mp2);
        }
    }

    return { path, cost: realCost };
}

// Check if an active gale 138 event blocks ferry movement between two ports
function isGaleBlockingFerry(portId1, portId2) {
    for (const ae of gameState.activeEvents) {
        if (ae.card.id === 138) {
            if (isMilepostInEventZone(ae.card, portId1) || isMilepostInEventZone(ae.card, portId2)) {
                return true;
            }
        }
    }
    return false;
}

// ============================================================================
// TRACK-BASED PATHFINDING (for train movement along built track)
// ============================================================================

function findPathOnTrack(startId, endId, playerColor, allowForeignTrack) {
    allowForeignTrack = allowForeignTrack || false;
    const visited = new Set([startId]);
    const prev = {};
    const ferryEdgeSet = new Set(); // track which edges are ferry crossings
    const foreignEdgeSet = new Set(); // track which edges use foreign track
    prev[startId] = null;
    const queue = [startId];

    // Build set of mileposts the player has track at
    const playerMileposts = getPlayerOwnedMileposts(playerColor);

    // Strike 123: collect colors of players whose rail lines are shut down
    const struckColors = new Set();
    for (const ae of gameState.activeEvents) {
        if (ae.card.id === 123) {
            struckColors.add(gameState.players[ae.drawingPlayerIndex].color);
        }
    }

    // Snow: collect set of blocked milepost IDs (terrain type per card)
    const snowBlockedMileposts = new Set();
    for (const ae of gameState.activeEvents) {
        if (ae.card.type === "snow") {
            const cityMpId = gameState.cityToMilepost[ae.card.city];
            if (cityMpId === undefined) continue;
            const inRange = getMilepostsInHexRange(cityMpId, ae.card.radius);
            for (const id of inRange) {
                const mp = gameState.mileposts_by_id[id];
                if (ae.card.blockedTerrain && ae.card.blockedTerrain.includes(mp.terrain)) {
                    snowBlockedMileposts.add(id);
                }
            }
        }
    }

    while (queue.length > 0) {
        const current = queue.shift();
        if (current === endId) break;

        // Traverse built track (own track always, foreign track if allowed)
        for (let track of gameState.tracks) {
            if (struckColors.has(track.color)) continue; // Strike 123: no movement on struck player's rails
            const isOwn = track.color === playerColor;
            if (!isOwn && !allowForeignTrack) continue;
            let neighbor = null;
            if (track.from === current) neighbor = track.to;
            else if (track.to === current) neighbor = track.from;

            if (neighbor && !visited.has(neighbor)) {
                if (snowBlockedMileposts.has(neighbor)) continue; // Snow: blocked mountain/alpine
                visited.add(neighbor);
                prev[neighbor] = current;
                if (!isOwn) {
                    foreignEdgeSet.add(current + "|" + neighbor);
                }
                queue.push(neighbor);
            }
        }

        // Traverse ferry connections (only if player owns this ferry)
        for (let ferry of gameState.ferryConnections) {
            let neighbor = null;
            if (ferry.fromId === current) neighbor = ferry.toId;
            else if (ferry.toId === current) neighbor = ferry.fromId;

            if (neighbor && !visited.has(neighbor)) {
                const ferryKey = getFerryKey(ferry.fromId, ferry.toId);
                if (playerOwnsFerry(ferryKey, playerColor)) {
                    // Gale 138: no ferry movement if either port is in the gale zone
                    if (isGaleBlockingFerry(ferry.fromId, ferry.toId)) continue;
                    visited.add(neighbor);
                    prev[neighbor] = current;
                    ferryEdgeSet.add(current + "|" + neighbor);
                    queue.push(neighbor);
                }
            }
        }
    }

    if (!visited.has(endId)) {
        return null;
    }

    // Reconstruct path and find ferry crossings + foreign segments
    const path = [];
    const ferryCrossings = []; // indices in path where ferry crossing starts
    const foreignSegments = []; // indices in path where foreign track is used
    let current = endId;
    while (current !== null) {
        path.unshift(current);
        current = prev[current];
    }

    // Identify ferry crossings and foreign segments in the path
    for (let i = 0; i < path.length - 1; i++) {
        const edgeKey = path[i] + "|" + path[i + 1];
        if (ferryEdgeSet.has(edgeKey)) {
            ferryCrossings.push(i);
        }
        if (foreignEdgeSet.has(edgeKey)) {
            foreignSegments.push(i);
        }
    }

    return { path, ferryCrossings, foreignSegments };
}

// ============================================================================
// GAME LOGIC
// ============================================================================

function getPlayerOwnedMileposts(playerColor) {
    const owned = new Set();
    for (let track of gameState.tracks) {
        if (track.color === playerColor) {
            owned.add(track.from);
            owned.add(track.to);
        }
    }
    // Include ferry port endpoints the player owns
    for (let fc of gameState.ferryConnections) {
        const ferryKey = getFerryKey(fc.fromId, fc.toId);
        if (playerOwnsFerry(ferryKey, playerColor)) {
            owned.add(fc.fromId);
            owned.add(fc.toId);
        }
    }
    return owned;
}

function canBuildFromMilepost(milepost, playerColor) {
    const owned = getPlayerOwnedMileposts(playerColor);

    // Can build from any milepost they own
    if (owned.has(milepost.id)) {
        return true;
    }

    // Can build from any major city milepost
    if (milepost.city && MAJOR_CITIES.includes(milepost.city.name)) {
        return true;
    }

    return false;
}

function getConnectedMajorCities(playerColor) {
    const cityMileposts = {};
    for (let cityName in gameState.cityToMilepost) {
        const mpId = gameState.cityToMilepost[cityName];
        if (!cityMileposts[mpId]) {
            cityMileposts[mpId] = [];
        }
        cityMileposts[mpId].push(cityName);
    }

    const owned = getPlayerOwnedMileposts(playerColor);
    const visited = new Set();
    const connectedCities = [];

    function bfs(startId) {
        const queue = [startId];
        const local_visited = new Set([startId]);

        while (queue.length > 0) {
            const current = queue.shift();

            if (cityMileposts[current]) {
                for (let cityName of cityMileposts[current]) {
                    if (MAJOR_CITIES.includes(cityName) && !connectedCities.includes(cityName)) {
                        connectedCities.push(cityName);
                    }
                }
            }

            for (let track of gameState.tracks) {
                if (track.color === playerColor) {
                    let neighbor = null;
                    if (track.from === current) neighbor = track.to;
                    else if (track.to === current) neighbor = track.from;

                    if (neighbor && !local_visited.has(neighbor)) {
                        local_visited.add(neighbor);
                        queue.push(neighbor);
                    }
                }
            }
        }
    }

    for (let mpId of owned) {
        if (!visited.has(mpId)) {
            bfs(mpId);
            visited.add(mpId);
        }
    }

    return connectedCities;
}

function checkWinCondition(player) {
    if (player.cash < 250) return false;
    const connectedCities = getConnectedMajorCities(player.color);
    return connectedCities.length >= 7;
}

function addLog(message) {
    const now = new Date().toLocaleTimeString();
    gameState.gameLog.push(`[${now}] ${message}`);
    const logDiv = document.getElementById("gameLog");
    if (logDiv) {
        logDiv.innerHTML += `<div class="log-entry">${message}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }
}

// ============================================================================
// EVENT CARD SYSTEM
// ============================================================================

function reshuffleDemandDiscardPile() {
    if (gameState.demandCardDiscardPile.length === 0) return;
    for (const card of gameState.demandCardDiscardPile) {
        card.fulfilled = [false, false, false];
    }
    const pile = gameState.demandCardDiscardPile;
    for (let i = pile.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pile[i], pile[j]] = [pile[j], pile[i]];
    }
    gameState.demandCardDeck.push(...pile);
    gameState.demandCardDiscardPile = [];
    addLog("Demand card deck reshuffled from discard pile.");
}

function drawCardForPlayer(player) {
    // Draw one card for the player, handling events as needed
    if (gameState.demandCardDeck.length === 0) {
        reshuffleDemandDiscardPile();
    }
    if (gameState.demandCardDeck.length === 0) {
        addLog("No more cards in deck!");
        return null;
    }

    const card = gameState.demandCardDeck.pop();

    if (card.type === "event") {
        // Handle event card
        const eventCard = card.event;

        // Only one gale can be active at a time — skip if a gale is already in effect
        if (eventCard.type === "gale" && gameState.activeEvents.some(ae => ae.card.type === "gale")) {
            addLog(`${eventCard.title} skipped — a gale is already active.`);
            return drawCardForPlayer(player);
        }

        addLog(`EVENT: ${eventCard.title}`);

        // Show event overlay
        showEventOverlay(eventCard);

        // Apply immediate effects (derailment, tax, flood)
        applyEventEffect(eventCard);

        // For persistent effects, add to active events
        if (eventCard.persistent) {
            gameState.activeEvents.push({
                card: eventCard,
                drawingPlayerIndex: gameState.currentPlayerIndex,
                drawingPlayerTurnEnded: false  // Set true after drawing player's next turn ends
            });
            addLog(`Event active for one full round`);
        }

        // Continue drawing until player has 3 demand cards
        return drawCardForPlayer(player);
    } else {
        // Demand card - add to player's hand, mark as animating for placeholder display
        card._animating = true;
        player.demandCards.push(card);
        // Show draw animation for the new demand card
        queueCardAnimation(card, false);
        return card;
    }
}

function applyEventEffect(eventCard) {
    if (eventCard.type === "tax") {
        // All players pay tax
        for (let player of gameState.players) {
            let tax = 0;
            if (player.cash > 200) tax = 25;
            else if (player.cash > 150) tax = 20;
            else if (player.cash > 100) tax = 15;
            else if (player.cash > 50) tax = 10;

            if (tax > 0) {
                const paid = Math.min(tax, player.cash);
                player.cash -= paid;
                addLog(`${player.name} pays ECU ${paid}M in taxes`);
            }
        }
    } else if (eventCard.type === "derailment") {
        // Check all players' trains against derailment zones (hex distance)
        const derailZone = new Set();
        for (const cityName of eventCard.cities) {
            const cityMpId = gameState.cityToMilepost[cityName];
            if (cityMpId === undefined) continue;
            for (const id of getMilepostsInHexRange(cityMpId, eventCard.radius)) {
                derailZone.add(id);
            }
        }

        for (let pIdx = 0; pIdx < gameState.players.length; pIdx++) {
            const player = gameState.players[pIdx];
            if (player.trainLocation === null) continue;

            const isInZone = derailZone.has(player.trainLocation);

            if (isInZone) {
                // Mark player as derailed (lose next turn)
                gameState.derailedPlayers[pIdx] = 1;
                // Force drop 1 load
                if (player.loads.length > 0) {
                    player.loads.pop();
                }
                addLog(`${player.name} derailed! Loses next turn and 1 load.`);
            }
        }
    } else if (eventCard.type === "flood") {
        // Destroy all track crossing the specified river
        const river = RIVERS[eventCard.river];
        const tracksToRemove = [];

        for (let i = 0; i < gameState.tracks.length; i++) {
            const track = gameState.tracks[i];
            const mp1 = gameState.mileposts_by_id[track.from];
            const mp2 = gameState.mileposts_by_id[track.to];

            if (crossesRiver(mp1.x, mp1.y, mp2.x, mp2.y, river)) {
                tracksToRemove.push(i);
                gameState.destroyedRiverTracks.push(track);
            }
        }

        // Remove tracks in reverse order to maintain indices
        for (let i = tracksToRemove.length - 1; i >= 0; i--) {
            gameState.tracks.splice(tracksToRemove[i], 1);
        }

        addLog(`${eventCard.title}: ${tracksToRemove.length} track segments destroyed.`);
    } else if (eventCard.type === "gale" && eventCard.id === 138) {
        // Major gale: trains on ferry port mileposts in the zone lose 1 turn and 1 load
        for (let pIdx = 0; pIdx < gameState.players.length; pIdx++) {
            const player = gameState.players[pIdx];
            if (player.trainLocation === null) continue;
            const trainMp = gameState.mileposts_by_id[player.trainLocation];
            // Check if player is at a ferry port
            let atFerryPort = false;
            for (let ferry of gameState.ferryConnections) {
                if (ferry.fromId === player.trainLocation || ferry.toId === player.trainLocation) {
                    atFerryPort = true;
                    break;
                }
            }
            if (atFerryPort && isMilepostInEventZone(eventCard, player.trainLocation)) {
                gameState.derailedPlayers[pIdx] = 1;
                if (player.loads.length > 0) player.loads.pop();
                addLog(`${player.name} caught in gale at ferry port! Loses next turn and 1 load.`);
            }
        }
    }
}

// Card draw animation queue - processes one at a time
let cardAnimationQueue = [];
let cardAnimationRunning = false;
let suppressCardAnimation = false;
let cardAnimationDoneCallback = null;

let cardAnimationHoldQueue = false;

function queueCardAnimation(cardData, isEvent) {
    if (suppressCardAnimation && !isEvent) return;
    cardAnimationQueue.push({ cardData, isEvent });
    if (!cardAnimationRunning && !cardAnimationHoldQueue) processNextCardAnimation();
}

function flushCardAnimationQueue() {
    cardAnimationHoldQueue = false;
    if (!cardAnimationRunning && cardAnimationQueue.length > 0) processNextCardAnimation();
}

function processNextCardAnimation() {
    if (cardAnimationQueue.length === 0) {
        cardAnimationRunning = false;
        if (cardAnimationDoneCallback) {
            const cb = cardAnimationDoneCallback;
            cardAnimationDoneCallback = null;
            cb();
        }
        return;
    }
    cardAnimationRunning = true;

    // Batch consecutive demand cards into a single multi-card display
    const first = cardAnimationQueue[0];
    if (!first.isEvent) {
        const batch = [];
        while (cardAnimationQueue.length > 0 && !cardAnimationQueue[0].isEvent) {
            batch.push(cardAnimationQueue.shift());
        }
        if (batch.length > 1) {
            showMultiCardDrawAnimation(batch.map(b => b.cardData));
            return;
        }
        // Single demand card — fall through to normal display
        cardAnimationQueue.unshift(batch[0]);
    }

    const { cardData, isEvent } = cardAnimationQueue.shift();
    showCardDrawAnimation(cardData, isEvent);
}

// BFS from a milepost, returning Set of all milepost IDs within N hex hops
function getMilepostsInHexRange(startId, radius) {
    const result = new Set([startId]);
    const queue = [startId];
    const dist = { [startId]: 0 };

    let head = 0;
    while (head < queue.length) {
        const id = queue[head++];
        if (dist[id] >= radius) continue;
        const mp = gameState.mileposts_by_id[id];
        for (const nId of mp.neighbors) {
            if (dist[nId] === undefined) {
                dist[nId] = dist[id] + 1;
                result.add(nId);
                queue.push(nId);
            }
        }
    }
    return result;
}

// Get all coastal mileposts that border the given sea areas.
// A coastal milepost (< 6 neighbors) is assigned to whichever sea area
// has the closest reference point.  Returns array of milepost IDs.
function getCoastalMilepostsForSeaAreas(areaNames) {
    const targetSet = new Set(areaNames);
    const result = [];
    for (const mp of gameState.mileposts) {
        if (mp.neighbors.length >= 6) continue; // not coastal
        // Eastern map edge mileposts aren't truly coastal — in reality
        // there is more landmass to the east (Asia/Eastern Europe).
        // Skip them so they don't act as gale origin points.
        if (mp.x >= 62) continue;
        let nearestArea = null;
        let nearestDist = Infinity;
        for (const [name, points] of Object.entries(SEA_AREAS)) {
            for (const pt of points) {
                const d = Math.hypot(mp.x - pt.x, mp.y - pt.y);
                if (d < nearestDist) {
                    nearestDist = d;
                    nearestArea = name;
                }
            }
        }
        if (nearestArea && targetSet.has(nearestArea)) {
            result.push(mp.id);
        }
    }
    return result;
}

// Multi-source BFS from multiple starting mileposts simultaneously.
// Returns Set of all milepost IDs within radius hex hops of ANY start.
function getMilepostsInHexRangeMultiSource(startIds, radius) {
    const result = new Set(startIds);
    const queue = [...startIds];
    const dist = {};
    for (const id of startIds) dist[id] = 0;

    let head = 0;
    while (head < queue.length) {
        const id = queue[head++];
        if (dist[id] >= radius) continue;
        const mp = gameState.mileposts_by_id[id];
        for (const nId of mp.neighbors) {
            if (dist[nId] === undefined) {
                dist[nId] = dist[id] + 1;
                result.add(nId);
                queue.push(nId);
            }
        }
    }
    return result;
}

// Check if a milepost is within an event's affected zone using hex distance.
// For city-based events (snow/fog): BFS from the event city milepost.
// For sea-area-based events (gale): multi-source BFS from all coastal mileposts
// bordering the relevant sea areas, giving uniform depth from the coastline.
function isMilepostInEventZone(evt, milepostId) {
    const radius = evt.radius || 0;
    if (evt.city) {
        const cityMpId = gameState.cityToMilepost[evt.city];
        if (cityMpId !== undefined) {
            const inRange = getMilepostsInHexRange(cityMpId, radius);
            if (inRange.has(milepostId)) return true;
        }
    }
    if (evt.seaAreas) {
        const coastalStarts = getCoastalMilepostsForSeaAreas(evt.seaAreas);
        // Coastal milepost counts as #1, so go radius-1 more hops inland
        const inRange = getMilepostsInHexRangeMultiSource(coastalStarts, radius - 1);
        if (inRange.has(milepostId)) return true;
    }
    return false;
}

// Find the nearest milepost to a world coordinate point
function findNearestMilepost(wx, wy) {
    let bestId = null;
    let bestDist = Infinity;
    for (const mp of gameState.mileposts) {
        const d = Math.hypot(mp.x - wx, mp.y - wy);
        if (d < bestDist) {
            bestDist = d;
            bestId = mp.id;
        }
    }
    return bestId;
}

// Convex hull of 2D points (Andrew's monotone chain algorithm)
function convexHull(points) {
    points = points.slice().sort((a, b) => a[0] - b[0] || a[1] - b[1]);
    if (points.length <= 1) return points;
    const cross = (O, A, B) => (A[0] - O[0]) * (B[1] - O[1]) - (A[1] - O[1]) * (B[0] - O[0]);
    const lower = [];
    for (const p of points) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
        lower.push(p);
    }
    const upper = [];
    for (let i = points.length - 1; i >= 0; i--) {
        const p = points[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
        upper.push(p);
    }
    upper.pop();
    lower.pop();
    return lower.concat(upper);
}

// Expand a convex hull outward by a fixed pixel amount
function expandHull(hull, amount) {
    const expanded = [];
    const n = hull.length;
    for (let i = 0; i < n; i++) {
        const prev = hull[(i - 1 + n) % n];
        const curr = hull[i];
        const next = hull[(i + 1) % n];
        const dx1 = curr[0] - prev[0], dy1 = curr[1] - prev[1];
        const dx2 = next[0] - curr[0], dy2 = next[1] - curr[1];
        const len1 = Math.hypot(dx1, dy1) || 1;
        const len2 = Math.hypot(dx2, dy2) || 1;
        const nx1 = dy1 / len1, ny1 = -dx1 / len1;
        const nx2 = dy2 / len2, ny2 = -dx2 / len2;
        const nx = (nx1 + nx2) / 2;
        const ny = (ny1 + ny2) / 2;
        const nlen = Math.hypot(nx, ny) || 1;
        expanded.push([curr[0] + (nx / nlen) * amount, curr[1] + (ny / nlen) * amount]);
    }
    return expanded;
}


function isEventBlocking(action, context) {
    // Check if active events block the proposed action
    for (let activeEvent of gameState.activeEvents) {
        const evt = activeEvent.card;

        if (action === "load" || action === "deliver") {
            // Strike 121: No loading/delivery more than 3 mp from coast
            if (evt.id === 121 && context.milepostId !== undefined) {
                const d = gameState.coastDistance[context.milepostId];
                if (d !== undefined && d > evt.radius) return true;
            }
            // Strike 122: No loading/delivery within 2 mp of coast
            if (evt.id === 122 && context.milepostId !== undefined) {
                const d = gameState.coastDistance[context.milepostId];
                if (d !== undefined && d <= evt.radius) return true;
            }
        }

        if (action === "build") {
            // Strike 123: Drawing player cannot build
            if (evt.id === 123) {
                const drawingPlayer = gameState.players[activeEvent.drawingPlayerIndex];
                const currentPlayer = gameState.players[gameState.currentPlayerIndex];
                if (currentPlayer === drawingPlayer) {
                    return true; // Blocked
                }
            }
            // Snow/Fog/Gale build blocking is enforced in findPath() which
            // excludes mileposts in affected zones from pathfinding.
        }
    }
    return false;
}

// Check if a milepost is in any active half-speed event zone (snow/fog/gale)
function isInHalfSpeedZone(milepostId) {
    for (let activeEvent of gameState.activeEvents) {
        const evt = activeEvent.card;
        if (evt.type === "snow" || evt.type === "fog" || evt.type === "gale") {
            if (isMilepostInEventZone(evt, milepostId)) {
                return true;
            }
        }
    }
    return false;
}

// Calculate effective movement cost of a path, where steps into half-speed zones cost 2
function getPathMovementCost(path) {
    let cost = 0;
    for (let i = 1; i < path.length; i++) {
        cost += isInHalfSpeedZone(path[i]) ? 2 : 1;
    }
    return cost;
}

// Given a path and available movement points, return how many steps can be taken
function getMaxStepsForMovement(path, availableMovement) {
    let spent = 0;
    for (let i = 1; i < path.length; i++) {
        const stepCost = isInHalfSpeedZone(path[i]) ? 2 : 1;
        if (spent + stepCost > availableMovement) return i - 1;
        spent += stepCost;
    }
    return path.length - 1; // can afford the whole path
}
