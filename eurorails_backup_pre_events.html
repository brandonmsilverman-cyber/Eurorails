<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurorails - European Railroad Board Game (Milepost Edition)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .setup-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .setup-screen.hidden {
            display: none;
        }

        .setup-dialog {
            background: #2d2d2d;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 600px;
        }

        .setup-dialog h1 {
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }

        .setup-section {
            margin-bottom: 25px;
        }

        .setup-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .setup-section input[type="text"],
        .setup-section input[type="number"],
        .setup-section select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
        }

        .player-setup {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .player-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .player-input-row input {
            flex: 1;
        }

        .player-input-row select {
            flex: 0 0 120px;
        }

        .setup-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #4a9eff;
            color: #fff;
            transition: background 0.3s;
        }

        button:hover {
            background: #2e7fd9;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .map-area {
            flex: 1;
            position: relative;
            background: #1a1a1a;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #demandCardsOverlay {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            gap: 8px;
            z-index: 10;
            pointer-events: auto;
        }

        .demand-card-overlay {
            width: 180px;
            background: linear-gradient(145deg, #1c2a3e, #162030);
            border: 1.5px solid #3a5a7a;
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            color: #d0dae8;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(100,160,220,0.1);
            transition: border-color 0.2s;
        }

        .demand-card-overlay.deliverable {
            border-color: #4a9e4a;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 8px rgba(74,158,74,0.3);
        }

        .demand-card-overlay .card-header {
            text-align: center;
            font-weight: bold;
            font-size: 10px;
            color: #6a9ad0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #2a4a6a;
        }

        .demand-card-overlay .card-demand {
            padding: 4px 0;
        }

        .demand-card-overlay .card-demand + .card-demand {
            border-top: 1px solid #2a3a50;
        }

        .demand-card-overlay .good-name {
            font-weight: bold;
            color: #e0e8f0;
        }

        .demand-card-overlay .payout {
            color: #ffdd44;
            font-weight: bold;
            float: right;
        }

        .demand-card-overlay .source-cities {
            font-size: 10px;
            color: #8899aa;
            margin-top: 1px;
        }

        .demand-card-overlay .source-cities span {
            cursor: pointer;
            text-decoration: underline;
            color: #7baadd;
        }

        .demand-card-overlay .source-cities span:hover {
            color: #aaccff;
        }

        .demand-card-overlay .dest-city {
            font-size: 10px;
            margin-top: 1px;
        }

        .demand-card-overlay .dest-city span {
            cursor: pointer;
            text-decoration: underline;
            color: #eebb44;
            font-weight: bold;
        }

        .demand-card-overlay .dest-city span:hover {
            color: #ffdd88;
        }

        .demand-card-overlay .deliver-btn {
            width: 100%;
            padding: 4px;
            margin-top: 3px;
            font-size: 10px;
            font-weight: bold;
            background: #3a8a3a;
            color: #fff;
            border: 1px solid #4a9e4a;
            border-radius: 3px;
            cursor: pointer;
        }

        .demand-card-overlay .deliver-btn:hover {
            background: #4aaa4a;
        }

        .sidebar {
            width: 300px;
            background: #2d2d2d;
            border-left: 1px solid #444;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 15px;
            border-bottom: 1px solid #444;
        }

        .sidebar-section h3 {
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            color: #4a9eff;
        }

        .player-info {
            margin-bottom: 8px;
            font-size: 13px;
        }

        .player-info.active {
            background: #444;
            padding: 8px;
            border-radius: 3px;
            border-left: 3px solid #4a9eff;
        }

        .demand-card {
            background: #1a1a1a;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 3px;
            font-size: 12px;
            border: 1px solid #444;
        }

        .log-entry {
            font-size: 12px;
            margin-bottom: 5px;
            color: #bbb;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
        }

        .modal-content h2 {
            margin-bottom: 15px;
        }

        .modal-content p {
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .win-condition {
            background: #1a5c1a;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 13px;
            border: 1px solid #4a9e4a;
        }

        .turn-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 998;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .turn-overlay.show {
            display: flex;
        }

        .turn-overlay-content {
            background: #2d2d2d;
            padding: 40px 60px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 2px solid #4a9eff;
        }

        .turn-overlay-content h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        .turn-overlay-content .player-name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .turn-overlay-content .phase-label {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="setup-screen" id="setupScreen">
    <div class="setup-dialog">
        <h1>Eurorails: Railroad Game</h1>

        <div class="setup-section">
            <label>Number of Players:</label>
            <input type="number" id="playerCount" min="2" max="6" value="2">
        </div>

        <div id="playerInputs"></div>

        <div class="setup-buttons">
            <button onclick="startGame()">Start Game</button>
        </div>
    </div>
</div>

<div class="container" style="display: none;" id="gameContainer">
    <div class="map-area">
        <canvas id="gameCanvas"></canvas>
        <div id="demandCardsOverlay"></div>
    </div>
    <div class="sidebar">
        <div class="sidebar-section">
            <h3>Win Condition</h3>
            <div class="win-condition">
                Connect 7 of 8 major cities + 250M ECU cash
            </div>
        </div>

        <div class="sidebar-section" id="currentPlayerSection">
            <h3>Current Player</h3>
            <div id="currentPlayerInfo"></div>
        </div>

        <div class="sidebar-section">
            <h3>Players</h3>
            <div id="playersList"></div>
        </div>

        <div class="sidebar-section" id="buildSection" style="display:none;">
            <h3>Build</h3>
            <div id="buildPanel"></div>
        </div>

        <div class="sidebar-section">
            <h3>Actions</h3>
            <div id="actionButtons"></div>
        </div>

        <div class="sidebar-section">
            <h3>Log</h3>
            <div id="gameLog" style="height: 150px; overflow-y: auto; font-size: 11px;"></div>
        </div>
    </div>
</div>

<div class="modal" id="endGameModal">
    <div class="modal-content">
        <h2>Game Over!</h2>
        <p id="winnerText"></p>
        <div class="modal-buttons">
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>
</div>

function pointInPolygon(point, polygon) {
    const [x, y] = point;
    let inside = false;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const [xi, yi] = polygon[i];
        const [xj, yj] = polygon[j];
        if ((yi > y) !== (yj > y) && x < ((xj - xi) * (y - yi)) / (yj - yi) + xi) {
            inside = !inside;
        }
    }
    return inside;
}

function isLand(x, y) {
    for (let landmass of Object.values(LANDMASSES)) {
        if (pointInPolygon([x, y], landmass)) {
            return true;
        }
    }
    return false;
}

// Deterministic hash for terrain randomness (consistent across redraws)
function terrainHash(x, y) {
    // Simple hash: combine x,y into a pseudo-random 0-1 value
    let h = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
    return h - Math.floor(h);
}

// Compute how deep a point is inside a polygon (0 = edge, 1 = center)
function polygonDepth(point, polygon) {
    // Find centroid
    let cx = 0, cy = 0;
    const n = polygon.length - 1; // last point repeats first
    for (let i = 0; i < n; i++) {
        cx += polygon[i][0];
        cy += polygon[i][1];
    }
    cx /= n;
    cy /= n;

    // Find approximate radius (avg distance from centroid to vertices)
    let avgR = 0;
    for (let i = 0; i < n; i++) {
        avgR += Math.hypot(polygon[i][0] - cx, polygon[i][1] - cy);
    }
    avgR /= n;

    // Point's distance from centroid, normalized by avgR
    const distFromCenter = Math.hypot(point[0] - cx, point[1] - cy);
    return Math.max(0, 1 - distFromCenter / avgR);
}

function getTerrainType(x, y) {
    const hash = terrainHash(x, y);
    const hash2 = terrainHash(x + 0.5, y + 0.3); // second hash for variety

    // Check alpine regions first
    for (let polygon of TERRAIN_REGIONS.alpine) {
        if (pointInPolygon([x, y], polygon)) {
            const depth = polygonDepth([x, y], polygon);
            // Core (depth > 0.6): 60% alpine, 30% mountain, 10% clear
            // Mid (0.3-0.6): 30% alpine, 40% mountain, 30% clear
            // Edge (< 0.3): 10% alpine, 40% mountain, 50% clear
            if (depth > 0.6) {
                if (hash < 0.60) return "alpine";
                if (hash < 0.90) return "mountain";
                return "clear";
            } else if (depth > 0.3) {
                if (hash < 0.30) return "alpine";
                if (hash < 0.70) return "mountain";
                return "clear";
            } else {
                if (hash < 0.10) return "alpine";
                if (hash < 0.50) return "mountain";
                return "clear";
            }
        }
    }

    // Check mountain regions
    for (let polygon of TERRAIN_REGIONS.mountain) {
        if (pointInPolygon([x, y], polygon)) {
            const depth = polygonDepth([x, y], polygon);
            // Core (depth > 0.5): 70% mountain, 15% alpine, 15% clear
            // Mid (0.25-0.5): 50% mountain, 5% alpine, 45% clear
            // Edge (< 0.25): 30% mountain, 0% alpine, 70% clear
            if (depth > 0.5) {
                if (hash < 0.70) return "mountain";
                if (hash < 0.85) return "alpine";
                return "clear";
            } else if (depth > 0.25) {
                if (hash < 0.50) return "mountain";
                if (hash < 0.55) return "alpine";
                return "clear";
            } else {
                if (hash < 0.30) return "mountain";
                return "clear";
            }
        }
    }

    return "clear";
}

function segmentDistance(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    let t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);
    t = Math.max(0, Math.min(1, t));
    const closestX = x1 + t * dx;
    const closestY = y1 + t * dy;
    const distX = px - closestX;
    const distY = py - closestY;
    return Math.sqrt(distX * distX + distY * distY);
}

function segmentsIntersect(ax1, ay1, ax2, ay2, bx1, by1, bx2, by2) {
    // Returns true if line segment (ax1,ay1)-(ax2,ay2) intersects (bx1,by1)-(bx2,by2)
    const dx1 = ax2 - ax1, dy1 = ay2 - ay1;
    const dx2 = bx2 - bx1, dy2 = by2 - by1;
    const denom = dx1 * dy2 - dy1 * dx2;
    if (Math.abs(denom) < 1e-10) return false; // parallel
    const t = ((bx1 - ax1) * dy2 - (by1 - ay1) * dx2) / denom;
    const u = ((bx1 - ax1) * dy1 - (by1 - ay1) * dx1) / denom;
    return t >= 0 && t <= 1 && u >= 0 && u <= 1;
}

function crossesRiver(x1, y1, x2, y2, river) {
    for (let i = 0; i < river.length - 1; i++) {
        const [rx1, ry1] = river[i];
        const [rx2, ry2] = river[i + 1];
        if (segmentsIntersect(x1, y1, x2, y2, rx1, ry1, rx2, ry2)) {
            return true;
        }
    }
    return false;
}

function edgeCrossesRiver(x1, y1, x2, y2) {
    for (let river of Object.values(RIVERS)) {
        if (crossesRiver(x1, y1, x2, y2, river)) {
            return true;
        }
    }
    return false;
}

function generateHexGrid() {
    const mileposts = [];
    const mileposts_by_id = {};
    const cellSize = 1.0;
    const rowSpacing = Math.sqrt(3) / 2;

    let id = 0;
    for (let y = 6; y < 69; y += rowSpacing) {
        const isOddRow = Math.abs((y - 6) / rowSpacing) % 2 > 0.5;
        const offsetX = isOddRow ? 0.5 : 0;

        for (let x = 15 + offsetX; x < 63; x += cellSize) {
            if (isLand(x, y)) {
                const terrain = getTerrainType(x, y);
                const milepost = {
                    id,
                    x: Math.round(x * 100) / 100,
                    y: Math.round(y * 100) / 100,
                    terrain,
                    city: null,
                    track: {},
                    neighbors: []
                };
                mileposts.push(milepost);
                mileposts_by_id[id] = milepost;
                id++;
            }
        }
    }

    // Build adjacency using spatial hash for O(n) performance
    const spatialHash = {};
    const bucketSize = 1.5;
    for (let mp of mileposts) {
        const bx = Math.floor(mp.x / bucketSize);
        const by = Math.floor(mp.y / bucketSize);
        const key = `${bx},${by}`;
        if (!spatialHash[key]) spatialHash[key] = [];
        spatialHash[key].push(mp.id);
    }

    for (let mp of mileposts) {
        const bx = Math.floor(mp.x / bucketSize);
        const by = Math.floor(mp.y / bucketSize);
        const neighbors = new Set();

        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                const key = `${bx + dx},${by + dy}`;
                if (spatialHash[key]) {
                    for (let otherId of spatialHash[key]) {
                        if (otherId !== mp.id) {
                            const other = mileposts_by_id[otherId];
                            const dist = Math.hypot(mp.x - other.x, mp.y - other.y);
                            if (dist < 1.5) {
                                neighbors.add(otherId);
                            }
                        }
                    }
                }
            }
        }

        mp.neighbors = Array.from(neighbors);
    }

    // Assign cities to mileposts
    const cityToMilepost = {};
    for (let cityName in CITIES) {
        let closest = null;
        let closestDist = Infinity;
        const city = CITIES[cityName];

        for (let mp of mileposts) {
            const dist = Math.hypot(mp.x - city.x, mp.y - city.y);
            if (dist < closestDist) {
                closestDist = dist;
                closest = mp;
            }
        }

        if (closest && closestDist < 2) {
            closest.city = { name: cityName, ...CITIES[cityName] };
            cityToMilepost[cityName] = closest.id;
        }
    }

    gameState.mileposts = mileposts;
    gameState.mileposts_by_id = mileposts_by_id;
    gameState.cityToMilepost = cityToMilepost;
}

// ============================================================================
// DIJKSTRA'S ALGORITHM WITH PRIORITY QUEUE
// ============================================================================

class MinHeap {
    constructor() {
        this.heap = [];
    }

    push(item) {
        this.heap.push(item);
        this._bubbleUp(this.heap.length - 1);
    }

    pop() {
        if (this.heap.length === 0) return null;
        if (this.heap.length === 1) return this.heap.pop();
        const min = this.heap[0];
        this.heap[0] = this.heap.pop();
        this._bubbleDown(0);
        return min;
    }

    _bubbleUp(i) {
        while (i > 0) {
            const parent = Math.floor((i - 1) / 2);
            if (this.heap[parent].cost <= this.heap[i].cost) break;
            [this.heap[parent], this.heap[i]] = [this.heap[i], this.heap[parent]];
            i = parent;
        }
    }

    _bubbleDown(i) {
        while (true) {
            let smallest = i;
            const left = 2 * i + 1;
            const right = 2 * i + 2;
            if (left < this.heap.length && this.heap[left].cost < this.heap[smallest].cost) {
                smallest = left;
            }
            if (right < this.heap.length && this.heap[right].cost < this.heap[smallest].cost) {
                smallest = right;
            }
            if (smallest === i) break;
            [this.heap[i], this.heap[smallest]] = [this.heap[smallest], this.heap[i]];
            i = smallest;
        }
    }
}

function getMileppostCost(mp1, mp2) {
    // Determine base cost
    let cost = 0;

    // If destination is a city, use city cost (replaces terrain cost)
    if (mp2.city) {
        if (MAJOR_CITIES.includes(mp2.city.name)) {
            cost = 5;
        } else {
            cost = 3;
        }
    } else {
        // Use terrain cost
        if (mp2.terrain === "alpine") {
            cost = 5;
        } else if (mp2.terrain === "mountain") {
            cost = 2;
        } else {
            cost = 1;
        }
    }

    // Add river crossing cost if applicable
    if (edgeCrossesRiver(mp1.x, mp1.y, mp2.x, mp2.y)) {
        cost += 2;
    }

    return cost;
}

function findPath(startId, endId, playerColor) {
    const dist = {};
    const prev = {};
    const heap = new MinHeap();

    // Build sets of edges owned by this player (free) and by other players (blocked)
    const ownedEdges = new Set();
    const blockedEdges = new Set();
    if (playerColor) {
        for (let track of gameState.tracks) {
            const fwd = track.from + "|" + track.to;
            const rev = track.to + "|" + track.from;
            if (track.color === playerColor) {
                ownedEdges.add(fwd);
                ownedEdges.add(rev);
            } else {
                blockedEdges.add(fwd);
                blockedEdges.add(rev);
            }
        }
    }

    const start = gameState.mileposts_by_id[startId];
    const end = gameState.mileposts_by_id[endId];

    for (let mp of gameState.mileposts) {
        dist[mp.id] = Infinity;
        prev[mp.id] = null;
    }
    dist[startId] = 0;
    heap.push({ id: startId, cost: 0 });

    while (true) {
        const item = heap.pop();
        if (!item) break;
        const current = gameState.mileposts_by_id[item.id];

        if (item.cost > dist[current.id]) continue;
        if (current.id === endId) break;

        for (let neighborId of current.neighbors) {
            const neighbor = gameState.mileposts_by_id[neighborId];
            const edgeKey = current.id + "|" + neighborId;
            // Cannot build on edges owned by other players
            if (blockedEdges.has(edgeKey)) continue;
            // If player already owns this edge, cost is 0
            const edgeCost = ownedEdges.has(edgeKey) ? 0 : getMileppostCost(current, neighbor);
            const newDist = dist[current.id] + edgeCost;

            if (newDist < dist[neighbor.id]) {
                dist[neighbor.id] = newDist;
                prev[neighbor.id] = current.id;
                heap.push({ id: neighbor.id, cost: newDist });
            }
        }
    }

    if (dist[endId] === Infinity) {
        return null;
    }

    const path = [];
    let current = endId;
    while (current !== null) {
        path.unshift(current);
        current = prev[current];
    }

    return { path, cost: dist[endId] };
}

// ============================================================================
// TRACK-BASED PATHFINDING (for train movement along built track)
// ============================================================================

function findPathOnTrack(startId, endId, playerColor) {
    const visited = new Set([startId]);
    const prev = {};
    prev[startId] = null;
    const queue = [startId];

    while (queue.length > 0) {
        const current = queue.shift();
        if (current === endId) break;

        for (let track of gameState.tracks) {
            if (track.color !== playerColor) continue;
            let neighbor = null;
            if (track.from === current) neighbor = track.to;
            else if (track.to === current) neighbor = track.from;

            if (neighbor && !visited.has(neighbor)) {
                visited.add(neighbor);
                prev[neighbor] = current;
                queue.push(neighbor);
            }
        }
    }

    if (!visited.has(endId)) {
        return null;
    }

    const path = [];
    let current = endId;
    while (current !== null) {
        path.unshift(current);
        current = prev[current];
    }

    return path;
}

function getPlayerOwnedMileposts(playerColor) {
    const owned = new Set();
    for (let track of gameState.tracks) {
        if (track.color === playerColor) {
            owned.add(track.from);
            owned.add(track.to);
        }
    }
    return owned;
}

function canBuildFromMilepost(milepost, playerColor) {
    const owned = getPlayerOwnedMileposts(playerColor);

    // Can build from any milepost they own
    if (owned.has(milepost.id)) {
        return true;
    }

    // Can build from any major city milepost
    if (milepost.city && MAJOR_CITIES.includes(milepost.city.name)) {
        return true;
    }

    return false;
}

function getConnectedMajorCities(playerColor) {
    const cityMileposts = {};
    for (let cityName in gameState.cityToMilepost) {
        const mpId = gameState.cityToMilepost[cityName];
        if (!cityMileposts[mpId]) {
            cityMileposts[mpId] = [];
        }
        cityMileposts[mpId].push(cityName);
    }

    const owned = getPlayerOwnedMileposts(playerColor);
    const visited = new Set();
    const connectedCities = [];

    function bfs(startId) {
        const queue = [startId];
        const local_visited = new Set([startId]);

        while (queue.length > 0) {
            const current = queue.shift();

            if (cityMileposts[current]) {
                for (let cityName of cityMileposts[current]) {
                    if (MAJOR_CITIES.includes(cityName) && !connectedCities.includes(cityName)) {
                        connectedCities.push(cityName);
                    }
                }
            }

            for (let track of gameState.tracks) {
                if (track.color === playerColor) {
                    let neighbor = null;
                    if (track.from === current) neighbor = track.to;
                    else if (track.to === current) neighbor = track.from;

                    if (neighbor && !local_visited.has(neighbor)) {
                        local_visited.add(neighbor);
                        queue.push(neighbor);
                    }
                }
            }
        }
    }

    for (let mpId of owned) {
        if (!visited.has(mpId)) {
            bfs(mpId);
            visited.add(mpId);
        }
    }

    return connectedCities;
}

function checkWinCondition(player) {
    if (player.cash < 250) return false;
    const connectedCities = getConnectedMajorCities(player.color);
    return connectedCities.length >= 7;
}

function addLog(message) {
    const now = new Date().toLocaleTimeString();
    gameState.gameLog.push(`[${now}] ${message}`);
    const logDiv = document.getElementById("gameLog");
    if (logDiv) {
        logDiv.innerHTML += `<div class="log-entry">${message}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }
}

function drawMap() {
    const canvas = gameState.canvas;
    const ctx = gameState.ctx;
    if (!canvas || !ctx) return;

    // HiDPI/Retina support for sharp rendering
    const dpr = window.devicePixelRatio || 1;
    const cssWidth = canvas.offsetWidth;
    const cssHeight = canvas.offsetHeight;
    canvas.width = cssWidth * dpr;
    canvas.height = cssHeight * dpr;
    canvas.style.width = cssWidth + 'px';
    canvas.style.height = cssHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const width = cssWidth;
    const height = cssHeight;

    // Scale factor (maps world coords to CSS pixels)
    const scale = Math.min(width / 50, height / 65);
    const offsetX = (width - 50 * scale) / 2;
    const offsetY = (height - 65 * scale) / 2;

    function worldToScreen(x, y) {
        return [x * scale + offsetX, y * scale + offsetY];
    }

    // Compute a UI scale factor for element sizes (not coordinates)
    // scale maps world-units to pixels; uiScale is a gentler factor for dots/text
    const uiScale = Math.max(0.5, Math.min(1.5, scale / 15));

    // Draw ocean/water background with globe-like texture
    // 1. Radial gradient for globe curvature effect
    const centerX = width / 2;
    const centerY = height / 2;
    const maxR = Math.max(width, height) * 0.75;
    const oceanGrad = ctx.createRadialGradient(centerX * 0.9, centerY * 0.8, 0, centerX, centerY, maxR);
    oceanGrad.addColorStop(0, "#3a7fc1");   // bright center (globe highlight)
    oceanGrad.addColorStop(0.35, "#2c6faa");
    oceanGrad.addColorStop(0.65, "#1f5a8f");
    oceanGrad.addColorStop(1.0, "#0e3560");  // dark edges (atmosphere fade)
    ctx.fillStyle = oceanGrad;
    ctx.fillRect(0, 0, width, height);

    // 2. Subtle wave patterns
    ctx.save();
    ctx.globalAlpha = 0.07;
    ctx.strokeStyle = "#a0d4ff";
    ctx.lineWidth = Math.max(0.8, 1.2 * (scale / 15));
    // Use a seeded pattern so waves are stable across redraws
    for (let wy = -20; wy < height + 20; wy += Math.max(12, 18 * (scale / 15))) {
        ctx.beginPath();
        const waveOffset = (wy * 0.37) % 40;
        for (let wx = -20; wx < width + 20; wx += 3) {
            const yOff = Math.sin((wx + waveOffset) * 0.015) * 6 * (scale / 15)
                       + Math.sin((wx + waveOffset) * 0.035) * 3 * (scale / 15);
            if (wx === -20) ctx.moveTo(wx, wy + yOff);
            else ctx.lineTo(wx, wy + yOff);
        }
        ctx.stroke();
    }
    ctx.restore();

    // 3. Cloud/atmosphere wisps
    ctx.save();
    const cloudPositions = [
        { x: 0.08, y: 0.12, rx: 0.12, ry: 0.025, alpha: 0.06 },
        { x: 0.85, y: 0.08, rx: 0.10, ry: 0.02, alpha: 0.05 },
        { x: 0.15, y: 0.88, rx: 0.14, ry: 0.022, alpha: 0.07 },
        { x: 0.78, y: 0.92, rx: 0.11, ry: 0.02, alpha: 0.05 },
        { x: 0.50, y: 0.05, rx: 0.18, ry: 0.018, alpha: 0.04 },
        { x: 0.92, y: 0.50, rx: 0.06, ry: 0.04, alpha: 0.06 },
        { x: 0.03, y: 0.55, rx: 0.07, ry: 0.03, alpha: 0.05 },
        { x: 0.40, y: 0.95, rx: 0.15, ry: 0.02, alpha: 0.05 },
        { x: 0.65, y: 0.03, rx: 0.09, ry: 0.015, alpha: 0.04 },
        { x: 0.20, y: 0.30, rx: 0.08, ry: 0.015, alpha: 0.03 },
        { x: 0.70, y: 0.65, rx: 0.09, ry: 0.018, alpha: 0.04 },
        { x: 0.55, y: 0.80, rx: 0.07, ry: 0.02, alpha: 0.03 },
    ];
    for (const cloud of cloudPositions) {
        const cx = cloud.x * width;
        const cy = cloud.y * height;
        const rx = cloud.rx * width;
        const ry = cloud.ry * height;
        const cloudGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(rx, ry));
        cloudGrad.addColorStop(0, `rgba(255, 255, 255, ${cloud.alpha})`);
        cloudGrad.addColorStop(0.6, `rgba(220, 240, 255, ${cloud.alpha * 0.5})`);
        cloudGrad.addColorStop(1, "rgba(200, 230, 255, 0)");
        ctx.fillStyle = cloudGrad;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    // 4. Vignette edge darkening for globe atmosphere
    ctx.save();
    const vignetteGrad = ctx.createRadialGradient(centerX, centerY, maxR * 0.5, centerX, centerY, maxR * 1.1);
    vignetteGrad.addColorStop(0, "rgba(0, 0, 0, 0)");
    vignetteGrad.addColorStop(0.7, "rgba(0, 10, 30, 0.08)");
    vignetteGrad.addColorStop(1, "rgba(0, 5, 20, 0.25)");
    ctx.fillStyle = vignetteGrad;
    ctx.fillRect(0, 0, width, height);
    ctx.restore();

    // 5. Ocean body labels
    ctx.save();
    const oceanLabels = [
        { name: "Atlantic\nOcean", x: 6, y: 38, size: 1.3, angle: -0.15 },
        { name: "North\nSea", x: 32, y: 18, size: 0.9, angle: 0 },
        { name: "Norwegian Sea", x: 22, y: 6, size: 0.8, angle: 0 },
        { name: "Bay of\nBiscay", x: 19, y: 48, size: 0.8, angle: 0 },
        { name: "Mediterranean Sea", x: 34, y: 58, size: 0.9, angle: 0.05 },
        { name: "Baltic\nSea", x: 52, y: 17, size: 0.8, angle: 0.2 },
        { name: "English Channel", x: 27, y: 32, size: 0.6, angle: -0.1 },
    ];
    for (const ol of oceanLabels) {
        const [sx, sy] = worldToScreen(ol.x, ol.y);
        const fontSize = Math.max(7, 10 * uiScale * ol.size);
        ctx.font = `italic ${fontSize}px Georgia, serif`;
        ctx.fillStyle = "rgba(140, 190, 230, 0.35)";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(ol.angle || 0);
        const lines = ol.name.split("\n");
        const lineH = fontSize * 1.2;
        const startY = -(lines.length - 1) * lineH / 2;
        for (let li = 0; li < lines.length; li++) {
            ctx.fillText(lines[li], 0, startY + li * lineH);
        }
        ctx.restore();
    }
    ctx.restore();

    // Draw landmasses with coastline outlines
    for (let landmass of Object.values(LANDMASSES)) {
        ctx.beginPath();
        for (let i = 0; i < landmass.length; i++) {
            const [sx, sy] = worldToScreen(landmass[i][0], landmass[i][1]);
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
        }
        ctx.closePath();
        ctx.fillStyle = "#9cc09c";
        ctx.fill();
        ctx.strokeStyle = "#5a8a5a";
        ctx.lineWidth = 1.2;
        ctx.stroke();
    }

    // Draw terrain regions as soft radial gradients, clipped to land
    ctx.save();
    // Build a clipping path from all landmasses so terrain doesn't bleed into ocean
    ctx.beginPath();
    for (let landmass of Object.values(LANDMASSES)) {
        for (let i = 0; i < landmass.length; i++) {
            const [sx, sy] = worldToScreen(landmass[i][0], landmass[i][1]);
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
        }
        ctx.closePath();
    }
    ctx.clip();

    // Helper: draw a soft radial gradient for a terrain polygon
    function drawTerrainGlow(polygon, r, g, b, maxAlpha) {
        // Find centroid and max radius in screen space
        let cx = 0, cy = 0;
        const n = polygon.length - 1; // last point may repeat first
        const pts = [];
        for (let i = 0; i < polygon.length; i++) {
            const [sx, sy] = worldToScreen(polygon[i][0], polygon[i][1]);
            pts.push([sx, sy]);
            if (i < n) { cx += sx; cy += sy; }
        }
        cx /= n;
        cy /= n;
        // Find max distance from centroid to any vertex
        let maxR = 0;
        for (let i = 0; i < n; i++) {
            const d = Math.hypot(pts[i][0] - cx, pts[i][1] - cy);
            if (d > maxR) maxR = d;
        }
        // Extend radius a bit for soft falloff
        const outerR = maxR * 1.15;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, outerR);
        grad.addColorStop(0, `rgba(${r},${g},${b},${maxAlpha})`);
        grad.addColorStop(0.5, `rgba(${r},${g},${b},${maxAlpha * 0.6})`);
        grad.addColorStop(0.85, `rgba(${r},${g},${b},${maxAlpha * 0.2})`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grad;
        // Fill a large rect covering the gradient area (clipped to land already)
        ctx.fillRect(cx - outerR, cy - outerR, outerR * 2, outerR * 2);
    }

    for (let polygon of TERRAIN_REGIONS.alpine) {
        drawTerrainGlow(polygon, 230, 230, 245, 0.35);
    }
    for (let polygon of TERRAIN_REGIONS.mountain) {
        drawTerrainGlow(polygon, 110, 85, 45, 0.30);
    }
    ctx.restore();

    // Draw rivers
    ctx.strokeStyle = "#4488cc";
    ctx.lineWidth = Math.max(1, 1.5 * uiScale);
    for (let river of Object.values(RIVERS)) {
        ctx.beginPath();
        for (let i = 0; i < river.length; i++) {
            const [sx, sy] = worldToScreen(river[i][0], river[i][1]);
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
        }
        ctx.stroke();
    }

    // Draw river labels
    const riverLabels = {
        rhine: { x: 41, y: 31, name: "Rhine" },
        danube: { x: 56, y: 39, name: "Danube" },
        loire: { x: 30, y: 39, name: "Loire" },
        elbe: { x: 47, y: 25, name: "Elbe" },
        vistula: { x: 58, y: 24, name: "Vistula" },
        po: { x: 45, y: 42.5, name: "Po" },
        rhone: { x: 37, y: 47, name: "Rhône" },
        seine: { x: 33, y: 36, name: "Seine" },
        garonne: { x: 30, y: 49, name: "Garonne" },
        douro: { x: 19, y: 53.5, name: "Douro" }
    };
    ctx.font = `italic ${Math.max(7, 8 * uiScale)}px Arial`;
    ctx.fillStyle = "rgba(50, 100, 180, 0.8)";
    ctx.textAlign = "center";
    for (let key in riverLabels) {
        const rl = riverLabels[key];
        const [sx, sy] = worldToScreen(rl.x, rl.y);
        ctx.fillText(rl.name, sx, sy);
    }

    // Draw ferry routes with labels
    ctx.strokeStyle = "#88bbee";
    ctx.lineWidth = Math.max(1.5, 2 * uiScale);
    ctx.setLineDash([5, 3]);
    for (let ferry of FERRY_ROUTES) {
        const [sx1, sy1] = worldToScreen(ferry.from[0], ferry.from[1]);
        const [sx2, sy2] = worldToScreen(ferry.to[0], ferry.to[1]);
        ctx.beginPath();
        ctx.moveTo(sx1, sy1);
        ctx.lineTo(sx2, sy2);
        ctx.stroke();

        // Ferry label at midpoint
        const midX = (sx1 + sx2) / 2;
        const midY = (sy1 + sy2) / 2;

        ctx.fillStyle = "rgba(200, 230, 255, 0.9)";
        ctx.textAlign = "center";
        ctx.fillText(`⛴ ${ferry.cost}M`, midX, midY - 3);
    }
    ctx.setLineDash([]);

    // Draw country borders
    const COUNTRY_BORDERS = [
        // France-Spain (Pyrenees)
        [[28,48.5], [30,50], [32,52], [34,54]],
        // France-Germany (Rhine area)
        [[41,27], [41,30], [41,33], [40,36]],
        // France-Belgium
        [[36,31], [38,32]],

        [[39,38], [41,39]],
        // France-Italy
        [[39,44], [40,44]],
        // Germany-Poland
        [[52,20], [52,24], [52,28], [53,30]],
        // Germany-Czech
        [[49,28], [50,30], [51,31]],
        // Germany-Austria
        [[46,36], [48,37], [50,36]],
        // Germany-Switzerland
        [[42,37], [44,37]],
        // Italy-Switzerland
        [[42,42], [44,42]],
        // Italy-Austria
        [[46,42], [48,40]],
        // Austria-Hungary
        [[53,36], [55,37]],
        // Austria-Czech
        [[51,33], [53,34]],
        // Poland-Czech
        [[52,30], [54,30]],
        // Spain-Portugal
        [[18,50], [18,54], [18,58], [18,62], [18,66]],
        // Croatia-Hungary
        [[55,40], [56,42]],
        // Croatia-Bosnia
        [[54,44], [55,46]],
        // Serbia borders
        [[58,42], [59,44], [58,47]],
        // UK-Scotland/England (symbolic)
        [[26,19], [32,19]],
        // Belgium-Netherlands
        [[37,28], [39,28]],
        // Denmark-Germany (symbolic)
        [[43,22], [47,22]]
    ];
    ctx.strokeStyle = "rgba(180, 180, 180, 0.7)";
    ctx.lineWidth = Math.max(1, 1.5 * uiScale);
    ctx.setLineDash([4, 3]);
    for (let border of COUNTRY_BORDERS) {
        ctx.beginPath();
        for (let i = 0; i < border.length; i++) {
            const [sx, sy] = worldToScreen(border[i][0], border[i][1]);
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
        }
        ctx.stroke();
    }
    ctx.setLineDash([]);

    // Draw mileposts with terrain-specific icons
    const mpSize = Math.max(1.5, 2 * uiScale);
    for (let mp of gameState.mileposts) {
        const [sx, sy] = worldToScreen(mp.x, mp.y);

        if (!mp.city) {
            if (mp.terrain === "alpine") {
                // White/hollow triangle for alpine
                ctx.strokeStyle = "rgba(80, 80, 110, 0.8)";
                ctx.fillStyle = "rgba(210, 210, 235, 0.85)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(sx, sy - mpSize * 1.2);
                ctx.lineTo(sx - mpSize, sy + mpSize * 0.7);
                ctx.lineTo(sx + mpSize, sy + mpSize * 0.7);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            } else if (mp.terrain === "mountain") {
                // Dark/filled triangle for mountain
                ctx.fillStyle = "rgba(70, 50, 30, 0.8)";
                ctx.beginPath();
                ctx.moveTo(sx, sy - mpSize * 1.2);
                ctx.lineTo(sx - mpSize, sy + mpSize * 0.7);
                ctx.lineTo(sx + mpSize, sy + mpSize * 0.7);
                ctx.closePath();
                ctx.fill();
            } else {
                // Circle/dot for clear terrain
                ctx.fillStyle = "rgba(60, 60, 60, 0.45)";
                ctx.beginPath();
                ctx.arc(sx, sy, mpSize * 0.7, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // Draw tracks
    ctx.lineWidth = Math.max(2, 3 * uiScale);
    const tracksByColor = {};
    for (let track of gameState.tracks) {
        if (!tracksByColor[track.color]) tracksByColor[track.color] = [];
        tracksByColor[track.color].push(track);
    }

    for (let color in tracksByColor) {
        ctx.strokeStyle = COLOR_MAP[color] || "#ffffff";
        for (let track of tracksByColor[color]) {
            const from = gameState.mileposts_by_id[track.from];
            const to = gameState.mileposts_by_id[track.to];
            const [sx1, sy1] = worldToScreen(from.x, from.y);
            const [sx2, sy2] = worldToScreen(to.x, to.y);
            ctx.beginPath();
            ctx.moveTo(sx1, sy1);
            ctx.lineTo(sx2, sy2);
            ctx.stroke();
        }
    }

    // Draw path preview
    if (gameState.pathPreview) {
        ctx.strokeStyle = "rgba(255, 255, 0, 0.7)";
        ctx.lineWidth = Math.max(2, 2.5 * uiScale);
        ctx.setLineDash([5, 5]);
        for (let i = 0; i < gameState.pathPreview.length - 1; i++) {
            const from = gameState.mileposts_by_id[gameState.pathPreview[i]];
            const to = gameState.mileposts_by_id[gameState.pathPreview[i + 1]];
            const [sx1, sy1] = worldToScreen(from.x, from.y);
            const [sx2, sy2] = worldToScreen(to.x, to.y);
            ctx.beginPath();
            ctx.moveTo(sx1, sy1);
            ctx.lineTo(sx2, sy2);
            ctx.stroke();
        }
        ctx.setLineDash([]);
    }

    // Draw city dots (on top of tracks)
    for (let mp of gameState.mileposts) {
        if (!mp.city) continue;
        const [sx, sy] = worldToScreen(mp.x, mp.y);

        if (MAJOR_CITIES.includes(mp.city.name)) {
            // Major city - large red dot with white border
            ctx.fillStyle = "#dd2222";
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = Math.max(1, 1.5 * uiScale);
            ctx.beginPath();
            ctx.arc(sx, sy, Math.max(4, 6 * uiScale), 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        } else if (mp.city.type === "medium") {
            // Medium city - blue dot
            ctx.fillStyle = "#3355cc";
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = Math.max(0.5, 1 * uiScale);
            ctx.beginPath();
            ctx.arc(sx, sy, Math.max(3, 4 * uiScale), 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        } else {
            // Small city - green dot
            ctx.fillStyle = "#339933";
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = Math.max(0.5, 0.8 * uiScale);
            ctx.beginPath();
            ctx.arc(sx, sy, Math.max(2, 3 * uiScale), 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        }
    }

    // Draw city labels
    const majorFontSize = Math.max(9, Math.round(10 * uiScale));
    const otherFontSize = Math.max(7, Math.round(8 * uiScale));

    ctx.textAlign = "center";
    ctx.textBaseline = "top";

    for (let cityName in gameState.cityToMilepost) {
        const mpId = gameState.cityToMilepost[cityName];
        const mp = gameState.mileposts_by_id[mpId];
        const [sx, sy] = worldToScreen(mp.x, mp.y);
        const isMajor = MAJOR_CITIES.includes(cityName);
        const fontSize = isMajor ? majorFontSize : otherFontSize;
        const dotRadius = isMajor ? Math.max(4, 6 * uiScale) : Math.max(2, 4 * uiScale);

        ctx.font = `${isMajor ? 'bold ' : ''}${fontSize}px Arial, sans-serif`;

        // Draw text shadow/outline for readability
        ctx.fillStyle = "#000000";
        ctx.fillText(cityName, sx + 1, sy + dotRadius + 2);
        ctx.fillText(cityName, sx - 1, sy + dotRadius + 2);
        ctx.fillText(cityName, sx, sy + dotRadius + 3);
        ctx.fillText(cityName, sx, sy + dotRadius + 1);

        // Draw city name
        ctx.fillStyle = "#ffffff";
        ctx.fillText(cityName, sx, sy + dotRadius + 2);

        // Draw goods icons below city name
        const cityData = CITIES[cityName];
        if (cityData && cityData.goods && cityData.goods.length > 0) {
            const iconFontSize = Math.max(11, 14 * uiScale);
            ctx.font = `${iconFontSize}px Arial, sans-serif`;
            const icons = cityData.goods.map(g => GOODS_ICONS[g] || "?").join(" ");
            ctx.fillText(icons, sx, sy + dotRadius + 2 + fontSize + 4);
        }
    }

    // Draw highlighted cities (from demand card hover)
    if (gameState.highlightedCities.length > 0) {
        for (let cityName of gameState.highlightedCities) {
            const mpId = gameState.cityToMilepost[cityName];
            if (mpId !== undefined) {
                const mp = gameState.mileposts_by_id[mpId];
                const [sx, sy] = worldToScreen(mp.x, mp.y);
                // Pulsing golden ring
                ctx.strokeStyle = "#ffdd44";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(sx, sy, Math.max(10, 16 * uiScale), 0, Math.PI * 2);
                ctx.stroke();
                // Outer glow
                ctx.strokeStyle = "rgba(255, 221, 68, 0.4)";
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.arc(sx, sy, Math.max(14, 20 * uiScale), 0, Math.PI * 2);
                ctx.stroke();
                // Label above
                ctx.fillStyle = "#ffdd44";
                ctx.font = `bold ${Math.max(10, 12 * uiScale)}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "bottom";
                ctx.fillText(cityName, sx, sy - Math.max(14, 20 * uiScale) - 2);
            }
        }
    }

    // Draw trains (player pawns)
    for (let player of gameState.players) {
        if (player.trainLocation !== null) {
            const mp = gameState.mileposts_by_id[player.trainLocation];
            if (mp) {
                const [sx, sy] = worldToScreen(mp.x, mp.y);
                const trainRadius = Math.max(5, 7 * uiScale);

                ctx.fillStyle = COLOR_MAP[player.color] || "#ffffff";
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = Math.max(1, 1.5 * uiScale);
                ctx.beginPath();
                ctx.arc(sx, sy, trainRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // Draw player initial inside
                ctx.fillStyle = "#ffffff";
                ctx.font = `bold ${Math.max(8, 9 * uiScale)}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(player.name[0], sx, sy);
            }
        }
    }

    // Highlight selected milepost
    if (gameState.selectedMilepost) {
        const [sx, sy] = worldToScreen(gameState.selectedMilepost.x, gameState.selectedMilepost.y);
        ctx.strokeStyle = "#ffff00";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(6, 10 * uiScale), 0, Math.PI * 2);
        ctx.stroke();
    }

    // Highlight hovered milepost with validity-based outline
    if (gameState.hoveredMilepost) {
        const [sx, sy] = worldToScreen(gameState.hoveredMilepost.x, gameState.hoveredMilepost.y);
        const isValid = gameState.hoverValid !== false; // null or true = valid
        const hoverColor = isValid ? "rgba(255, 255, 255, 0.85)" : "rgba(255, 80, 80, 0.85)";
        const glowColor = isValid ? "rgba(255, 255, 255, 0.3)" : "rgba(255, 80, 80, 0.3)";

        ctx.strokeStyle = hoverColor;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(7, 11 * uiScale), 0, Math.PI * 2);
        ctx.stroke();
        // Also add a soft glow
        ctx.strokeStyle = glowColor;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(sx, sy, Math.max(9, 14 * uiScale), 0, Math.PI * 2);
        ctx.stroke();
    }

    // ---- LEGENDS RENDERED ON CANVAS (in ocean areas) ----
    ctx.save();
    ctx.textAlign = "left";
    ctx.textBaseline = "alphabetic";

    const legendFontSize = Math.max(8, 9 * uiScale);
    const legendTitleFontSize = Math.max(10, 12 * uiScale);
    const legendEmojiFontSize = Math.max(11, 13 * uiScale);
    const legendLineH = legendFontSize * 1.6;
    const legendPad = Math.max(6, 8 * uiScale);
    const legendX = legendPad;

    // Compute shared width for both legends
    const goodsKeys = Object.keys(GOODS_ICONS).sort();
    const glColItems = Math.ceil(goodsKeys.length / 2);
    const glColW = Math.max(95, 115 * uiScale);
    const legendBoxW = glColW * 2 + legendPad * 2;

    // ---- Map Legend (top) ----
    let curY = legendPad;
    const mlItems = [
        { symbol: "●", color: "#aaa", text: "Clear (1M)" },
        { symbol: "▲", color: "#8a7040", text: "Mountain (2M)" },
        { symbol: "△", color: "#888", text: "Alpine (5M)" },
        { symbol: "⬤", color: "#dd2222", text: "Major city (5M)" },
        { symbol: "⬤", color: "#3355cc", text: "Medium city (3M)" },
        { symbol: "⬤", color: "#339933", text: "Small city (3M)" },
        { symbol: "〰", color: "#4488cc", text: "River (+2M)" },
        { symbol: "---", color: "#88bbee", text: "Ferry route" },
    ];
    const mlBoxH = legendPad + legendTitleFontSize + legendLineH * 0.5 + legendLineH * mlItems.length + legendPad;
    ctx.fillStyle = "rgba(10, 25, 50, 0.75)";
    ctx.fillRect(legendX, curY, legendBoxW, mlBoxH);
    ctx.strokeStyle = "rgba(100, 150, 200, 0.3)";
    ctx.lineWidth = 1;
    ctx.strokeRect(legendX, curY, legendBoxW, mlBoxH);

    let textY = curY + legendPad + legendTitleFontSize;
    ctx.font = `bold ${legendTitleFontSize}px Arial`;
    ctx.fillStyle = "rgba(180, 210, 240, 0.8)";
    ctx.fillText("Map Legend", legendX + legendPad, textY);
    textY += legendLineH * 0.3;

    ctx.font = `${legendFontSize}px Arial`;
    for (const item of mlItems) {
        textY += legendLineH;
        ctx.fillStyle = item.color;
        ctx.fillText(item.symbol, legendX + legendPad, textY);
        ctx.fillStyle = "rgba(200, 220, 240, 0.7)";
        ctx.fillText(item.text, legendX + legendPad + legendFontSize * 2.2, textY);
    }

    // ---- Goods Legend (directly below Map Legend) ----
    curY += mlBoxH + Math.max(3, 4 * uiScale);
    const glBoxH = legendPad + legendTitleFontSize + legendLineH * 0.5 + legendLineH * glColItems + legendPad;

    ctx.fillStyle = "rgba(10, 25, 50, 0.75)";
    ctx.fillRect(legendX, curY, legendBoxW, glBoxH);
    ctx.strokeStyle = "rgba(100, 150, 200, 0.3)";
    ctx.lineWidth = 1;
    ctx.strokeRect(legendX, curY, legendBoxW, glBoxH);

    let glTextY = curY + legendPad + legendTitleFontSize;
    ctx.font = `bold ${legendTitleFontSize}px Arial`;
    ctx.fillStyle = "rgba(180, 210, 240, 0.8)";
    ctx.fillText("Goods Legend", legendX + legendPad, glTextY);
    glTextY += legendLineH * 0.3;

    for (let gi = 0; gi < goodsKeys.length; gi++) {
        const col = gi < glColItems ? 0 : 1;
        const row = gi < glColItems ? gi : gi - glColItems;
        const ix = legendX + legendPad + col * glColW;
        const iy = glTextY + (row + 1) * legendLineH;
        ctx.font = `${legendEmojiFontSize}px Arial, sans-serif`;
        ctx.fillStyle = "rgba(200, 220, 240, 0.9)";
        ctx.fillText(GOODS_ICONS[goodsKeys[gi]], ix, iy);
        ctx.font = `${legendFontSize}px Arial`;
        ctx.fillText(goodsKeys[gi], ix + legendEmojiFontSize * 1.4, iy);
    }

    // Store the bottom Y of legends so we can position demand cards
    const legendsBottomY = curY + glBoxH;
    ctx.restore();

    // Position demand cards overlay just below legends
    const overlayEl = document.getElementById("demandCardsOverlay");
    if (overlayEl) {
        overlayEl.style.top = (legendsBottomY + 8) + "px";
        overlayEl.style.left = legendX + "px";
    }
}

function setupPlayerInputs() {

    const container = document.getElementById("playerInputs");
    container.innerHTML = "";

    const colors = ["red", "blue", "green", "yellow", "purple", "orange"];

        div.className = "player-setup";
        div.innerHTML = `
            <div class="player-input-row">
                <input type="text" placeholder="Player ${i + 1} Name" id="player${i}Name" value="Player ${i + 1}">
                <select id="player${i}Color">
                    ${colors.map((c, idx) => `<option value="${c}" ${idx === i ? "selected" : ""}>${c.charAt(0).toUpperCase() + c.slice(1)}</option>`).join("")}
                </select>
            </div>
        `;
        container.appendChild(div);
    }
}

function generateDemandDeck() {
    const deck = [];
    const goodsKeys = Object.keys(GOODS);
    const cities = Object.keys(CITIES);

    // Generate 40 demand cards, each with 3 demands (like real game: 120 demands / 3 per card)
    for (let i = 0; i < 40; i++) {
        const demands = [];
        for (let d = 0; d < 3; d++) {
            const good = goodsKeys[Math.floor(Math.random() * goodsKeys.length)];
            const sources = GOODS[good].sources;
            const from = sources[Math.floor(Math.random() * sources.length)];
            let to;
            do {
                to = cities[Math.floor(Math.random() * cities.length)];
            } while (to === from || sources.includes(to));

            const fromCoords = CITIES[from];
            const toCoords = CITIES[to];
            const distance = Math.hypot(fromCoords.x - toCoords.x, fromCoords.y - toCoords.y);
            const payout = Math.round(distance * 1.5);

            demands.push({ good, from, to, payout });
        }
        deck.push({ demands, fulfilled: [false, false, false] });
    }

    // Shuffle deck
    for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
    }

    return deck;
}

function highlightCities(cityNames) {

function clearHighlight() {

}

function startGame() {
    const count = parseInt(document.getElementById("playerCount").value);
    gameState.players = [];
    gameState.demandCardDeck = generateDemandDeck();

    for (let i = 0; i < count; i++) {
        const name = document.getElementById(`player${i}Name`).value || `Player ${i + 1}`;
        const color = document.getElementById(`player${i}Color`).value;

        // Deal 3 demand cards to each player
        const demandCards = [];
        for (let j = 0; j < 3; j++) {
            if (gameState.demandCardDeck.length > 0) {
                demandCards.push(gameState.demandCardDeck.pop());
            }
        }

        gameState.players.push({
            name,
            color,
            cash: 50,
            trainType: "Freight",
            trainLocation: null,
            demandCards: demandCards,
            loads: [],
            movement: 0
        });
    }

    gameState.gameStarted = true;
    gameState.phase = "initialBuilding";
    gameState.buildingPhaseCount = 0;

    document.getElementById("setupScreen").classList.add("hidden");
    document.getElementById("gameContainer").style.display = "flex";

    // Initialize game
    generateHexGrid();
    gameState.canvas = document.getElementById("gameCanvas");
    gameState.ctx = gameState.canvas.getContext("2d");

    drawMap();
    updateUI();

    addLog("Game started! Initial building phase (2 rounds)");
}

function deployTrain(milepostId) {
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    if (currentPlayer.trainLocation === null) {
        currentPlayer.trainLocation = milepostId;
        const mp = gameState.mileposts_by_id[milepostId];
        const cityName = mp.city ? mp.city.name : "milepost";
        addLog(`${currentPlayer.name} deployed train at ${cityName}`);
    }
}

function getPlayerLocationName(player) {
    if (player.trainLocation === null) return "Not deployed";
    const mp = gameState.mileposts_by_id[player.trainLocation];
    return mp?.city?.name || "En route";
}

function getPlayerCity(player) {
    if (player.trainLocation === null) return null;
    const mp = gameState.mileposts_by_id[player.trainLocation];
    return mp?.city?.name || null;
}

function pickupGood(good) {
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    const trainMaxCapacity = TRAIN_TYPES[currentPlayer.trainType].capacity;

    if (currentPlayer.loads.length < trainMaxCapacity) {
        currentPlayer.loads.push(good);
        addLog(`${currentPlayer.name} picked up ${good}`);
        updateUI();
        drawMap();
    } else {
        addLog("Train is at full capacity!");
    }
}

function deliverGood(cardIndex, demandIndex) {
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    const card = currentPlayer.demandCards[cardIndex];

    if (!card || !card.demands[demandIndex]) {
        addLog("Invalid demand card!");
        return;
    }

    const demand = card.demands[demandIndex];
    const matchingLoadIndex = currentPlayer.loads.findIndex(good => good === demand.good);
    if (matchingLoadIndex === -1) {
        addLog(`No ${demand.good} to deliver!`);
        return;
    }

    const mp = gameState.mileposts_by_id[currentPlayer.trainLocation];
    const currentCity = mp?.city?.name;
    if (currentCity !== demand.to) {
        addLog(`Must deliver to ${demand.to}!`);
        return;
    }

    // Deliver good — fulfilling one demand replaces the entire card
    currentPlayer.loads.splice(matchingLoadIndex, 1);
    currentPlayer.cash += demand.payout;
    addLog(`${currentPlayer.name} delivered ${demand.good} to ${demand.to} for ECU ${demand.payout}M`);

    // Replace fulfilled card with a new one from deck
    if (gameState.demandCardDeck.length > 0) {
        currentPlayer.demandCards[cardIndex] = gameState.demandCardDeck.pop();
    } else {
        currentPlayer.demandCards.splice(cardIndex, 1);
    }

    updateUI();
    drawMap();
}

function dropGood(loadIndex) {
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    if (loadIndex >= 0 && loadIndex < currentPlayer.loads.length) {
        const good = currentPlayer.loads.splice(loadIndex, 1)[0];
        addLog(`${currentPlayer.name} dropped ${good}`);
        updateUI();
        drawMap();
    }
}

function upgradeTo(trainType) {
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    const upgradeCost = 20;

    if (currentPlayer.cash < upgradeCost) {
        addLog("Not enough cash to upgrade train!");
        return;
    }

    currentPlayer.cash -= upgradeCost;
    currentPlayer.trainType = trainType;
    addLog(`${currentPlayer.name} upgraded train to ${trainType} (ECU 20M)`);
    updateUI();
    drawMap();
}

function getUpgradeOptions(player) {
    if (player.trainType === "Freight") {
        return [
            { type: "Fast Freight", desc: "12mp speed, 2 loads" },
            { type: "Heavy Freight", desc: "9mp speed, 3 loads" }
        ];
    } else if (player.trainType === "Fast Freight" || player.trainType === "Heavy Freight") {
        return [
            { type: "Superfreight", desc: "12mp speed, 3 loads" }
        ];
    }
    return []; // Already max
}

function discardHand() {
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    const newCards = [];
    for (let i = 0; i < 3; i++) {
        if (gameState.demandCardDeck.length > 0) {
            newCards.push(gameState.demandCardDeck.pop());
        }
    }
    currentPlayer.demandCards = newCards;
    addLog(`${currentPlayer.name} discarded hand and drew 3 new cards`);
    endTurn();
}

function showTurnOverlay(playerName, playerColor, phaseLabel) {
    document.getElementById("turnOverlayPlayer").textContent = playerName;
    document.getElementById("turnOverlayPlayer").style.color = COLOR_MAP[playerColor] || playerColor;
    document.getElementById("turnOverlayPhase").textContent = phaseLabel;
    document.getElementById("turnOverlay").classList.add("show");
}

function dismissTurnOverlay() {
    document.getElementById("turnOverlay").classList.remove("show");
}

function undoLastBuild() {
    if (gameState.buildHistory.length === 0) {
        addLog("Nothing to undo!");
        return;
    }
    const last = gameState.buildHistory.pop();
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];

    // Remove the last N track segments
    for (let i = 0; i < last.segments; i++) {
        gameState.tracks.pop();
    }

    // Refund cost
    currentPlayer.cash += last.cost;
    gameState.buildingThisTurn -= last.cost;
    gameState.majorCitiesThisTurn -= last.majorCities;

    addLog(`Undid last build (refunded ECU ${last.cost}M)`);
    updateUI();
    drawMap();
}

function endOperatePhase() {
    gameState.phase = "build";
    gameState.buildingThisTurn = 0;
    gameState.majorCitiesThisTurn = 0;
    gameState.buildHistory = [];
    addLog("Moved to Build Phase");
    updateUI();
    drawMap();
}

function endTurn() {
    // Check win condition first
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];
    if (checkWinCondition(currentPlayer)) {
        endGame(currentPlayer);
        return;
    }

    // Reset building limits for new player
    gameState.buildingThisTurn = 0;
    gameState.majorCitiesThisTurn = 0;
    gameState.buildHistory = [];

    // Move to next player
    gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % gameState.players.length;

    // Determine next phase
    if (gameState.phase === "initialBuilding") {
        // In initial building, stay in initialBuilding phase, just move to next player
        if (gameState.currentPlayerIndex === 0) {
            gameState.buildingPhaseCount++;
            if (gameState.buildingPhaseCount >= gameState.initialBuildingRounds) {
                gameState.phase = "operate";
                // Set movement for first time
                for (let player of gameState.players) {
                    player.movement = TRAIN_TYPES[player.trainType].movement;
                }
            }
        }
        if (gameState.phase === "initialBuilding") {
            addLog(`Initial building round ${gameState.buildingPhaseCount + 1}: ${gameState.players[gameState.currentPlayerIndex].name}`);
        }
    } else if (gameState.phase === "build") {
        // After build phase, go back to operate phase for next player
        gameState.phase = "operate";
        const player = gameState.players[gameState.currentPlayerIndex];
        player.movement = TRAIN_TYPES[player.trainType].movement;
        addLog(`${player.name} starts Operate Phase (${player.movement}mp)`);
    }

    gameState.turn++;

    // Show turn change overlay
    const nextPlayer = gameState.players[gameState.currentPlayerIndex];
    let phaseLabel = "";
    if (gameState.phase === "initialBuilding") phaseLabel = "Initial Building Phase";
    else if (gameState.phase === "operate") phaseLabel = "Operate Phase";
    else phaseLabel = "Build Phase";
    showTurnOverlay(nextPlayer.name, nextPlayer.color, phaseLabel);

    updateUI();
    drawMap();
}

function updateUI() {
    const currentPlayer = gameState.players[gameState.currentPlayerIndex];

    // Update current player info section
    const locationName = getPlayerLocationName(currentPlayer);
