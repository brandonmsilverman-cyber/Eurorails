    const phaseColorMap = {
        "initialBuilding": "#ff8800",
        "operate": "#4a9e4a",
        "build": "#4a7aff"
    };
    const phaseText = gameState.phase === "initialBuilding" ? "Initial Building" :
                       gameState.phase === "operate" ? "Operate" : "Build";
    const phaseColor = phaseColorMap[gameState.phase] || "#fff";

    const currentPlayerHtml = `
        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
            <span>Player:</span><span style="color:${COLOR_MAP[currentPlayer.color]}; font-weight:bold;">${currentPlayer.name}</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
            <span>Phase:</span><span style="color:${phaseColor}; font-weight:bold;">${phaseText}</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
            <span>Cash:</span><span style="color:#4a9eff; font-weight:bold;">ECU ${currentPlayer.cash}M</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
            <span>Location:</span><span style="color:#fff; font-weight:bold;">${locationName}</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
            <span>Train:</span><span>${currentPlayer.trainType}</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
            <span>Speed/Cap:</span><span>${TRAIN_TYPES[currentPlayer.trainType].movement}mp / ${TRAIN_TYPES[currentPlayer.trainType].capacity} loads</span>
        </div>
        ${gameState.phase === "operate" ? `
        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
            <span>Movement:</span><span style="color:#ffff00; font-weight:bold;">${currentPlayer.movement}mp</span>
        </div>
        ` : ""}
        <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
            <span>Major Cities:</span><span style="color:${connectedCount >= 7 ? '#4a9e4a' : '#ff8800'}; font-weight:bold;">${connectedCount}/7</span>
        </div>
    `;
    document.getElementById("currentPlayerInfo").innerHTML = currentPlayerHtml;

    // Update players list
    const playersList = document.getElementById("playersList");
    playersList.innerHTML = gameState.players.map((p, i) => `
        <div class="player-info ${i === gameState.currentPlayerIndex ? "active" : ""}">
            <strong>${p.name}</strong> (${p.color})<br>
            Cash: ECU ${p.cash}M<br>
            Train: ${p.trainType}<br>
            Loads: ${p.loads.length}/${TRAIN_TYPES[p.trainType].capacity}
        </div>
    `).join("");

    // Update demand cards display (rendered as overlay cards on the map)
    const demandOverlay = document.getElementById("demandCardsOverlay");
    const currentCity = getPlayerCity(currentPlayer);
    if (currentPlayer.demandCards.length > 0) {
        const cardsHtml = currentPlayer.demandCards.map((card, cardIdx) => {
            const hasDeliverable = card.demands.some(d =>
                gameState.phase === "operate" && currentCity === d.to && currentPlayer.loads.includes(d.good));

            const demandsHtml = card.demands.map((demand, dIdx) => {
                const allSources = GOODS[demand.good] ? GOODS[demand.good].sources : [demand.from];
                const sourcesHtml = allSources.map(c =>
                    `<span onmouseenter="highlightCities(['${c}'])"
                           onmouseleave="clearHighlight()">${c}</span>`
                ).join(", ");

                const canDeliver = gameState.phase === "operate" &&
                                   currentCity === demand.to &&
                                   currentPlayer.loads.includes(demand.good);
                const deliverBtn = canDeliver
                    ? `<button class="deliver-btn" onclick="deliverGood(${cardIdx}, ${dIdx})">💰 Deliver ECU ${demand.payout}M</button>`
                    : "";

                return `
                <div class="card-demand">
                    <div>
                        <span style="font-size:14px;">${GOODS_ICONS[demand.good] || "?"}</span>
                        <span class="good-name">${demand.good}</span>
                        <span class="payout">${demand.payout}M</span>
                    </div>
                    <div class="source-cities">From: ${sourcesHtml}</div>
                    <div class="dest-city">To: <span
                        onmouseenter="highlightCities(['${demand.to}'])"
                        onmouseleave="clearHighlight()">${demand.to}</span>
                    </div>
                    ${deliverBtn}
                </div>`;
            }).join("");

            const pColor = COLOR_MAP[currentPlayer.color] || "#6a9ad0";
            return `
            <div class="demand-card-overlay${hasDeliverable ? ' deliverable' : ''}">
                <div class="card-header" style="color:${pColor}; border-bottom-color:${pColor}40;">${currentPlayer.name} — Card ${cardIdx + 1}</div>
                ${demandsHtml}
            </div>`;
        }).join("");
        demandOverlay.innerHTML = cardsHtml;
    } else {
        demandOverlay.innerHTML = "";
    }

    // Update Build panel (separate dedicated section)
    const buildSection = document.getElementById("buildSection");
    const buildPanel = document.getElementById("buildPanel");
    const isBuildPhase = gameState.phase === "initialBuilding" || gameState.phase === "build";

    if (isBuildPhase) {
        buildSection.style.display = "block";
        const remainingBudget = 20 - gameState.buildingThisTurn;
        const budgetPct = Math.round((remainingBudget / 20) * 100);
        const budgetColor = remainingBudget > 10 ? "#4a9e4a" : remainingBudget > 5 ? "#ffcc00" : "#ff4444";

        let bHtml = `
            <div style="font-size:11px; margin-bottom:8px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                    <span>Turn Budget:</span>
                    <strong style="color:${budgetColor};">${remainingBudget}M / 20M</strong>
                </div>
                <div style="background:#333; border-radius:3px; height:8px; overflow:hidden;">
                    <div style="background:${budgetColor}; height:100%; width:${budgetPct}%; transition:width 0.3s;"></div>
                </div>
            </div>
            <div style="font-size:11px; margin-bottom:8px; display:flex; justify-content:space-between;">
                <span>Total Cash:</span>
                <strong style="color:#4a9eff;">ECU ${currentPlayer.cash}M</strong>
            </div>
        `;

        // Cost breakdown for all builds this turn
        if (gameState.buildHistory.length > 0) {
            const totals = { clear: 0, mountain: 0, alpine: 0, river: 0, smallCity: 0, majorCity: 0 };
            let totalSegments = 0;
            for (const entry of gameState.buildHistory) {
                if (entry.breakdown) {
                    for (const k in totals) totals[k] += (entry.breakdown[k] || 0);
                }
                totalSegments += entry.segments;
            }
            const items = [];
            if (totals.clear > 0) items.push(`${totals.clear} clear (${totals.clear}M)`);
            if (totals.mountain > 0) items.push(`${totals.mountain} mountain (${totals.mountain * 2}M)`);
            if (totals.alpine > 0) items.push(`${totals.alpine} alpine (${totals.alpine * 5}M)`);
            if (totals.smallCity > 0) items.push(`${totals.smallCity} small city (${totals.smallCity * 3}M)`);
            if (totals.majorCity > 0) items.push(`${totals.majorCity} major city (${totals.majorCity * 5}M)`);
            if (totals.river > 0) items.push(`${totals.river} river crossing (+${totals.river * 2}M)`);

            bHtml += `<div style="font-size:10px; margin-bottom:8px; background:#1a2a1a; border:1px solid #3a5a3a; border-radius:4px; padding:6px;">
                <div style="color:#88bb88; margin-bottom:4px; font-weight:bold;">Turn Summary — ${totalSegments} segment${totalSegments !== 1 ? 's' : ''}</div>
                <div style="color:#aaa; line-height:1.5;">${items.join('<br>')}</div>
            </div>`;

            // Undo section
            const lastBuild = gameState.buildHistory[gameState.buildHistory.length - 1];
            bHtml += `<div style="background:#3d2200; border:2px solid #cc6600; border-radius:4px; padding:8px; margin-bottom:8px;">
                <div style="font-size:10px; color:#ffaa44; margin-bottom:6px;">
                    Last build: <strong>ECU ${lastBuild.cost}M</strong> (${lastBuild.segments} segment${lastBuild.segments !== 1 ? 's' : ''})
                </div>
                <button onclick="undoLastBuild()" style="width:100%; padding:10px; font-size:14px; background:#cc6600; font-weight:bold; border-radius:4px;">↩ Undo Last Track</button>
            </div>`;
        }

        // Train info + upgrade (only in regular build phase, not initial)
        if (gameState.phase === "build") {
            const tt = TRAIN_TYPES[currentPlayer.trainType];
            const upgrades = getUpgradeOptions(currentPlayer);
            const canAffordUpgrade = currentPlayer.cash >= 20;

            bHtml += `<div style="font-size:11px; margin-bottom:8px; background:#333; padding:6px; border-radius:3px; border:1px solid #555;">
                <div style="color:#4a9eff; margin-bottom:4px;"><strong>🚂 ${currentPlayer.trainType}</strong></div>
                <div style="display:flex; justify-content:space-between;">
                    <span>Speed: ${tt.movement}mp</span><span>Capacity: ${tt.capacity} loads</span>
                </div>
            </div>`;

            if (upgrades.length > 0) {
                bHtml += `<div style="font-size:11px; margin-bottom:8px;">
                    <div style="color:#ff8800; margin-bottom:4px;"><strong>Upgrade (ECU 20M):</strong></div>
                    ${upgrades.map(u => `
                        <button onclick="upgradeTo('${u.type}')" style="width:100%; margin-bottom:4px; padding:4px 8px; font-size:11px; ${canAffordUpgrade ? '' : 'opacity:0.5;'}" ${canAffordUpgrade ? '' : 'disabled'}>
                            ⬆ ${u.type} (${u.desc})
                        </button>
                    `).join("")}
                </div>`;
            }
        }

        buildPanel.innerHTML = bHtml;
    } else {
        buildSection.style.display = "none";
    }

    // Update action buttons based on phase
    const actionButtons = document.getElementById("actionButtons");
    if (gameState.phase === "initialBuilding") {
        actionButtons.innerHTML = `
            <div style="font-size: 12px; margin-bottom: 10px;">Click two mileposts to build track</div>
            <button onclick="endTurn()" style="width: 100%; margin-bottom: 5px;">End Building Turn</button>
        `;
    } else if (gameState.phase === "operate") {
        let operateHtml = "";
        const opCity = getPlayerCity(currentPlayer);

        // Carried goods section
        if (currentPlayer.loads.length > 0) {
            operateHtml += `<div style="font-size:11px; margin-bottom:8px; background:#333; padding:6px; border-radius:3px;">
                <div style="color:#4a9eff; margin-bottom:4px;"><strong>Carried Goods:</strong></div>
                ${currentPlayer.loads.map((g, i) => `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;">
                        <span>${GOODS_ICONS[g] || "?"} ${g}</span>
                        <button onclick="dropGood(${i})" style="padding:2px 6px; font-size:10px;">Drop</button>
                    </div>
                `).join("")}
            </div>`;
        }

        // Goods available at current city
        if (opCity && CITIES[opCity] && CITIES[opCity].goods.length > 0) {
            const canPickUp = currentPlayer.loads.length < TRAIN_TYPES[currentPlayer.trainType].capacity;
            operateHtml += `<div style="font-size:11px; margin-bottom:8px; background:#333; padding:6px; border-radius:3px;">
                <div style="color:#4a9e4a; margin-bottom:4px;"><strong>Available at ${opCity}:</strong></div>
                ${CITIES[opCity].goods.map(g => `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;">
                        <span>${GOODS_ICONS[g] || "?"} ${g}</span>
                        <button onclick="pickupGood('${g}')" style="padding:2px 6px; font-size:10px;" ${canPickUp ? "" : "disabled"}>Pick Up</button>
                    </div>
                `).join("")}
            </div>`;
        }

        // Delivery opportunities
        if (opCity) {
            const deliverable = [];
            currentPlayer.demandCards.forEach((card, cardIdx) => {
                card.demands.forEach((demand, dIdx) => {
                    if (demand.to === opCity && currentPlayer.loads.includes(demand.good)) {
                        deliverable.push({ demand, cardIdx, dIdx });
                    }
                });
            });

            if (deliverable.length > 0) {
                operateHtml += `<div style="font-size:11px; margin-bottom:8px; background:#1a4a1a; padding:6px; border-radius:3px; border:1px solid #4a9e4a;">
                    <div style="color:#4a9e4a; margin-bottom:4px;"><strong>Deliveries Available!</strong></div>
                    ${deliverable.map(d => `
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;">
                            <span>${GOODS_ICONS[d.demand.good] || "?"} ${d.demand.good} → ECU ${d.demand.payout}M</span>
                            <button onclick="deliverGood(${d.cardIdx}, ${d.dIdx})" style="padding:2px 8px; font-size:10px; background:#4a9e4a;">Deliver</button>
                        </div>
                    `).join("")}
                </div>`;
            }
        }

        operateHtml += `
            <button onclick="endOperatePhase()" style="width: 100%; margin-bottom: 5px;">End Operate → Build Phase</button>
            <button onclick="discardHand()" style="width: 100%; margin-bottom: 5px;">Discard Hand & End Turn</button>
        `;
        actionButtons.innerHTML = operateHtml;
    } else { // build phase
        actionButtons.innerHTML = `
            <button onclick="endTurn()" style="width: 100%; margin-bottom: 5px;">End Turn</button>
        `;
    }
}


function endGame(player) {
    document.getElementById("winnerText").innerHTML = `
        <strong>${player.name}</strong> wins!<br>
        Connected cities: ${getConnectedMajorCities(player.color).length}/8<br>
        Cash: ECU ${player.cash}M
    `;
    document.getElementById("endGameModal").classList.add("show");
}

// ============================================================================
// CANVAS INTERACTION
// ============================================================================

document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("playerCount").addEventListener("input", setupPlayerInputs);
    setupPlayerInputs();

    document.getElementById("gameCanvas")?.addEventListener("click", function(e) {
        if (!gameState.gameStarted) return;

        const canvas = gameState.canvas;
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        // Use CSS dimensions (not canvas.width which includes dpr scaling)
        const cssWidth = rect.width;
        const cssHeight = rect.height;
        const scale = Math.min(cssWidth / 50, cssHeight / 65);
        const offsetX = (cssWidth - 50 * scale) / 2;
        const offsetY = (cssHeight - 65 * scale) / 2;

        const worldX = (mouseX - offsetX) / scale;
        const worldY = (mouseY - offsetY) / scale;

        // Find nearest milepost
        let nearest = null;
        let nearestDist = Infinity;
        for (let mp of gameState.mileposts) {
            const dist = Math.hypot(mp.x - worldX, mp.y - worldY);
            if (dist < nearestDist) {
                nearestDist = dist;
                nearest = mp;
            }
        }

        if (!nearest || nearestDist >= 1) return;

        const currentPlayer = gameState.players[gameState.currentPlayerIndex];

        // OPERATE PHASE: Click on mileposts to move train
        if (gameState.phase === "operate") {
            // Deploy train if not deployed yet
            if (currentPlayer.trainLocation === null) {
                // Must click a city milepost where player has track
                if (!nearest.city) {
                    addLog("Deploy your train at a city on your track!");
                    return;
                }
                const owned = getPlayerOwnedMileposts(currentPlayer.color);
                if (!owned.has(nearest.id)) {
                    addLog("You need track at this city to deploy your train here!");
                    return;
                }
                deployTrain(nearest.id);
                updateUI();
                drawMap();
                return;
            }

            // Move train to clicked milepost (milepost-to-milepost)
            if (nearest.id === currentPlayer.trainLocation) {
                addLog("Already here!");
                return;
            }

            const pathOnTrack = findPathOnTrack(currentPlayer.trainLocation, nearest.id, currentPlayer.color);
            if (!pathOnTrack) {
                addLog("No track connection!");
                return;
            }

            const movementCost = pathOnTrack.length - 1; // each segment = 1 mp
            if (movementCost > currentPlayer.movement) {
                addLog(`Not enough movement! (need ${movementCost}, have ${currentPlayer.movement})`);
                return;
            }

            currentPlayer.trainLocation = nearest.id;
            currentPlayer.movement -= movementCost;
            const locationName = nearest.city ? nearest.city.name : "milepost";
            addLog(`Moved to ${locationName} (${movementCost}mp used, ${currentPlayer.movement}mp left)`);
            updateUI();
            drawMap();
        }

        // BUILD PHASE (initialBuilding or build): Click on mileposts to build
        if (gameState.phase === "initialBuilding" || gameState.phase === "build") {
            if (!gameState.selectedMilepost) {
                if (canBuildFromMilepost(nearest, currentPlayer.color)) {
                    gameState.selectedMilepost = nearest;
                    addLog(`Selected ${nearest.city?.name || "milepost"}`);
                } else {
                    addLog("Cannot build from here!");
                }
            } else {
                // Try to build
                const start = gameState.selectedMilepost;
                const end = nearest;

                const pathResult = findPath(start.id, end.id, currentPlayer.color);
                if (pathResult) {
                    // Check 20M per turn limit (applies in ALL phases including initial building)
                    const remainingBudget = 20 - gameState.buildingThisTurn;
                    if (pathResult.cost > remainingBudget) {
                        addLog(`Exceeds build limit! Cost: ${pathResult.cost}M, remaining budget: ${remainingBudget}M of 20M`);
                    } else if (pathResult.cost > currentPlayer.cash) {
                        addLog(`Not enough cash! Cost: ${pathResult.cost}M, you have: ${currentPlayer.cash}M`);
                    } else {
                        // Check major city limit (2 per turn max)
                        let majorCityCount = 0;
                        for (let mpId of pathResult.path) {
                            const mp = gameState.mileposts_by_id[mpId];
                            if (mp.city && MAJOR_CITIES.includes(mp.city.name)) {
                                majorCityCount++;
                            }
                        }

                        if (gameState.majorCitiesThisTurn + majorCityCount > 2) {
                            addLog("Cannot build more than 2 sections from major cities this turn!");
                        } else {
                            // Build track — skip own existing segments, block other players' segments
                            const ownedEdges = new Set();
                            const otherEdges = new Set();
                            for (let t of gameState.tracks) {
                                const fwd = t.from + "|" + t.to;
                                const rev = t.to + "|" + t.from;
                                if (t.color === currentPlayer.color) {
                                    ownedEdges.add(fwd);
                                    ownedEdges.add(rev);
                                } else {
                                    otherEdges.add(fwd);
                                    otherEdges.add(rev);
                                }
                            }

                            let newSegments = 0;
                            // Track cost breakdown for this build
                            const breakdown = { clear: 0, mountain: 0, alpine: 0, river: 0, smallCity: 0, majorCity: 0 };
                            for (let i = 0; i < pathResult.path.length - 1; i++) {
                                const edgeKey = pathResult.path[i] + "|" + pathResult.path[i + 1];
                                if (otherEdges.has(edgeKey)) continue; // never build on other players' track
                                if (!ownedEdges.has(edgeKey)) {
                                    gameState.tracks.push({
                                        from: pathResult.path[i],
                                        to: pathResult.path[i + 1],
                                        color: currentPlayer.color
                                    });
                                    newSegments++;
                                    // Categorize this segment
                                    const destMp = gameState.mileposts_by_id[pathResult.path[i + 1]];
                                    const srcMp = gameState.mileposts_by_id[pathResult.path[i]];
                                    if (destMp.city) {
                                        if (MAJOR_CITIES.includes(destMp.city.name)) breakdown.majorCity++;
                                        else breakdown.smallCity++;
                                    } else if (destMp.terrain === "alpine") {
                                        breakdown.alpine++;
                                    } else if (destMp.terrain === "mountain") {
                                        breakdown.mountain++;
                                    } else {
                                        breakdown.clear++;
                                    }
                                    if (edgeCrossesRiver(srcMp.x, srcMp.y, destMp.x, destMp.y)) {
                                        breakdown.river++;
                                    }
                                }
                            }

                            currentPlayer.cash -= pathResult.cost;
                            gameState.buildingThisTurn += pathResult.cost;
                            gameState.majorCitiesThisTurn += majorCityCount;

                            gameState.buildHistory.push({
                                segments: newSegments,
                                cost: pathResult.cost,
                                majorCities: majorCityCount,
                                breakdown
                            });

                            addLog(`${currentPlayer.name} built track for ECU ${pathResult.cost}M (${20 - gameState.buildingThisTurn}M remaining this turn)`);
                        }
                    }
                } else {
                    addLog("No path found!");
                }

                gameState.selectedMilepost = null;
                gameState.pathPreview = null;
                updateUI();
                drawMap();
            }
        }
    });

    // Mousemove for hover highlight on interactive mileposts
    document.getElementById("gameCanvas")?.addEventListener("mousemove", function(e) {
        if (!gameState.gameStarted) return;

        const canvas = gameState.canvas;
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const cssWidth = rect.width;
        const cssHeight = rect.height;
        const scale = Math.min(cssWidth / 50, cssHeight / 65);
        const offsetX = (cssWidth - 50 * scale) / 2;
        const offsetY = (cssHeight - 65 * scale) / 2;

        const worldX = (mouseX - offsetX) / scale;
        const worldY = (mouseY - offsetY) / scale;

        // Find nearest milepost
        let nearest = null;
        let nearestDist = Infinity;
        for (let mp of gameState.mileposts) {
            const dist = Math.hypot(mp.x - worldX, mp.y - worldY);
            if (dist < nearestDist) {
                nearestDist = dist;
                nearest = mp;
            }
        }

        const prev = gameState.hoveredMilepost;
        const prevValid = gameState.hoverValid;
        if (nearest && nearestDist < 1) {
            gameState.hoveredMilepost = nearest;
            canvas.style.cursor = "pointer";

            // Compute hover validity
            const currentPlayer = gameState.players[gameState.currentPlayerIndex];
            if (gameState.phase === "initialBuilding" || gameState.phase === "build") {
                if (gameState.selectedMilepost) {
                    // Building second click: check if path is affordable
                    const pathResult = findPath(gameState.selectedMilepost.id, nearest.id, currentPlayer.color);
                    if (!pathResult) {
                        gameState.hoverValid = false;
                    } else {
                        const remainingBudget = 20 - gameState.buildingThisTurn;
                        gameState.hoverValid = pathResult.cost <= remainingBudget && pathResult.cost <= currentPlayer.cash;
                    }
                } else {
                    // Building first click: check if can build from here
                    gameState.hoverValid = canBuildFromMilepost(nearest, currentPlayer.color);
                }
            } else if (gameState.phase === "operate") {
                if (currentPlayer.trainLocation === null) {
                    // Deploying: must be a city with player track
                    const owned = getPlayerOwnedMileposts(currentPlayer.color);
                    gameState.hoverValid = nearest.city && owned.has(nearest.id);
                } else if (nearest.id !== currentPlayer.trainLocation) {
                    // Moving: check path and movement
                    const pathOnTrack = findPathOnTrack(currentPlayer.trainLocation, nearest.id, currentPlayer.color);
                    gameState.hoverValid = pathOnTrack && (pathOnTrack.length - 1) <= currentPlayer.movement;
                } else {
                    gameState.hoverValid = true; // already here
                }
            } else {
                gameState.hoverValid = true;
            }
        } else {
            gameState.hoveredMilepost = null;
            gameState.hoverValid = null;
            canvas.style.cursor = "default";
        }

        // Only redraw if hovered milepost or validity changed
        if (prev !== gameState.hoveredMilepost || prevValid !== gameState.hoverValid) {
            drawMap();
        }
    });

    document.getElementById("gameCanvas")?.addEventListener("mouseleave", function() {
        if (gameState.hoveredMilepost) {
            gameState.hoveredMilepost = null;
            gameState.canvas.style.cursor = "default";
            drawMap();
        }
    });
});

window.addEventListener("resize", function() {
    if (gameState.gameStarted) {
        drawMap();
    }
});
</script>

    <div class="turn-overlay-content">
        <h2>Next Turn</h2>
        <div class="player-name" id="turnOverlayPlayer"></div>
        <div class="phase-label" id="turnOverlayPhase"></div>
        <button onclick="dismissTurnOverlay()" style="padding: 10px 40px; font-size: 16px;">Ready</button>
    </div>
</div>
